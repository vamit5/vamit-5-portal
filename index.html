    const { data } = await supa.from('payout_requests').select('*').eq('status','pending').order('requested_at');
    setItems(await enrichWithAthletes(data||[]));
  }
  async function decide(id, status) {
    const item = items.find(i=>i.id===id);
    const upd = { status, approved_at: new Date().toISOString() };
    if (status==='paid') upd.paid_at = new Date().toISOString();
    await supa.from('payout_requests').update(upd).eq('id', id);
    // PAZNJA: ne menjamo earnings_ledger vise. View athlete_wallet racuna pravo:
    //   balance_available = sum(earnings 'available') - sum(payouts 'pending'+'approved'+'paid')
    // Pa atleta vidi tacno: ako je imao 0.75 i zatrazio 0.10, ostane mu 0.65.
    if (status==='paid' && item) {
      await sendTemplated(item.athlete_id, 'payout_paid', { amount: ((item.amount_cents||0)/100).toFixed(2) }, '#/isplate');
    } else if (status==='rejected' && item) {
      await sendTemplated(item.athlete_id, 'payout_rejected', {}, '#/isplate');
    }
    load();
  }

  if (items.length===0) return <div className="glass rounded-2xl p-8 text-center text-white/60">Nema payout zahteva.</div>;
  return (
    <div className="space-y-3">
      {items.map(p => (
        <div key={p.id} className="glass-strong rounded-2xl p-4">
          <div className="flex items-center justify-between gap-3 mb-3">
            <div>
              <div className="font-bold">{p.profiles?.full_name || p.profiles?.email}</div>
              <div className="text-2xl font-display font-black text-lime">{formatEUR(p.amount_cents)}</div>
              <div className="text-[10px] uppercase tracking-wider font-bold mt-0.5" style={{
                color: p.payout_source==='reels' ? '#a6ff3b' : p.payout_source==='team' ? '#00f0ff' : '#ff3bcc'
              }}>
                {p.payout_source==='reels' ? '🎬 Reels bucket' : p.payout_source==='team' ? '👥 Tim bucket' : p.payout_source==='sales' ? '💎 Prodaja bucket' : 'Mešano'}
              </div>
            </div>
            <div className="text-[11px] text-white/40">{fromNow(p.requested_at)}</div>
          </div>
          <div className="text-xs text-white/70 space-y-1 mb-3 bg-bg0/40 rounded-lg p-3">
            <div><b>Ime:</b> {p.bank_info_snapshot?.full_name}</div>
            <div><b>IBAN:</b> <code className="text-brand">{p.bank_info_snapshot?.iban}</code></div>
            <div><b>Banka:</b> {p.bank_info_snapshot?.bank}</div>
            {p.bank_info_snapshot?.phone && <div><b>Tel:</b> {p.bank_info_snapshot.phone}</div>}
          </div>
          <div className="flex gap-2">
            <button onClick={()=>{ if(confirm('Označiti kao plaćeno? (prvo uradi bank transfer)')) decide(p.id,'paid'); }}
              className="flex-1 py-2 rounded-lg bg-lime/15 border border-lime/40 text-lime font-bold text-sm">✓ Mark paid</button>
            <button onClick={()=>decide(p.id,'rejected')} className="flex-1 py-2 rounded-lg bg-danger/15 border border-danger/40 text-danger font-bold text-sm">✗ Reject</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function AdminAthletes() {
  const [list, setList] = useState([]);
  const [selected, setSelected] = useState(null);
  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState('joined_at');
  const [sortDir, setSortDir] = useState('desc');

  useEffect(()=>{ load(); }, []);
  async function load() {
    const [athR, profR, earnR, salesR, reelsR] = await Promise.all([
      supa.from('athletes').select('*').order('created_at',{ascending:false}).limit(500),
      supa.from('profiles').select('id, full_name, email, phone, role, avatar_url'),
      supa.from('earnings_ledger').select('athlete_id, amount_cents, status, source'),
      supa.from('sales').select('athlete_id, amount_cents, status'),
      supa.from('reels').select('athlete_id, status')
    ]);

    const aths = athR.data || [];
    const profs = profR.data || [];
    const earns = earnR.data || [];
    const sales = salesR.data || [];
    const reels = reelsR.data || [];

    const pMap = Object.fromEntries(profs.map(p => [p.id, p]));
    const aMap = Object.fromEntries(aths.map(a => [a.id, a]));

    // Agregat po atleti
    function aggBy(arr, athleteId, filterFn, sumKey) {
      const filtered = arr.filter(x => x.athlete_id === athleteId && (filterFn ? filterFn(x) : true));
      if (sumKey) return filtered.reduce((s,x)=>s+(x[sumKey]||0), 0);
      return filtered.length;
    }

    const enriched = aths.map(a => {
      const prof = pMap[a.id] || {};
      const recruiter = a.referred_by ? aMap[a.referred_by] : null;
      const recruiterProf = recruiter ? (pMap[recruiter.id] || {}) : null;
      return {
        ...a,
        profile: prof,
        profiles: prof,
        recruiter_name: recruiterProf?.full_name || recruiter?.name || (recruiterProf?.email ? recruiterProf.email.split('@')[0] : null) || null,
        // Stats
        reels_approved: aggBy(reels, a.id, r => r.status === 'approved'),
        reels_pending:  aggBy(reels, a.id, r => r.status === 'pending'),
        sales_count:    aggBy(sales, a.id, s => s.status === 'confirmed'),
        sales_volume:   aggBy(sales, a.id, s => s.status === 'confirmed', 'amount_cents'),
        earned_reels:   aggBy(earns, a.id, e => e.source === 'reel',  'amount_cents'),
        earned_sales:   aggBy(earns, a.id, e => e.source === 'sale',  'amount_cents'),
        earned_team:    aggBy(earns, a.id, e => e.source === 'team',  'amount_cents'),
        earned_total:   aggBy(earns, a.id, null,                       'amount_cents'),
        earned_available: aggBy(earns, a.id, e => e.status === 'available', 'amount_cents')
      };
    });

    setList(enriched);
  }

  // Filter + sort
  const filtered = list.filter(a => {
    if (!search) return true;
    const q = search.toLowerCase();
    return (a.profile?.full_name||'').toLowerCase().includes(q)
      || (a.profile?.email||'').toLowerCase().includes(q)
      || (a.promo_code||'').toLowerCase().includes(q)
      || (a.recruiter_name||'').toLowerCase().includes(q);
  });
  const sorted = [...filtered].sort((a,b) => {
    const av = a[sortKey] ?? (sortKey==='name' ? (a.profile?.full_name||a.profile?.email||'') : 0);
    const bv = b[sortKey] ?? (sortKey==='name' ? (b.profile?.full_name||b.profile?.email||'') : 0);
    if (typeof av === 'string') return sortDir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortDir==='asc' ? (av - bv) : (bv - av);
  });

  function setSort(key) {
    if (sortKey === key) setSortDir(d => d==='asc'?'desc':'asc');
    else { setSortKey(key); setSortDir('desc'); }
  }
  const arrow = (key) => sortKey===key ? (sortDir==='asc'?' ▲':' ▼') : '';

  // Sume na vrhu
  const totals = sorted.reduce((acc, a) => ({
    sales: acc.sales + a.sales_count,
    sales_vol: acc.sales_vol + a.sales_volume,
    reels: acc.reels + a.reels_approved,
    earned_total: acc.earned_total + a.earned_total,
    earned_team: acc.earned_team + a.earned_team,
    earned_available: acc.earned_available + a.earned_available
  }), { sales:0, sales_vol:0, reels:0, earned_total:0, earned_team:0, earned_available:0 });

  return (
    <>
      <div className="space-y-3">
        {/* Search + brzi totali */}
        <div className="glass rounded-2xl p-3 sm:p-4 space-y-3">
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="🔍 Pretrazi ime, email, promo kod ili recruiter-a..."
            className="w-full px-4 py-2.5 rounded-xl bg-bg0 border border-white/15 focus:border-brand outline-none text-sm"/>
          <div className="grid grid-cols-2 sm:grid-cols-6 gap-2 text-center">
            <div className="p-2 rounded-lg bg-bg0/40">
              <div className="text-[9px] uppercase text-white/40 font-bold">Atleta</div>
              <div className="font-display font-black text-base">{sorted.length}</div>
            </div>
            <div className="p-2 rounded-lg bg-bg0/40">
              <div className="text-[9px] uppercase text-white/40 font-bold">Prodaje</div>
              <div className="font-display font-black text-base text-brand">{totals.sales}</div>
            </div>
            <div className="p-2 rounded-lg bg-bg0/40">
              <div className="text-[9px] uppercase text-white/40 font-bold">Promet</div>
              <div className="font-display font-black text-base text-brand">{formatEUR(totals.sales_vol)}</div>
            </div>
            <div className="p-2 rounded-lg bg-bg0/40">
              <div className="text-[9px] uppercase text-white/40 font-bold">Reels OK</div>
              <div className="font-display font-black text-base text-gold">{totals.reels}</div>
            </div>
            <div className="p-2 rounded-lg bg-bg0/40">
              <div className="text-[9px] uppercase text-white/40 font-bold">Tim €</div>
              <div className="font-display font-black text-base text-lime">{formatEUR(totals.earned_team)}</div>
            </div>
            <div className="p-2 rounded-lg bg-bg0/40">
              <div className="text-[9px] uppercase text-white/40 font-bold">Ukupno €</div>
              <div className="font-display font-black text-base text-lime">{formatEUR(totals.earned_total)}</div>
            </div>
          </div>
        </div>

        <div className="glass rounded-2xl p-3 sm:p-5 overflow-x-auto">
          <table className="w-full text-sm min-w-[1100px]">
            <thead>
              <tr className="text-left text-[10px] text-white/50 uppercase tracking-wider border-b border-white/10">
                <th className="py-3 px-2 cursor-pointer hover:text-brand" onClick={()=>setSort('name')}>Atleta{arrow('name')}</th>
                <th className="px-2 cursor-pointer hover:text-brand" onClick={()=>setSort('level')}>Nivo{arrow('level')}</th>
                <th className="px-2">Recruiter</th>
                <th className="px-2 cursor-pointer hover:text-brand text-right" onClick={()=>setSort('reels_approved')}>Reels OK{arrow('reels_approved')}</th>
                <th className="px-2 cursor-pointer hover:text-brand text-right" onClick={()=>setSort('sales_count')}>Prodaje{arrow('sales_count')}</th>
                <th className="px-2 cursor-pointer hover:text-brand text-right" onClick={()=>setSort('sales_volume')}>Promet{arrow('sales_volume')}</th>
                <th className="px-2 cursor-pointer hover:text-brand text-right" onClick={()=>setSort('earned_reels')}>€ Reels{arrow('earned_reels')}</th>
                <th className="px-2 cursor-pointer hover:text-brand text-right" onClick={()=>setSort('earned_sales')}>€ Sales{arrow('earned_sales')}</th>
                <th className="px-2 cursor-pointer hover:text-brand text-right" onClick={()=>setSort('earned_team')}>€ Tim{arrow('earned_team')}</th>
                <th className="px-2 cursor-pointer hover:text-brand text-right" onClick={()=>setSort('earned_total')}>€ Ukupno{arrow('earned_total')}</th>
                <th className="px-2"></th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(a => (
                <tr key={a.id} className="border-b border-white/5 hover:bg-white/5">
                  <td className="py-3 px-2">
                    <div className="flex items-center gap-2">
                      <div className="w-7 h-7 rounded-full overflow-hidden bg-bg0 border border-white/10 shrink-0">
                        {a.profile?.avatar_url
                          ? <img src={a.profile.avatar_url} alt="" className="w-full h-full object-cover"/>
                          : <div className="w-full h-full flex items-center justify-center text-xs">👤</div>}
                      </div>
                      <div className="min-w-0">
                        <div className="font-bold text-sm truncate">{a.profile?.full_name || a.name || '—'}</div>
                        <div className="text-[10px] text-white/40 truncate">{a.profile?.email}</div>
                        <code className="text-[10px] text-brand">{a.promo_code}</code>
                      </div>
                    </div>
                  </td>
                  <td className="px-2">
                    <span className="text-xs font-bold" style={{color: LEVEL_THEME[a.level]?.color}}>{LEVEL_THEME[a.level]?.emoji} {LEVEL_THEME[a.level]?.name}</span>
                  </td>
                  <td className="px-2 text-xs">
                    {a.recruiter_name ? (
                      <span className="text-white/70">👤 {a.recruiter_name}</span>
                    ) : (
                      <span className="text-white/30 text-[10px]">direktan</span>
                    )}
                  </td>
                  <td className="px-2 text-right">
                    <span className="font-bold text-gold">{a.reels_approved}</span>
                    {a.reels_pending > 0 && <div className="text-[10px] text-gold/60">+{a.reels_pending} pending</div>}
                  </td>
                  <td className="px-2 text-right font-bold text-brand">{a.sales_count}</td>
                  <td className="px-2 text-right text-brand text-xs">{formatEUR(a.sales_volume)}</td>
                  <td className="px-2 text-right text-gold text-xs">{formatEUR(a.earned_reels)}</td>
                  <td className="px-2 text-right text-brand text-xs">{formatEUR(a.earned_sales)}</td>
                  <td className="px-2 text-right text-lime text-xs">{formatEUR(a.earned_team)}</td>
                  <td className="px-2 text-right font-bold text-lime">{formatEUR(a.earned_total)}</td>
                  <td className="px-2">
                    <button onClick={()=>setSelected(a)} className="px-3 py-1.5 rounded-lg bg-brand/15 text-brand text-xs font-bold whitespace-nowrap">Detalji</button>
                  </td>
                </tr>
              ))}
              {sorted.length === 0 && (
                <tr><td colSpan="11" className="text-center py-8 text-white/40 text-sm">Nema rezultata.</td></tr>
              )}
            </tbody>
          </table>
        </div>
        <div className="text-[10px] text-white/40 text-center">
          💡 Klikni na bilo koje zaglavlje da sortiraš ↑↓. Pretraga radi po imenu, email-u, promo kodu ili recruiter-u.
        </div>
      </div>

      {selected && <AthleteDetailsModal athlete={selected} onClose={()=>setSelected(null)} onUpdate={load}/>}
    </>
  );
}

function AthleteDetailsModal({ athlete, onClose, onUpdate }) {
  const [tab, setTab] = useState('overview');
  const [stats, setStats] = useState({ reels:0, reels_pending:0, sales:0, earned_total:0, earned_paid:0, earned_pending:0, earned_available:0 });
  const [reelsList, setReelsList] = useState([]);
  const [salesList, setSalesList] = useState([]);
  const [earnList, setEarnList] = useState([]);
  const [editMode, setEditMode] = useState(false);
  const [form, setForm] = useState({ ...athlete });
  const [saving, setSaving] = useState(false);

  useEffect(()=> { load(); }, [athlete.id]);
  async function load() {
    const [r1, r2, s1, e1, allReels, allSales, allEarn] = await Promise.all([
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','approved'),
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','pending'),
      supa.from('sales').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','confirmed'),
      supa.from('earnings_ledger').select('amount_cents, status, payout_request_id').eq('athlete_id', athlete.id),
      supa.from('reels').select('*').eq('athlete_id', athlete.id).order('submitted_at',{ascending:false}).limit(100),
      supa.from('sales').select('*').eq('athlete_id', athlete.id).order('created_at',{ascending:false}).limit(100),
      supa.from('earnings_ledger').select('*').eq('athlete_id', athlete.id).order('created_at',{ascending:false}).limit(100)
    ]);
    const earn = e1.data || [];
    setStats({
      reels: r1.count||0,
      reels_pending: r2.count||0,
      sales: s1.count||0,
      earned_total: earn.reduce((s,x)=>s+x.amount_cents,0),
      earned_paid: earn.filter(x=>x.status==='paid').reduce((s,x)=>s+x.amount_cents,0),
      earned_pending: earn.filter(x=>x.status==='pending').reduce((s,x)=>s+x.amount_cents,0),
      earned_available: earn.filter(x=>x.status==='available' && !x.payout_request_id).reduce((s,x)=>s+x.amount_cents,0)
    });
    setReelsList(allReels.data||[]);
    setSalesList(allSales.data||[]);
    setEarnList(allEarn.data||[]);
  }

  async function reviewReel(id, status, reason=null) {
    const reel = reelsList.find(r=>r.id===id);
    await supa.from('reels').update({ status, reviewed_at: new Date().toISOString(), reject_reason: reason }).eq('id', id);
    if (status === 'approved' && reel) {
      const { data: cfg } = await supa.from('level_configs').select('reel_reward_cents').eq('level_key', athlete.level).maybeSingle();
      const reward = cfg?.reel_reward_cents || 30;
      await insertReelEarningsOnce(reel.athlete_id, id, reward);
      await sendTemplated(reel.athlete_id, 'reel_approved', { amount: (reward/100).toFixed(2) }, '#/isplate');
      await triggerEngine(reel.athlete_id);
    } else if (status === 'rejected' && reel) {
      await sendTemplated(reel.athlete_id, 'reel_rejected', { reason: reason || 'Tvoj reel ne ispunjava uslove.' }, '#/reels');
    }
    load();
  }

  async function saveChanges() {
    setSaving(true);
    const updates = {
      level: form.level,
      rewardful_token: form.rewardful_token || null,
      bank_full_name: form.bank_full_name || null,
      bank_iban: form.bank_iban || null,
      bank_name: form.bank_name || null,
      bank_phone: form.bank_phone || null,
      status: form.status
    };
    const { error } = await supa.from('athletes').update(updates).eq('id', athlete.id);
    if (form.full_name !== athlete.profiles?.full_name) {
      await supa.from('profiles').update({ full_name: form.full_name }).eq('id', athlete.id);
    }
    setSaving(false);
    if (error) alert('Greška: ' + error.message);
    else { alert('✓ Sačuvano'); setEditMode(false); onUpdate(); }
  }

  const theme = LEVEL_THEME[athlete.level];

  return (
    <div className="fixed inset-0 z-50 bg-bg0/90 backdrop-blur-xl flex items-start sm:items-center justify-center p-3 sm:p-6 overflow-y-auto" onClick={onClose}>

          <div>
            <div className="text-xs text-white/50 uppercase tracking-wider">Atleta detalji</div>
            <h2 className="font-display font-black text-xl sm:text-2xl">{athlete.profiles?.full_name || athlete.profiles?.email}</h2>
            <div className="text-xs text-white/60">{athlete.profiles?.email}</div>

// === DOSTIGNUCA (Achievements) ===
function AchievementsPage({ athlete }) {
  const [achievements, setAchievements] = useState([]);
  const [unlocked, setUnlocked] = useState({});
  const [snap, setSnap] = useState({ reels_total:0, sales_total:0, streak:0 });
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all');

  useEffect(() => {
    if (athlete) load();
    else setLoading(false);
  }, [athlete?.id]);

  async function load() {
    setLoading(true);
    const [allAch, mine, reels, sales, dates, lessonsTotal, lessonsCompleted] = await Promise.all([
      supa.from('achievements').select('*').eq('active', true).order('xp_reward',{ascending:true}),
      supa.from('athlete_achievements').select('achievement_id, unlocked_at').eq('athlete_id', athlete.id),
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','approved'),
      supa.from('sales').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','confirmed'),
      supa.from('reels').select('submitted_at').eq('athlete_id', athlete.id).eq('status','approved').limit(120),
      supa.from('course_lessons').select('id',{count:'exact', head:true}),
      supa.from('lesson_progress').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('completed', true)
    ]);
    const dSet = new Set((dates.data||[]).map(r => (r.submitted_at||'').slice(0,10)));
    let streak = 0; const today = new Date();
    for (let i=0; i<365; i++) {
      const d = new Date(today); d.setDate(today.getDate() - i);
      const ds = d.toISOString().slice(0,10);
      if (dSet.has(ds)) streak++;
      else if (i > 0) break;
    }
    setAchievements(allAch.data||[]);
    const map = {};
    (mine.data||[]).forEach(x => { map[x.achievement_id] = x.unlocked_at; });
    setUnlocked(map);
    setSnap({
      reels_total: reels.count||0,
      sales_total: sales.count||0,
      streak,
      course_lessons_total: lessonsTotal.count||0,
      course_lessons_completed: lessonsCompleted.count||0
    });
    setLoading(false);
  }

  const unlockedCount = Object.keys(unlocked).length;
  const totalBODOVA = achievements.filter(a => unlocked[a.id]).reduce((s,a)=>s+(a.xp_reward||0), 0);

  const filtered = achievements.filter(a => {
    if (filter === 'unlocked') return unlocked[a.id];
    if (filter === 'locked') return !unlocked[a.id];
    return true;
  });

  // ADMIN — nema svojih dostignuća, pokazi info
  if (!athlete) return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">🏆 Dostignuća</h1>
        <p className="text-sm text-white/60">Admin — koristi <a href="#/admin" className="text-brand underline">Admin → Dostignuća</a> da editujes badge-ove.</p>
      </div>
      <div className="glass rounded-2xl p-8 text-center text-white/60">Admin nema svoja dostignuća. 👑</div>
    </div>
  );

  return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">{t('portal_dostignuca_title','🏆 Dostignuća')}</h1>
        <p className="text-sm text-white/60">{t('portal_dostignuca_intro','Otključavaj badge-ove kroz akciju. Svako dostignuće = BODOVA nagrada.')}</p>
      </div>

      {/* SUMMARY */}
      <div className="grid grid-cols-3 gap-3">
        <div className="glass-strong rounded-2xl p-4 text-center">
          <div className="text-[10px] uppercase tracking-wider text-white/50">Otključano</div>
          <div className="font-display font-black text-2xl text-gold">{unlockedCount}/{achievements.length}</div>
        </div>
        <div className="glass-strong rounded-2xl p-4 text-center">
          <div className="text-[10px] uppercase tracking-wider text-white/50">BODOVA iz dostignuća</div>
          <div className="font-display font-black text-2xl text-brand">{totalBODOVA}</div>
        </div>
        <div className="glass-strong rounded-2xl p-4 text-center">
          <div className="text-[10px] uppercase tracking-wider text-white/50">Streak</div>
          <div className="font-display font-black text-2xl text-brand3">🔥 {snap.streak}d</div>
        </div>
      </div>

      {/* FILTER */}
      <div className="flex gap-2 overflow-x-auto pb-1">
        {[
          {k:'all', l:'Sva'}, {k:'unlocked', l:'Otključana'}, {k:'locked', l:'Zaključana'}
        ].map(f => (
          <button key={f.k} onClick={()=>setFilter(f.k)}
            className={"px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap " + (filter===f.k ? 'bg-brand text-bg0' : 'bg-white/5 text-white/70 hover:bg-white/10')}>
            {f.l}
          </button>
        ))}
      </div>

      {/* GRID */}
      {loading ? (
        <div className="text-center py-10 text-white/50">Ucitavam...</div>
      ) : filtered.length === 0 ? (
        <div className="glass rounded-2xl p-10 text-center text-white/60">Nema dostignuća u ovoj kategoriji.</div>
      ) : (
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 sm:gap-4">
          {filtered.map(a => {
            const isUnlocked = !!unlocked[a.id];
            const progress = getProgress(a.requirement_json, snap);
            return (
              <div key={a.id} className={"glass rounded-2xl p-4 text-center " + (isUnlocked ? 'border border-gold/40' : 'opacity-60')}>
                <div className={"text-5xl mb-2 " + (isUnlocked ? '' : 'grayscale')}>{a.icon_emoji || a.icon || '🏆'}</div>
                <div className={"font-display font-black text-sm mb-1 " + (isUnlocked ? 'text-gold' : 'text-white/70')}>{a.name}</div>
                <div className="text-[11px] text-white/50 mb-2 line-clamp-2">{a.description}</div>
                {a.xp_reward && <div className="text-xs font-bold text-brand mb-2">+{a.xp_reward} BODOVA</div>}
                {!isUnlocked && progress && (
                  <div className="space-y-1">
                    <div className="h-1.5 rounded-full bg-white/5 overflow-hidden">
                      <div className="h-full bg-brand transition-all" style={{width: progress.pct + '%'}}/>
                    </div>
                    <div className="text-[10px] text-white/50">{progress.current}/{progress.target}</div>
                  </div>
                )}
                {isUnlocked && <div className="text-[10px] text-lime font-bold">✓ {fromNow(unlocked[a.id])}</div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function getProgress(req, snap) {
  if (!req || typeof req !== 'object') return null;
  let current = 0, target = parseInt(req.min, 10) || 1;
  if (req.kind === 'count') {
    if (req.entity === 'reels') current = snap.reels_total||0;
    else if (req.entity === 'sales') current = snap.sales_total||0;
    else return null;
  } else if (req.kind === 'streak') {
    current = snap.streak||0;
  } else if (req.kind === 'course') {
    if (req.entity === 'all_lessons') {
      target = snap.course_lessons_total||1;
      current = Math.min(snap.course_lessons_completed||0, target);
    } else if (req.entity === 'lessons') {
      current = snap.course_lessons_completed||0;
    } else return null;
  } else return null;
  return { current, target, pct: Math.min(100, Math.round((current/target)*100)) };
}

function LeaderboardPage({ athlete }) {
  const [period, setPeriod] = useState('month'); // month | all
  const [metric, setMetric] = useState('reels'); // reels | sales | xp
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [profileOpen, setProfileOpen] = useState(null);

  useEffect(() => { load(); }, [period, metric]);

  async function load() {
    setLoading(true);
    const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);

    // PRVO uzmemo SVE aktivne atlete (sa 0 ili više stats)
    const { data: rawAthletes } = await supa.from('athletes')
      .select('id, level, status, name')
      .eq('status','active').limit(200);
    const ids = (rawAthletes||[]).map(a => a.id);
    const { data: profs } = ids.length
      ? await supa.from('profiles').select('id, full_name, email, avatar_url').in('id', ids)
      : { data: [] };
    const pMap = Object.fromEntries((profs||[]).map(p => [p.id, p]));
    const allAthletes = (rawAthletes||[]).map(a => ({ ...a, profiles: pMap[a.id] || { full_name: a.name, email: '', avatar_url: null } }));

    // SAD uzmemo stats za izabranu metriku
    const map = {};
    if (metric === 'reels') {
      let q = supa.from('reels').select('athlete_id').eq('status','approved');
      if (period === 'month') q = q.gte('submitted_at', monthStart.toISOString());
      const { data } = await q;
      (data||[]).forEach(r => { map[r.athlete_id] = (map[r.athlete_id]||0)+1; });
    } else if (metric === 'sales') {
      let q = supa.from('sales').select('athlete_id').eq('status','confirmed');
      if (period === 'month') q = q.gte('created_at', monthStart.toISOString());
      const { data } = await q;
      (data||[]).forEach(r => { map[r.athlete_id] = (map[r.athlete_id]||0)+1; });
    } else {
      let q = supa.from('xp_ledger').select('athlete_id, amount');
      if (period === 'month') q = q.gte('created_at', monthStart.toISOString());
      const { data } = await q;
      (data||[]).forEach(r => { map[r.athlete_id] = (map[r.athlete_id]||0)+(r.amount||0); });
    }

    // Spoji SVE atlete sa stats (i one sa 0)
    let result = (allAthletes||[]).map(a => ({
      id: a.id,
      val: map[a.id] || 0,
      athlete: a
    }));
    result.sort((a,b) => b.val - a.val);
    result = result.slice(0, 50);

    setRows(result);
    setLoading(false);
  }

  const myRank = rows.findIndex(r => r.id === athlete?.id) + 1;
  const metricLabel = { reels:'Reels', sales:'Prodaje', xp:'BODOVA' }[metric];

  return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">{t('portal_rang_title','📊 Rang Lista')}</h1>
        <p className="text-sm text-white/60">{t('portal_rang_intro','Top 50 atleta. Bori se za #1.')}</p>
      </div>

      {/* MY RANK CARD */}
      {athlete && (
        <div className="glass-strong rounded-2xl p-4 sm:p-5 flex items-center justify-between border border-brand/30">
          <div>
            <div className="text-[10px] uppercase tracking-wider text-white/50">Tvoja pozicija</div>
            <div className="font-display font-black text-2xl text-brand">{myRank > 0 ? '#'+myRank : 'Nerangiran'}</div>
          </div>
          <div className="text-right">
            <div className="text-[10px] uppercase tracking-wider text-white/50">{metricLabel}</div>
            <div className="font-display font-black text-xl">{rows.find(r=>r.id===athlete.id)?.val || 0}</div>
          </div>
        </div>
      )}

      {/* FILTERS */}
      <div className="flex gap-2 flex-wrap">
        <div className="flex gap-1 glass rounded-xl p-1">
          {['month','all'].map(p => (
            <button key={p} onClick={()=>setPeriod(p)} className={"px-3 py-1.5 rounded-lg text-xs font-bold " + (period===p ? 'bg-brand text-bg0' : 'text-white/70')}>{p==='month'?'Ovaj mesec':'Sve vreme'}</button>
          ))}
        </div>
        <div className="flex gap-1 glass rounded-xl p-1">
          {[['reels','🎬 Reels'],['sales','💎 Prodaje'],['xp','⚡ BODOVA']].map(([k,l]) => (
            <button key={k} onClick={()=>setMetric(k)} className={"px-3 py-1.5 rounded-lg text-xs font-bold " + (metric===k ? 'bg-brand text-bg0' : 'text-white/70')}>{l}</button>
          ))}
        </div>
      </div>

      {/* LEADERBOARD */}
      {loading ? (
        <div className="text-center py-10 text-white/50">Ucitavam...</div>
      ) : rows.length === 0 ? (
        <div className="glass rounded-2xl p-10 text-center text-white/60">Nema podataka za ovaj period.</div>
      ) : (
        <div className="glass rounded-2xl overflow-hidden">
          {rows.map((r, i) => {
            const isMe = r.id === athlete?.id;
            const lvl = r.athlete?.level || 'recruit';
            const lvlTheme = LEVEL_THEME[lvl];
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : null;
            const avatar = r.athlete?.profiles?.avatar_url;
            return (
              <button key={r.id} onClick={()=>setProfileOpen(r.athlete)}
                className={"w-full flex items-center justify-between gap-3 px-4 py-3 border-b border-white/5 hover:bg-white/5 text-left transition " + (isMe ? 'bg-brand/10' : '')}>
                <div className="flex items-center gap-3 min-w-0">
                  <div className={"w-9 text-center font-black shrink-0 " + (i<3 ? 'text-2xl' : 'text-sm text-white/40')}>
                    {medal || '#'+(i+1)}
                  </div>
                  <div className="w-10 h-10 rounded-full overflow-hidden bg-bg0 border border-white/10 shrink-0">
                    {avatar
                      ? <img src={avatar} alt="" className="w-full h-full object-cover" />
                      : <div className="w-full h-full flex items-center justify-center text-base">👤</div>
                    }
                  </div>
                  <div className="min-w-0">
                    <div className="font-bold text-sm truncate">{r.athlete?.profiles?.full_name || r.athlete?.profiles?.email?.split('@')[0] || '—'} {isMe && <span className="text-brand">(ti)</span>}</div>
                    <div className="text-[10px] font-bold uppercase tracking-wider" style={{color: lvlTheme.color}}>{lvlTheme.emoji} {lvlTheme.name}</div>
                  </div>
                </div>
                <div className="font-display font-black text-base shrink-0">{r.val}</div>
              </button>
            );
          })}
        </div>
      )}

      {profileOpen && <AthletePublicProfile athlete={profileOpen} onClose={()=>setProfileOpen(null)}/>}
    </div>
  );
}

function AdminAppIcon() {
  const [currentUrl, setCurrentUrl] = useState('');
  const [newUrl, setNewUrl] = useState('');
  const [uploading, setUploading] = useState(false);
  const [msg, setMsg] = useState(null);

  useEffect(() => { load(); }, []);
  async function load() {
    const { data } = await supa.from('settings').select('value').eq('key', 'app_icon_url').maybeSingle();
    let v = data?.value;
    if (typeof v === 'object' && v !== null && 'v' in v) v = v.v;
    setCurrentUrl(typeof v === 'string' ? v : '');
  }

  async function handleFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { setMsg({type:'err', text:'Mora biti slika (PNG ili JPG).'}); return; }
    setUploading(true); setMsg(null);
    try {
      const ext = file.name.split('.').pop() || 'png';
      const filename = 'app-icon-' + Date.now() + '.' + ext;
      const { error: upErr } = await supa.storage.from('avatars').upload(filename, file, {
        cacheControl: '3600', upsert: true
      });
      if (upErr) throw upErr;
      const { data: urlData } = supa.storage.from('avatars').getPublicUrl(filename);
      setNewUrl(urlData.publicUrl);
      setMsg({type:'ok', text:'✓ Upload uspešan! Klikni Sačuvaj da postaviš kao app ikonu.'});
    } catch(e) {
      setMsg({type:'err', text:'Greška: ' + (e.message || e)});
    } finally { setUploading(false); }
  }

  async function save() {
    if (!newUrl) return;
    setUploading(true);
    try {
      const { error } = await supa.from('settings').upsert(
        { key: 'app_icon_url', value: { v: newUrl }, updated_at: new Date().toISOString() },
        { onConflict: 'key' }
      );
      if (error) throw error;
      setCurrentUrl(newUrl);
      setNewUrl('');
      setMsg({type:'ok', text:'✅ Sačuvano. Sada KOPIRAJ dole prikazani manifest.webmanifest i paste u GitHub. Posle uninstall+install PWA — vidi novu ikonu.'});
    } catch(e) {
      setMsg({type:'err', text:'Greška: ' + (e.message || e)});
    } finally { setUploading(false); }
  }

  const previewUrl = newUrl || currentUrl || 'https://res.cloudinary.com/dqqljgtna/image/upload/c_fill,w_192,h_192,q_auto,f_png/v1778337005/VAMIT-5_k3xlfh.jpg';

  // Manifest snippet sa trenutnim URL-om
  const manifestSnippet = `{
  "name": "VAMIT-5 Athlete Portal",
  "short_name": "VAMIT-5",
  "description": "Athlete portal — zaradi po reel-u + provizija.",
  "start_url": "/#/dashboard",
  "scope": "/",
  "display": "standalone",
  "orientation": "portrait",
  "background_color": "#000000",
  "theme_color": "#000000",
  "categories": ["business", "fitness", "social"],
  "lang": "sr-Latn",
  "icons": [
    { "src": "${currentUrl || previewUrl}", "sizes": "192x192", "type": "image/png", "purpose": "any" },
    { "src": "${currentUrl || previewUrl}", "sizes": "512x512", "type": "image/png", "purpose": "any" },
    { "src": "${currentUrl || previewUrl}", "sizes": "192x192", "type": "image/png", "purpose": "maskable" },
    { "src": "${currentUrl || previewUrl}", "sizes": "512x512", "type": "image/png", "purpose": "maskable" }
  ]
}`;

  function copyManifest() {
    navigator.clipboard.writeText(manifestSnippet);
    setMsg({type:'ok', text:'✓ Manifest kopiran u clipboard. Paste u GitHub vamit5-portal/manifest.webmanifest.'});
  }

  return (
    <div className="space-y-4">
      <div className="glass rounded-2xl p-4 text-xs text-white/70 border border-brand/20">
        🖼️ Ovde editujes ikonu koja se pojavljuje kad atleta instalira PWA na Home Screen (Android + iPhone). <strong>Preporuka:</strong> PNG 512×512 sa providnom ili crnom pozadinom.
      </div>

      {/* PREVIEW */}
      <div className="glass-strong rounded-2xl p-5">
        <div className="font-display font-bold text-base mb-3">Trenutna app ikona</div>
        <div className="flex items-center gap-4 flex-wrap">
          <div className="w-32 h-32 rounded-3xl overflow-hidden bg-bg0 border-2 border-white/10 shrink-0">
            <img src={previewUrl} alt="App ikona" className="w-full h-full object-cover"/>
          </div>
          <div className="flex-1 min-w-0">
            <div className="text-xs text-white/60 mb-1">URL:</div>
            <code className="text-[10px] text-brand break-all">{currentUrl || 'Default (Cloudinary VAMIT-5 logo)'}</code>
          </div>
        </div>
      </div>

      {/* UPLOAD NEW */}
      <div className="glass-strong rounded-2xl p-5 space-y-3">
        <div className="font-display font-bold text-base">📤 Postavi novu ikonu</div>
        <div className="text-xs text-white/60">Izaberi PNG ili JPG sliku. Ona će biti upload-ovana na Supabase Storage pa joj se URL automatski generiše.</div>
        <input type="file" accept="image/png,image/jpeg,image/svg+xml" onChange={handleFile} disabled={uploading}
          className="w-full text-xs text-white/70 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-brand file:text-bg0 file:text-xs file:font-bold"/>

        {newUrl && (
          <div className="mt-2 space-y-2">
            <div className="text-xs text-lime">✓ Nova slika upload-ovana — preview iznad. Klikni Sačuvaj.</div>
            <button onClick={save} disabled={uploading}

              💾 Sačuvaj kao app ikonu

        {msg && (
          <div className={"text-xs px-3 py-2 rounded-lg " + (msg.type==='ok' ? 'bg-lime/10 border border-lime/30 text-lime' : 'bg-danger/10 border border-danger/30 text-danger')}>

function AdminLinks() {

  const [savedKey, setSavedKey] = useState(null);

  useEffect(()=>{ load(); }, []);

  async function load() {
    setLoading(true);
    const keys = URL_SETTINGS.map(s => s.key);
    const { data } = await supa.from('settings').select('key, value').in('key', keys);
    const map = {};
    (data||[]).forEach(r => { map[r.key] = typeof r.value === 'string' ? r.value : (r.value?.v ?? JSON.stringify(r.value)); });
    setSettings(map);
    setLoading(false);
  }

  async function saveSetting(key, value) {
    const { error } = await supa.from('settings').upsert({ key, value: value, updated_at: new Date().toISOString() }, { onConflict: 'key' });
    if (!error) {
      setSavedKey(key);
      setTimeout(()=>setSavedKey(null), 1500);
    } else {
      alert('Greška: ' + error.message);
    }
  }

  if (loading) return <div className="text-white/50 text-center py-10">Učitavam...</div>;

  return (
    <div className="space-y-4">
      <div className="glass rounded-2xl p-4 text-xs text-white/70 border border-brand/20">

      </div>
      {URL_SETTINGS.map(s => (
        <SettingRow
          key={s.key}
          setting={s}
          value={settings[s.key]||''}
          saved={savedKey===s.key}
          onChange={v=>setSettings({...settings, [s.key]:v})}
          onSave={()=>saveSetting(s.key, settings[s.key]||'')}
        />
      ))}
    </div>
  );
}

function SettingRow({ setting, value, saved, onChange, onSave, textarea }) {
  // Detekcija da li je polje za sliku — pokazi thumbnail
  const isImageField = /(_url|image|logo|avatar|icon|photo|picture)$/i.test(setting.key)
    || setting.key.includes('image')
    || setting.key.includes('logo');
  // Validna URL ili data URI
  const previewUrl = isImageField && value && /^(https?:|data:)/.test(value) ? value : null;
  const fallbackUrl = isImageField && setting.placeholder && /^(https?:|data:)/.test(setting.placeholder) ? setting.placeholder : null;

  return (
    <div className="glass rounded-2xl p-4">
      <div className="flex items-center justify-between mb-2 gap-3">
        <div className="min-w-0">
          <div className="font-bold text-sm">{setting.label}</div>
          <div className="text-[10px] text-white/40 font-mono truncate">{setting.key}</div>
        </div>
        <button onClick={onSave}
          className={"shrink-0 px-3 py-1.5 rounded-lg text-xs font-bold " + (saved ? 'bg-lime text-bg0' : 'bg-brand text-bg0')}>
          {saved ? '✓ Sačuvano' : 'Sačuvaj'}
        </button>
      </div>

      {/* IMAGE PREVIEW THUMBNAIL */}
      {isImageField && (
        <div className="flex items-start gap-3 mb-3">
          <a href={previewUrl || fallbackUrl || '#'} target="_blank" rel="noopener"
            className="shrink-0 w-20 h-20 rounded-xl overflow-hidden bg-bg0 border border-white/15 hover:border-brand transition flex items-center justify-center">
            {(previewUrl || fallbackUrl) ? (
              <img src={previewUrl || fallbackUrl}
                alt="preview"
                className="w-full h-full object-cover"
                onError={(e)=>{ e.target.style.display='none'; e.target.parentNode.innerHTML='<div class=&quot;text-[10px] text-danger text-center px-1&quot;>❌<br/>Slika ne ucitava</div>'; }}/>
            ) : (
              <div className="text-[10px] text-white/40 text-center px-1">📷<br/>Nema slike</div>
            )}
          </a>
          <div className="flex-1 min-w-0 text-[10px] text-white/50 leading-snug">
            {previewUrl ? (
              <>📷 Trenutna slika. Klikni thumbnail da otvoriš punu veličinu.</>
            ) : fallbackUrl ? (
              <>📷 Default (placeholder). Unesi svoj URL i sačuvaj.</>
            ) : (
              <>Zalepi link slike (Cloudinary, Supabase Storage, ili bilo koji javni URL).</>
            )}
          </div>
        </div>
      )}

      {textarea ? (
        <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={setting.placeholder||''} rows={3}
          className="w-full px-3 py-2.5 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm resize-none"/>
      ) : (
        <input value={value} onChange={e=>onChange(e.target.value)} placeholder={setting.placeholder||''}
          className="w-full px-3 py-2.5 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm font-mono"/>
      )}
      {setting.help && <div className="text-[11px] text-white/50 mt-1.5">{setting.help}</div>}
    </div>
  );
}

function LevelEditModal({ level, onClose, onSave }) {
  const [form, setForm] = useState({
    sales_commission_pct: ((level.sales_commission_pct||0)*100).toString(),
    reel_reward_cents: (level.reel_reward_cents||0).toString(),
    req_sales: (level.requirements_json?.sales_total||'').toString(),
    req_reels_total: (level.requirements_json?.reels_total||'').toString(),
    req_reels_month: (level.requirements_json?.reels_qualifying_month||'').toString(),
    monthly_reels: (level.monthly_threshold_json?.reels_30d || level.monthly_threshold_json?.reels_per_month||'').toString(),
  });
  const [saving, setSaving] = useState(false);

  async function save() {
    setSaving(true);
    const updates = {
      sales_commission_pct: parseFloat(form.sales_commission_pct)/100 || 0,
      reel_reward_cents: parseInt(form.reel_reward_cents)||0,
      requirements_json: {
        ...(form.req_sales ? { sales_total: parseInt(form.req_sales)||0 } : {}),
        ...(form.req_reels_total ? { reels_total: parseInt(form.req_reels_total)||0 } : {}),
        ...(form.req_reels_month ? { reels_qualifying_month: parseInt(form.req_reels_month)||0 } : {}),
      },
      monthly_threshold_json: form.monthly_reels ? { reels_30d: parseInt(form.monthly_reels)||0 } : {},
    };
    const { error } = await supa.from('level_configs').update(updates).eq('level_key', level.level_key);
    setSaving(false);
    if (error) alert('Greška: ' + error.message);
    else onSave();
  }

  const theme = LEVEL_THEME[level.level_key];
  return (
    <div className="fixed inset-0 z-50 bg-bg0/90 backdrop-blur-xl flex items-start sm:items-center justify-center p-3 sm:p-6 overflow-y-auto" onClick={onClose}>
      <div className="glass-strong rounded-2xl max-w-md w-full p-6 my-auto" onClick={e=>e.stopPropagation()}>
        <div className="flex items-start justify-between mb-4">
          <h3 className="font-display font-black text-xl" style={{color:theme.color}}>{theme.emoji} {theme.name}</h3>
          <button onClick={onClose} className="text-2xl text-white/60">✕</button>
        </div>
        <div className="space-y-3">
          <EditField label="Provizija (%)" value={form.sales_commission_pct} onChange={v=>setForm({...form, sales_commission_pct:v})}/>
          <EditField label="Reel nagrada (centi, npr. 30 = 0.30 EUR)" value={form.reel_reward_cents} onChange={v=>setForm({...form, reel_reward_cents:v})}/>
          <EditField label="Min prodaja za prelazak na sledeci nivo" value={form.req_sales} onChange={v=>setForm({...form, req_sales:v})}/>
          <EditField label="Min reels (total) za prelazak" value={form.req_reels_total} onChange={v=>setForm({...form, req_reels_total:v})}/>
          <EditField label="Min kvalifikujucih reels (mesecno)" value={form.req_reels_month} onChange={v=>setForm({...form, req_reels_month:v})}/>
          <EditField label="Mesecni minimum reels (da ostane na nivou)" value={form.monthly_reels} onChange={v=>setForm({...form, monthly_reels:v})}/>
        </div>
        <div className="flex gap-2 mt-5">
          <button onClick={save} disabled={saving} className="flex-1 py-2.5 rounded-xl bg-gradient-to-r from-brand via-brand2 to-brand3 text-bg0 font-bold text-sm">
            {saving?'Snimam...':'💾 Sačuvaj'}
          </button>
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl bg-white/5 border border-white/10 text-sm">Otkaži</button>
        </div>
      </div>
    </div>
  );
}

function slugify(s) {
  return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'item';
}

// Notifikacije ON/OFF dugme — vidljivo i u Notifikacije strani, ne samo Profil
function NotificationToggle() {
  const [granted, setGranted] = useState(typeof Notification !== 'undefined' && Notification.permission === 'granted');
  const [denied, setDenied] = useState(typeof Notification !== 'undefined' && Notification.permission === 'denied');

  async function turnOn() {
    if (typeof Notification === 'undefined') { alert('Browser ne podržava notifikacije.'); return; }
    const r = await Notification.requestPermission();
    setGranted(r === 'granted');
    setDenied(r === 'denied');
    if (r === 'granted') alert('✓ Notifikacije uključene.');
  }

  if (denied) return (
    <div className="glass-strong rounded-2xl p-4 border border-danger/30">
      <div className="font-bold text-sm">🚫 Notifikacije su blokirane u browseru</div>
      <div className="text-[11px] text-white/60 mt-1">Idi u podešavanja browsera za ovaj sajt i dozvoli notifikacije.</div>
    </div>
  );

  return (
    <div className={"glass-strong rounded-2xl p-4 border " + (granted ? 'border-lime/40' : 'border-gold/40')}>
      <div className="flex items-center justify-between gap-3 flex-wrap">
        <div className="min-w-0">
          <div className="font-bold text-sm">{granted ? '✓ Notifikacije UKLJUČENE' : '🔔 Uključi notifikacije'}</div>
          <div className="text-[11px] text-white/60 mt-0.5">{granted ? 'Dobijaš obaveštenja i kad portal nije otvoren.' : 'Klikni da dozvoliš obaveštenja na telefonu/računaru.'}</div>
        </div>
        {!granted && (
          <button onClick={turnOn} className="px-4 py-2 rounded-lg bg-brand text-bg0 text-xs font-bold shrink-0">Uključi</button>
        )}
      </div>
    </div>
  );
}

function NotificationsPage({ athlete }) {
  const [list, setList] = useState([]);
  const [filter, setFilter] = useState('all');
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    if (athlete?.id) load();
    else setLoading(false); // admin nema athlete row — skidamo loading
  }, [athlete?.id]);

  async function load() {
    setLoading(true);
    const { data } = await supa.from('notifications').select('*').eq('athlete_id', athlete.id).order('created_at',{ascending:false}).limit(200);
    setList(data||[]);
    setLoading(false);
  }

  // Admin nema notifikacije
  if (!athlete?.id) return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">🔔 Notifikacije</h1>
        <p className="text-sm text-white/60">Admin nalog — koristi <a href="#/admin" className="text-brand underline">Admin panel</a> za slanje broadcast notifikacija i edit template-a.</p>
      </div>
      <div className="glass rounded-2xl p-8 text-center text-white/60">Admin nema lične notifikacije. 👑</div>
    </div>
  );
  async function markAllRead() {
    await supa.from('notifications').update({ read_at: new Date().toISOString() }).eq('athlete_id', athlete.id).is('read_at', null);
    load();
  }
  async function markOne(id) {
    await supa.from('notifications').update({ read_at: new Date().toISOString() }).eq('id', id);
    load();
  }
  async function del(id) {
    if (!confirm('Obrisati ovu notifikaciju?')) return;
    await supa.from('notifications').delete().eq('id', id);
    load();
  }

  const filtered = list.filter(n => {
    if (filter === 'unread') return !n.read_at;
    if (filter === 'urgent') return n.priority === 'celebration' || n.priority === 'high';
    return true;
  });
  const unreadCount = list.filter(n => !n.read_at).length;

  return (
    <div className="space-y-6">
      <div className="flex items-start justify-between gap-3">
        <div>
          <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">🔔 Notifikacije</h1>
          <p className="text-sm text-white/60">{unreadCount} nepročitanih · {list.length} ukupno</p>
        </div>
        {unreadCount > 0 && <button onClick={markAllRead} className="px-4 py-2 rounded-xl bg-brand text-bg0 text-xs font-bold shrink-0">Označi sve pročitano</button>}
      </div>

      {/* TOGGLE: ukljuci/iskljuci notifikacije */}
      <NotificationToggle/>

      <div className="flex gap-2 overflow-x-auto pb-1">
        {[['all','Sve'],['unread','Nepročitane'],['urgent','Hitne']].map(([k,l]) => (
          <button key={k} onClick={()=>setFilter(k)}
            className={"px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap " + (filter===k ? 'bg-brand text-bg0' : 'glass text-white/70 hover:bg-white/10')}>
            {l}
          </button>
        ))}
      </div>

      {loading ? (
        <div className="text-center py-10 text-white/50">Učitavam...</div>
      ) : filtered.length === 0 ? (
        <div className="glass rounded-2xl p-10 text-center text-white/60">
          {filter==='unread'?'Sve pročitano. 👌':filter==='urgent'?'Nema hitnih.':'Nema notifikacija. 🌙'}
        </div>
      ) : (
        <div className="space-y-2">
          {filtered.map(n => (
            <div key={n.id} className={"glass rounded-2xl p-4 flex items-start gap-3 " + (!n.read_at ? 'border border-brand/30 bg-brand/5' : '')}>
              <div className="text-3xl shrink-0">{n.icon || (n.priority==='celebration'?'🎉':n.priority==='high'?'⚡':'🔔')}</div>
              <div className="min-w-0 flex-1">

                  <div className={"font-bold text-sm " + (!n.read_at ? 'text-white' : 'text-white/70')}>{n.title}</div>
                  {n.priority === 'celebration' && <span className="text-[9px] px-1.5 py-0.5 rounded bg-brand3/20 text-brand3 font-black uppercase">Slavlje</span>}
                  {n.priority === 'high' && <span className="text-[9px] px-1.5 py-0.5 rounded bg-gold/20 text-gold font-black uppercase">High</span>}

          ))}
        </div>
      )}
    </div>
  );
}

function TestDailyReminderCard() {
  const [slot, setSlot] = useState('morning');
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);

  async function fire() {
    if (busy) return;
    setBusy(true); setMsg(null);
    try {
      const url = 'https://bauuhowpbrqqmojqnqbr.supabase.co/functions/v1/daily-reel-reminder?slot=' + slot;
      const { data: s } = await supa.auth.getSession();
      const token = s?.session?.access_token || '';
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token,
          'apikey': token
        }
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        setMsg({ type:'ok', text: `✅ ${slot.toUpperCase()} reminder poslat. Notified: ${data.notified||0}, Skipped: ${data.skipped_already_submitted||0}. Push stiže za 5-10s.` });
      } else {
        setMsg({ type:'err', text: `Greska ${res.status}: ${JSON.stringify(data)}` });
      }
    } catch(e) {
      setMsg({ type:'err', text: 'Greska: ' + (e.message || e) });
    } finally { setBusy(false); }
  }

  return (
    <div className="glass rounded-2xl p-4 border border-gold/30">
      <div className="flex items-center gap-2 mb-2">
        <div className="text-lg">🧪</div>
        <div className="font-bold text-sm">Test daily reminder (bez čekanja crona)</div>
      </div>
      <div className="text-[11px] text-white/60 mb-3">
        Rucno okini reminder za trenutak. Vidi da li push stize. Vecernji (21h) slot preskace atlete koji su vec postavili reel danas.
      </div>
      <div className="flex gap-2 flex-wrap mb-3">
        {[['morning','☀️ Jutro (8h)'], ['afternoon','🌤️ Popodne (17h)'], ['evening','🌙 Vece (21h)']].map(([k, l]) => (
          <button key={k} onClick={()=>setSlot(k)}

        ))}
      </div>
      <button onClick={fire} disabled={busy}
        className="w-full py-2.5 rounded-xl bg-gradient-to-r from-gold to-brand3 text-bg0 font-extrabold text-sm disabled:opacity-50">
        {busy ? 'Šaljem...' : '🚀 Okini ' + slot + ' reminder ODMAH'}

      {msg && (
        <div className={"mt-3 text-xs px-3 py-2 rounded-lg " + (msg.type==='ok' ? 'bg-lime/10 border border-lime/30 text-lime' : 'bg-danger/10 border border-danger/30 text-danger')}>
          {msg.text}
        </div>
      )}
    </div>
  );
}

function AdminNotifications() {
  const [audience, setAudience] = useState('all'); // all | level | specific
  const [level, setLevel] = useState('recruit');
  const [athleteIds, setAthleteIds] = useState([]);
  const [athleteSearch, setAthleteSearch] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [title, setTitle] = useState('');
  const [body, setBody] = useState('');
  const [icon, setIcon] = useState('🔔');
  const [priority, setPriority] = useState('normal');
  const [actionUrl, setActionUrl] = useState('');
  const [sending, setSending] = useState(false);
  const [lastResult, setLastResult] = useState(null);
  const [recentCampaigns, setRecentCampaigns] = useState([]);

  useEffect(()=>{ loadCampaigns(); }, []);

  async function loadCampaigns() {
    const { data } = await supa.from('notification_campaigns').select('*').order('created_at',{ascending:false}).limit(10);
    setRecentCampaigns(data||[]);
  }

  async function searchAthletes() {
    if (!athleteSearch || athleteSearch.length < 2) { setSearchResults([]); return; }
    const { data: rawAth } = await supa.from('athletes').select('id, level, name').limit(50);
    const ids = (rawAth||[]).map(a => a.id);
    const { data: profs } = ids.length ? await supa.from('profiles').select('id, full_name, email').in('id', ids) : { data: [] };
    const pMap = Object.fromEntries((profs||[]).map(p => [p.id, p]));
    const data = (rawAth||[]).map(a => ({ ...a, profiles: pMap[a.id] || { full_name: a.name, email: '' } }));
    const q = athleteSearch.toLowerCase();
    setSearchResults((data||[]).filter(a => {
      const name = (a.profiles?.full_name||'').toLowerCase();
      const email = (a.profiles?.email||'').toLowerCase();
      return name.includes(q) || email.includes(q);
    }));
  }
  useEffect(()=>{ const t = setTimeout(searchAthletes, 300); return () => clearTimeout(t); }, [athleteSearch]);

  async function send() {
    if (!title.trim()) { alert('Naslov obavezan'); return; }
    setSending(true);

    // Resolve target athletes
    let targetIds = [];
    if (audience === 'all') {
      const { data } = await supa.from('athletes').select('id').eq('status','active');
      targetIds = (data||[]).map(a => a.id);
    } else if (audience === 'level') {
      const { data } = await supa.from('athletes').select('id').eq('status','active').eq('level', level);
      targetIds = (data||[]).map(a => a.id);
    } else {
      targetIds = athleteIds;
    }

    if (targetIds.length === 0) { setSending(false); alert('Nema ciljanih atleta.'); return; }
    if (!confirm(`Poslati notifikaciju za ${targetIds.length} atleta?`)) { setSending(false); return; }

    // Insert notifications batch
    const rows = targetIds.map(id => ({
      athlete_id: id,
      type: 'admin_broadcast',
      title, body, icon, priority,
      action_url: actionUrl || null,
    }));

    // Batch insert u kockama od 500 (Supabase limit)
    let total = 0;
    for (let i = 0; i < rows.length; i += 500) {
      const chunk = rows.slice(i, i+500);
      const { error } = await supa.from('notifications').insert(chunk);
      if (error) { alert('Greška: ' + error.message); break; }
      total += chunk.length;
    }

    // DB trigger automatski salje push za svaki notification INSERT iznad.
    // NE zovemo invoke ovde da ne pravimo duplikat.

    // Sačuvaj kao campaign
    await supa.from('notification_campaigns').insert({
      name: title,
      audience_query: audience === 'all' ? { kind:'all' } : audience === 'level' ? { kind:'level', level } : { kind:'specific', ids: targetIds },
      custom_title: title, custom_body: body,
      sent_at: new Date().toISOString(), sent_count: total,

    setSending(false);
    setLastResult({ count: total });
    setTitle(''); setBody(''); setActionUrl('');
    loadCampaigns();

    <div className="space-y-5">

        🔔 Pošalji notifikaciju atletama. Stiže im real-time u portal + browser notification (ako su dozvolili).

          <div className="flex gap-2 flex-wrap">
            {[['all','Svi atleti'],['level','Po nivou'],['specific','Određene atlete']].map(([k,l]) => (
              <button key={k} onClick={()=>setAudience(k)}
                className={"px-4 py-2 rounded-xl text-xs font-bold " + (audience===k ? 'bg-brand text-bg0' : 'bg-white/5 text-white/70')}>{l}</button>
            ))}
          </div>
          {audience === 'level' && (
            <div className="mt-3">
              <EditField label="Nivo" type="select" options={['recruit','pro','commando','elite']} value={level} onChange={setLevel}/>

          {audience === 'specific' && (

              {searchResults.length > 0 && (
                <div className="space-y-1 max-h-40 overflow-y-auto">

              {athleteIds.length > 0 && (

};

async function sendTemplated(athleteId, key, vars = {}, actionUrl = null) {
  try {
    // Pomocni aliases — atomicno postavi sve varijante koje template moze imati
    const v = { ...vars };
    if (v.amount !== undefined) {
      v.amount_eur = v.amount; v.amount_e = v.amount; v.iznos = v.amount;
    }
    const interpolate = (s) => {
      if (!s) return '';
      // Podrzi i {{key}} i {key}
      return s
        .replace(/\{\{(\w+)\}\}/g, (m, k) => (v[k] !== undefined ? String(v[k]) : m))
        .replace(/\{(\w+)\}/g, (m, k) => (v[k] !== undefined ? String(v[k]) : m));
    };

    let tpl = null;
    try {
      const r = await supa.from('notification_templates').select('*').eq('key', key).maybeSingle();
      tpl = r.data;
    } catch(e){}

    // Ako template fali ILI je deaktiviran — koristi fallback (uvek šaljemo notifikaciju)
    if (!tpl || tpl.active === false) {
      const fb = NOTIF_FALLBACK[key] || { title: 'Notifikacija', body: '', icon: '🔔', priority: 'normal' };
      tpl = { title_tpl: fb.title, body_tpl: fb.body, icon: fb.icon, default_priority: fb.priority };
    }

    const title = interpolate(tpl.title_tpl);
    const body  = interpolate(tpl.body_tpl);
    const icon  = tpl.icon || '🔔';
    const priority = tpl.default_priority || 'normal';

    const { data: newNotif, error } = await supa.from('notifications').insert({
      athlete_id: athleteId,
      type: key,
      title, body, icon, priority,
      action_url: actionUrl,
    }).select().single();
    if (error) { console.error('Notif insert greška:', error); return; }

    // DB trigger (portal-PUSH-BULLETPROOF-SQL) automatski salje push pri INSERT.
    // NE pozivamo invoke odavde jer bi pravilo duplikate.
    console.log('[VAMIT] notif inserted, DB trigger handles push:', key);
  } catch(e) { console.error('sendTemplated err:', e); }
}

// Helper: enrich any list of rows that have athlete_id sa profile + athlete podacima
// Resava bag: profiles!reels_athlete_id_fkey ne radi jer FK ide na athletes, ne profiles
async function enrichWithAthletes(rows) {
  if (!rows || rows.length === 0) return [];
  const ids = Array.from(new Set(rows.map(r => r.athlete_id).filter(Boolean)));
  if (ids.length === 0) return rows;
  const [{ data: athletes }, { data: profiles }] = await Promise.all([
    supa.from('athletes').select('id, level, status, promo_code, name, email, bank_full_name, bank_iban, bank_name, bank_phone, rewardful_token').in('id', ids),
    supa.from('profiles').select('id, full_name, email').in('id', ids)
  ]);
  const aMap = Object.fromEntries((athletes||[]).map(a => [a.id, a]));
  const pMap = Object.fromEntries((profiles||[]).map(p => [p.id, p]));
  return rows.map(r => ({
    ...r,
    athlete: aMap[r.athlete_id] || null,
    profile: pMap[r.athlete_id] || null,
    profiles: pMap[r.athlete_id] || null,    // back-compat
    athletes: aMap[r.athlete_id] || null     // back-compat
  }));
}

// === DYNAMIC FAQ EDITOR — add/remove pitanja, cuva kao JSON niz u s8_faq_items ===
function FaqDynamicEditor() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);

  useEffect(() => { load(); }, []);
  async function load() {
    setLoading(true);
    const { data } = await supa.from('landing_content').select('value').eq('key', 's8_faq_items').maybeSingle();
    let arr = [];
    if (data?.value) {
      try { arr = JSON.parse(data.value); } catch(e) { arr = []; }
    }
    if (!Array.isArray(arr) || arr.length === 0) {
      // Default seed iz starih s8_q*/a* polja
      const seedKeys = ['s8_q1','s8_a1','s8_q2','s8_a2','s8_q3','s8_a3','s8_q4','s8_a4','s8_q5','s8_a5'];
      const { data: legacy } = await supa.from('landing_content').select('key,value').in('key', seedKeys);
      const map = {};
      (legacy||[]).forEach(r=>map[r.key]=r.value);
      arr = [];
      for (let i=1; i<=5; i++) {
        const q = (map['s8_q'+i]||'').trim();
        const a = (map['s8_a'+i]||'').trim();
        if (q || a) arr.push({ q, a });
      }
    }
    setItems(arr);
    setLoading(false);
  }

  function updateItem(idx, field, val) {
    const next = [...items];
    next[idx] = { ...next[idx], [field]: val };
    setItems(next);
  }
  function addItem() {
    setItems([...items, { q: '', a: '' }]);
  }
  function removeItem(idx) {
    if (!confirm('Obrisati ovo pitanje?')) return;
    setItems(items.filter((_,i) => i !== idx));
  }
  function moveItem(idx, dir) {
    const next = [...items];
    const target = idx + dir;
    if (target < 0 || target >= next.length) return;
    [next[idx], next[target]] = [next[target], next[idx]];
    setItems(next);
  }

  async function saveAll() {
    setSaving(true); setMsg(null);
    // Filtriraj prazne
    const clean = items.filter(it => (it.q||'').trim() || (it.a||'').trim());
    const { error } = await supa.from('landing_content').upsert({
      key: 's8_faq_items', value: JSON.stringify(clean), updated_at: new Date().toISOString()
    }, { onConflict: 'key' });
    setSaving(false);
    if (error) setMsg({ type:'err', text: 'Greska: ' + error.message });
    else setMsg({ type:'ok', text: '✓ ' + clean.length + ' pitanja sačuvano' });
  }

  if (loading) return <div className="text-center py-4 text-white/50 text-sm">Učitavam pitanja...</div>;

  return (
    <div className="space-y-3 mt-2">
      <div className="glass rounded-xl p-3 text-[11px] text-white/70 border border-brand/20">
        💡 Dodaj koliko hoćeš pitanja. Klikni "+ Dodaj pitanje" za novo. Strelice menjaju redosled. Po završetku klikni "💾 Sačuvaj sve" dole.
      </div>

      {items.map((item, idx) => (
        <div key={idx} className="glass-strong rounded-2xl p-4 border border-white/10 space-y-3">
          <div className="flex items-center justify-between gap-2">
            <div className="font-bold text-sm text-brand">Pitanje #{idx+1}</div>
            <div className="flex gap-1">
              <button onClick={()=>moveItem(idx, -1)} disabled={idx===0}
                className="px-2 py-1 rounded bg-white/5 text-xs disabled:opacity-30">↑</button>
              <button onClick={()=>moveItem(idx, 1)} disabled={idx===items.length-1}
                className="px-2 py-1 rounded bg-white/5 text-xs disabled:opacity-30">↓</button>
              <button onClick={()=>removeItem(idx)}
                className="px-3 py-1 rounded bg-danger/15 border border-danger/40 text-danger text-xs font-bold">✕ Obriši</button>
            </div>
          </div>
          <input
            value={item.q || ''}
            onChange={e=>updateItem(idx, 'q', e.target.value)}
            placeholder="Pitanje (npr. Koliko brzo mogu počati?)"
            className="w-full px-3 py-2.5 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm font-bold"/>
          <textarea
            value={item.a || ''}
            onChange={e=>updateItem(idx, 'a', e.target.value)}
            placeholder="Odgovor..."
            rows={3}
            className="w-full px-3 py-2.5 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm resize-none"/>
        </div>
      ))}

      <button onClick={addItem}
        className="w-full py-3 rounded-xl bg-brand/15 border border-brand/40 text-brand font-bold text-sm">
        + Dodaj novo pitanje
      </button>

      <div className="flex gap-2 sticky bottom-2">
        <button onClick={saveAll} disabled={saving}
          className="flex-1 py-3 rounded-xl bg-gradient-to-r from-brand to-brand2 text-bg0 font-extrabold text-sm disabled:opacity-50">
          {saving ? 'Snimam...' : '💾 Sačuvaj sva pitanja'}
        </button>
      </div>

      {msg && (
        <div className={"text-xs px-3 py-2 rounded-lg " + (msg.type==='ok' ? 'bg-lime/10 border border-lime/30 text-lime' : 'bg-danger/10 border border-danger/30 text-danger')}>
          {msg.text}
        </div>
      )}
    </div>
  );
}

      {AFFILIATE_SECTIONS.map((sec, i) => {
        // Filter sections by search
        const q = search.toLowerCase().trim();
        const filteredKeys = q
          ? sec.keys.filter(f =>
              f.label.toLowerCase().includes(q) ||
              f.key.toLowerCase().includes(q) ||
              (values[f.key] || f.placeholder || '').toLowerCase().includes(q))
          : sec.keys;
        if (q && filteredKeys.length === 0) return null;
        const isOpen = q ? true : openSec[i]; // auto-open when searching

        return (
          <div key={i} className="glass-strong rounded-2xl overflow-hidden">
            <button onClick={() => setOpenSec({ ...openSec, [i]: !openSec[i] })}
              className="w-full p-4 flex items-center justify-between hover:bg-white/5">
              <div className="font-display font-bold text-base text-left">
                {sec.title}
                <span className="ml-2 text-xs text-white/40">({filteredKeys.length})</span>
              </div>
              <div className="text-2xl text-white/40">{isOpen ? '▼' : '▶'}</div>
            </button>
            {isOpen && (
              <div className="border-t border-white/5 p-4 space-y-3">
                {filteredKeys.map(field => (
                  <SettingRow key={field.key}
                    setting={{ key: field.key, label: field.label, placeholder: field.placeholder }}
                    value={values[field.key] || ''}
                    saved={savedKey === field.key}
                    textarea={field.textarea}
                    onChange={v => setValues({ ...values, [field.key]: v })}
                    onSave={() => saveSetting(field.key, values[field.key] || '')}
                  />
                ))}
                {/* Dinamicki FAQ editor — samo u FAQ sekciji */}
                {sec.isFaqEditor && <FaqDynamicEditor/>}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function AdminLanding() {
  const [values, setValues] = useState({});
  const [loading, setLoading] = useState(true);
  const [savedKey, setSavedKey] = useState(null);
  const [openSec, setOpenSec] = useState({ 0:true });

  useEffect(()=>{ load(); }, []);

  async function load() {
    setLoading(true);
    const allKeys = LANDING_SECTIONS.flatMap(s => s.keys.map(k => k.key));
    const { data } = await supa.from('settings').select('key, value').in('key', allKeys);
    const map = {};
    (data||[]).forEach(r => { map[r.key] = typeof r.value === 'string' ? r.value : (r.value?.v ?? JSON.stringify(r.value)); });
    setValues(map);
    setLoading(false);
  }

  async function saveSetting(key, value) {
    const { error } = await supa.from('settings').upsert({ key, value, updated_at: new Date().toISOString() }, { onConflict: 'key' });
    if (!error) { setSavedKey(key); setTimeout(()=>setSavedKey(null), 1500); }
    else alert('Greška: ' + error.message);
  }

  if (loading) return <div className="text-center py-10 text-white/50">Učitavam...</div>;

  return (
    <div className="space-y-4">
      <div className="glass rounded-2xl p-4 text-xs text-white/70 border border-brand/20">
        📝 Ovde edituješ <b>VAMIT-5 Athlete Portal</b> — sav tekst koji atlete vide. Promene su <b>odmah aktivne</b> — atleta refresh-uje portal i vidi novo. Svaka kartica = jedna stranica.
      </div>

      <div className="glass rounded-2xl p-4 border border-gold/20">
        <div className="flex items-center justify-between gap-3 flex-wrap">
          <div>
            <div className="text-sm font-bold">🔗 Pregled portala uživo</div>
            <div className="text-[11px] text-white/60">Otvori novi tab da vidiš trenutno stanje</div>
          </div>
          <a href="https://vamit-5-portal.vercel.app/" target="_blank" rel="noopener" className="px-4 py-2 rounded-xl bg-gold/15 border border-gold/40 text-gold text-xs font-bold">Otvori portal ↗</a>
        </div>
      </div>

      {LANDING_SECTIONS.map((sec, i) => (
        <div key={i} className="glass-strong rounded-2xl overflow-hidden">
          <button onClick={()=>setOpenSec({...openSec, [i]: !openSec[i]})}
            className="w-full p-4 flex items-center justify-between hover:bg-white/5">
            <div className="font-display font-bold text-base text-left">{sec.title}</div>
            <div className="text-2xl text-white/40">{openSec[i] ? '▼' : '▶'}</div>
          </button>
          {openSec[i] && (
            <div className="border-t border-white/5 p-4 space-y-3">
              {sec.keys.map(field => (
                <SettingRow key={field.key}
                  setting={{ key:field.key, label:field.label, placeholder:field.placeholder }}
                  value={values[field.key]||''}
                  saved={savedKey===field.key}
                  textarea={field.textarea}
                  onChange={v=>setValues({...values, [field.key]:v})}
                  onSave={()=>saveSetting(field.key, values[field.key]||'')}
                />
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// === Velika verzija Reels Queue — brzo odobravanje ===
function AdminReelsQueueLarge() {
  const [reels, setReels] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    load();
    const ch = supa.channel('reels_queue')
      .on('postgres_changes', { event:'*', schema:'public', table:'reels' }, load)
      .subscribe();
    return () => { try { ch.unsubscribe(); } catch(e){} };
  }, []);

  async function load() {
    setLoading(true);
    const { data } = await supa.from('reels').select('*')
      .eq('status','pending').order('submitted_at', { ascending: true }).limit(100);
    setReels(await enrichWithAthletes(data || []));
    setLoading(false);
  }

  const [processingId, setProcessingId] = useState(null);
  const [flash, setFlash] = useState(null);

  async function decide(id, status, reason=null) {
    const reel = reels.find(r => r.id === id);
    if (!reel) { alert('Reel nije pronaden u listi.'); return; }

    setProcessingId(id);
    try {
      // KORAK 1: Update reel status
      const { error: updateErr } = await supa.from('reels').update({
        status, reviewed_at: new Date().toISOString(), reject_reason: reason
      }).eq('id', id);
      if (updateErr) throw new Error('Reel update fail: ' + updateErr.message);

      if (status === 'approved') {
        // KORAK 2: Nadji reel reward iz level configa
        const lvl = reel.athlete?.level || reel.athletes?.level || 'recruit';
        const { data: cfg } = await supa.from('level_configs').select('reel_reward_cents').eq('level_key', lvl).maybeSingle();
        const reward = cfg?.reel_reward_cents || 30;

        // KORAK 3: Insert earnings + bodovi (SAMO JEDAN PUT — dedup po ref_id)
        const r3 = await insertReelEarningsOnce(reel.athlete_id, id, reward);
        if (r3.error) throw new Error('Earnings insert fail: ' + (r3.error.message || r3.error));

        // KORAK 5: Posalji notifikaciju (ne baci ako fali — vec smo upisali earnings)
        try {
          await sendTemplated(reel.athlete_id, 'reel_approved', { amount: (reward/100).toFixed(2) }, '#/isplate');
        } catch(e) { console.warn('Notif failed:', e); }

        // KORAK 6: Achievement engine
        try { await triggerEngine(reel.athlete_id); } catch(e) { console.warn('engine failed:', e); }

        setFlash({ type:'ok', text:`✅ ODOBRENO + €${(reward/100).toFixed(2)} + 10 BODOVA.` });
      } else if (status === 'rejected') {
        try {
          await sendTemplated(reel.athlete_id, 'reel_rejected', { reason: reason || 'Tvoj reel ne ispunjava uslove.' }, '#/reels');
        } catch(e) { console.warn('Notif failed:', e); }
        setFlash({ type:'ok', text:'❌ Odbijeno + atleta obavestena.' });
      }

      setTimeout(()=>setFlash(null), 4000);
      await load();
    } catch(e) {
      console.error(e);
      alert('❌ GREŠKA: ' + e.message + '\n\nProveri da li si pokrenuo BULLETPROOF RLS SQL.');
      setFlash({ type:'err', text: e.message });
      setTimeout(()=>setFlash(null), 6000);
    } finally {
      setProcessingId(null);
    }
  }

  if (loading) return <div className="text-center py-12 text-white/50">Učitavam...</div>;

  return (
    <div className="space-y-3">
      {flash && (
        <div className={"p-4 rounded-xl text-sm font-bold " + (flash.type==='ok' ? 'bg-lime/15 border border-lime/40 text-lime' : 'bg-danger/15 border border-danger/40 text-danger')}>
          {flash.text}
        </div>
      )}
      {reels.length === 0 ? (
        <div className="glass rounded-2xl p-12 text-center text-white/60 text-lg">✓ Nema reels-ova za review. 👌</div>
      ) : reels.map(r => {
        const lvl = r.athlete?.level || r.athletes?.level || 'recruit';
        const theme = LEVEL_THEME[lvl];
        const isProcessing = processingId === r.id;
        return (
          <div key={r.id} className="glass-strong rounded-2xl p-5 border" style={{borderColor: theme.color+'20'}}>
            <div className="flex items-start justify-between gap-3 mb-3">
              <div className="flex items-center gap-3 min-w-0 flex-1">
                <div className="text-3xl shrink-0">{theme.emoji}</div>
                <div className="min-w-0">
                  <div className="font-bold text-base truncate">{r.profile?.full_name || r.profiles?.full_name || r.profile?.email || r.profiles?.email}</div>
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-xs font-bold" style={{color: theme.color}}>{theme.name}</span>
                    <span className="text-[11px] text-white/40">· {fromNow(r.submitted_at)}</span>
                  </div>
                </div>
              </div>
            </div>
            <a href={r.url} target="_blank" rel="noopener" className="block px-4 py-3 rounded-xl bg-bg0 border border-brand/20 hover:border-brand/60 text-sm text-brand break-all mb-3 transition">
              🔗 {r.url}
            </a>
            {r.caption && <div className="text-xs text-white/60 mb-3 italic">"{r.caption}"</div>}
            <div className="flex gap-3">
              <button onClick={()=>decide(r.id, 'approved')} disabled={isProcessing}
                className="flex-1 py-4 rounded-xl bg-lime/20 border-2 border-lime/50 text-lime font-black text-base hover:bg-lime/30 transition disabled:opacity-50">
                {isProcessing ? '⏳ Obrađujem...' : '✓ ODOBRI'}
              </button>
              <button onClick={()=>{ const reason = prompt('Razlog odbijanja:'); if (reason) decide(r.id, 'rejected', reason); }} disabled={isProcessing}
                className="flex-1 py-4 rounded-xl bg-danger/20 border-2 border-danger/50 text-danger font-black text-base hover:bg-danger/30 transition disabled:opacity-50">
                ✗ ODBIJ
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
}
