// === AUTH ===
function useAuth() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [athlete, setAthlete] = useState(null);
  const [loading, setLoading] = useState(true);

  async function refreshProfile(uid) {
    if (!uid) { setProfile(null); setAthlete(null); return; }
    try {
      // 1. Probaj da povuces profile + athlete
      let [{ data: prof }, { data: ath }] = await Promise.all([
        supa.from('profiles').select('*').eq('id', uid).maybeSingle(),
        supa.from('athletes').select('*').eq('id', uid).maybeSingle()
      ]);

      // 2. FALLBACK: ako fali profile, auto-kreiraj (resava bug kad Rewardful webhook nije fired)
      if (!prof) {
        const { data: u } = await supa.auth.getUser();
        const email = u?.user?.email || '';
        const isAdmin = email.toLowerCase() === 'vamit5.team@gmail.com';
        const username = email.split('@')[0] || 'atleta';
        const { data: newProf } = await supa.from('profiles').insert({
          id: uid,
          email,
          full_name: username,
          role: isAdmin ? 'super_admin' : 'athlete'
        }).select().single();
        prof = newProf;
        console.log('[VAMIT] Auto-created profile for', email);
      }

      // 3. FALLBACK: ako nije admin a fali athlete row, auto-kreiraj
      if (!ath && prof && prof.role !== 'super_admin') {
        const username = prof.email?.split('@')[0] || 'atleta';
        const promoBase = username.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 12) || 'ATHLETE';
        // Probaj unique promo_code
        let promo = promoBase;
        for (let i = 0; i < 10; i++) {
          const { data: existing } = await supa.from('athletes').select('id').eq('promo_code', promo).maybeSingle();
          if (!existing) break;
          promo = promoBase + (i+1);
        }
        const now = new Date();
        const intro = new Date(now.getTime() + 60*24*60*60*1000);
        const { data: newAth } = await supa.from('athletes').insert({
          id: uid,
          status: 'active',
          level: 'recruit',
          promo_code: promo,
          email: prof.email,
          name: prof.full_name,
          joined_at: now.toISOString(),
          level_started_at: now.toISOString(),
          recruit_intro_period_until: intro.toISOString()
        }).select().single();
        ath = newAth;
        console.log('[VAMIT] Auto-created athlete row for', prof.email);
      }

      setProfile(prof);
      setAthlete(ath);
    } catch(e) { console.error('profile load fail:', e); }
  }

  useEffect(() => {
    // === BULLETPROOF SESSION INIT za PWA cold start (iOS + Android) ===
    // Bez ovoga: getSession() ponekad hangje na mobile PWA cold start-u jer je
    // IndexedDB jos "hladan" → setLoading(false) nikad ne fajruje → blank ekran.
    // Fix: timeout + .catch() garantuju da loading prestane u svakom slucaju.
    let finished = false;
    const finish = () => { if (!finished) { finished = true; setLoading(false); } };

    // Safety timeout — ako nista ne odgovori za 3 sekunde, oslobodi UI
    const timeoutId = setTimeout(() => {
      if (!finished) {
        console.warn('[useAuth] getSession timeout — proceeding without cached session');
        finish();
      }
    }, 3000);

    supa.auth.getSession().then(async ({ data }) => {
      try {
        const u = data.session?.user || null;
        setUser(u);
        if (u) await refreshProfile(u.id);
      } catch (e) {
        console.error('[useAuth] session init err:', e);
      }
      finish();
    }).catch(err => {
      console.error('[useAuth] getSession fail:', err);
      finish();
    });

    const { data: sub } = supa.auth.onAuthStateChange(async (_, session) => {
      const u = session?.user || null;
      setUser(u);
      if (u) await refreshProfile(u.id);
      else { setProfile(null); setAthlete(null); }
      // Redundant safety — ako je getSession() hangovao a auth state stigne, oslobodi UI
      finish();
    });

    return () => {
      clearTimeout(timeoutId);
      sub.subscription.unsubscribe();
    };
  }, []);

  return { user, profile, athlete, loading, refreshProfile };
}

// Tekstovi se snimaju u public.settings tabelu pod kljucevima portal_*
// Portal komponente koriste t('key', 'fallback') da povuku tekst
window.__PORTAL_TEXTS__ = window.__PORTAL_TEXTS__ || {};
function t(key, fallback) {
  const v = window.__PORTAL_TEXTS__[key];
  if (v === undefined || v === null || v === '') return fallback || '';
  return v;
}
// Interpolacija u CMS tekstovima — {x} → vars.x
function tInterp(key, fallback, vars) {
  let s = t(key, fallback);
  if (!vars) return s;
  Object.keys(vars).forEach(k => {
    s = s.split('{' + k + '}').join(String(vars[k]));
  });
  return s;
}
async function loadPortalTexts() {
  try {
    const { data } = await supa.from('settings').select('key, value').like('key', 'portal_%');
    const map = {};
    (data || []).forEach(r => {
      let v = r.value;
      if (typeof v === 'object' && v !== null && 'v' in v) v = v.v;
      if (typeof v === 'string') map[r.key] = v;
      else if (v !== null && v !== undefined) map[r.key] = String(v);
    });
    window.__PORTAL_TEXTS__ = map;
    console.log('[VAMIT] Loaded', Object.keys(map).length, 'portal texts');
    window.dispatchEvent(new Event('portal-texts-loaded'));

// Robusan parser za bilo kakav error oblik
function parseAuthError(error) {
  if (!error) return null;
  let msg = '';
  try {
    if (typeof error === 'string') msg = error;
    else if (error.message && typeof error.message === 'string') msg = error.message;
    else if (error.error_description) msg = error.error_description;
    else if (error.msg) msg = error.msg;
    else if (error.error) msg = typeof error.error === 'string' ? error.error : (error.error.message || '');
    else {
      const s = JSON.stringify(error);
      msg = (s && s !== '{}' && s !== 'null') ? s : '';
    }
  } catch(e) { msg = String(error); }
  if (!msg || msg === '{}' || msg === 'undefined' || msg === 'null') return null;
  return msg;
}

        .select('id, name, promo_code').ilike('promo_code', ref).maybeSingle();
      if (e1) console.warn('athletes lookup err:', e1);
      if (refAth) {
        try { localStorage.setItem('vamit_ref', refAth.promo_code); } catch(e){}
        const { data: refProf } = await supa.from('profiles').select('full_name, avatar_url').eq('id', refAth.id).maybeSingle();
        setInviter({ name: refProf?.full_name || refAth.name || refAth.promo_code, avatar: refProf?.avatar_url });
        console.log('[VAMIT] Inviter found:', refProf?.full_name || refAth.promo_code);
      } else {
        console.log('[VAMIT] Inviter not found for promo:', ref);
      }
    }
    loadInviter();
  }, []);

  async function sendCode(e) {
    e.preventDefault();
    setLoading(true); setErr(null);
    let rawError = null;
    try {
      const r = await supa.auth.signInWithOtp({
        email: email.trim().toLowerCase(),
        options: { shouldCreateUser: true }
      });
      rawError = r.error;
    } catch(ex) { rawError = ex; }
    setLoading(false);
    console.log('[LOGIN sendCode] error:', rawError);

    if (rawError) {
      const msg = parseAuthError(rawError);
      let friendly;
      if (!msg) {
        // Prazan/nepoznat error
        friendly = '⚠️ Email login nije uspeo. Verovatni razlozi: (1) Rate limit — sačekaj 5-10 min, (2) Email Provider u Supabase je isključen — admin treba da ga upali.';
      } else if (msg.includes('rate limit') || msg.includes('too many') || msg.includes('over_email_send_rate_limit')) {
        friendly = '⏳ Previše pokušaja. Sačekaj 5-10 minuta pa probaj opet.';
      } else if (msg.includes('Signups not allowed') || msg.includes('Email signups are disabled') || msg.includes('signup is disabled')) {
        friendly = '⚠️ Registracija nije uključena u Supabase. Admin treba da upali Email Provider.';
      } else if (msg.toLowerCase().includes('invalid email')) {
        friendly = 'Email nije validan. Proveri ga još jednom.';
      } else {
        friendly = msg;
      }
      setErr(friendly);
    } else {
      setStep("code");
    }
  }

  async function verifyCode(e) {
    e.preventDefault();
    setLoading(true); setErr(null);
    let rawError = null;
    try {
      const r = await supa.auth.verifyOtp({
        email: email.trim().toLowerCase(),
        token: code.trim(),
        type: 'email'
      });
      rawError = r.error;
    } catch(ex) { rawError = ex; }
    setLoading(false);
    console.log('[LOGIN verifyCode] error:', rawError);

    if (rawError) {
      const msg = parseAuthError(rawError) || 'Pogrešan kod ili greška.';
      let friendly = msg;
      if (msg.includes('expired') || msg.includes('Token has expired')) friendly = 'Kod je istekao. Zatraži novi.';
      else if (msg.toLowerCase().includes('invalid') || msg.includes('Token not found')) friendly = 'Kod nije ispravan. Proveri ga još jednom.';
      setErr(friendly);
    } else {
      window.location.hash = '#/dashboard';
    }
  }

  return (
    <div className="relative z-10 min-h-[80vh] flex items-center justify-center px-4 py-8">
      <div className="w-full max-w-md">
        {/* POZVAO TE BANNER */}
        {inviter && (
          <div className="glass-strong rounded-2xl p-4 mb-4 border border-brand/30 flex items-center gap-3">
            <div className="w-10 h-10 rounded-full overflow-hidden bg-bg0 border border-brand/40 shrink-0">
              {inviter.avatar
                ? <img src={inviter.avatar} alt="" className="w-full h-full object-cover"/>
                : <div className="w-full h-full flex items-center justify-center text-lg">👤</div>}
            </div>
            <div className="min-w-0">
              <div className="text-[10px] uppercase tracking-wider text-brand font-bold">Pozvao te</div>
              <div className="font-display font-black text-sm truncate">{inviter.name}</div>
              <div className="text-[10px] text-white/60">Ulaziš u njegov tim — on dobija 15% provizije od tvoje prodaje.</div>
            </div>
          </div>
        )}

        <div className="glass-strong rounded-3xl p-8 sm:p-10">
          <h1 className="font-display text-2xl sm:text-3xl font-black mb-2">Prijavi se</h1>
          {step==="email" && (
            <>
              <p className="text-sm text-white/60 mb-6">Unesi email — šaljemo ti 6-cifreni kod. <b>Radi i za nove atlete</b> (automatski kreiramo nalog).</p>
              <form onSubmit={sendCode} className="space-y-4">
                <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="tvoj@email.com"
                  className="w-full px-4 py-3 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm"/>
                {err && <div className="text-sm text-danger bg-danger/10 border border-danger/30 rounded-lg px-3 py-2">{err}</div>}
                <button type="submit" disabled={loading||!email}
                  className="w-full py-3.5 rounded-xl font-extrabold text-bg0 bg-gradient-to-r from-brand via-brand2 to-brand3 disabled:opacity-50">
                  {loading ? "Šaljem..." : "Pošalji kod na email"}
                </button>
              </form>
            </>
          )}
          {step==="code" && (
            <>
              <p className="text-sm text-white/60 mb-1">Kod je poslat na <b className="text-brand">{email}</b></p>
              <p className="text-xs text-white/50 mb-6">Otvori email (proveri i SPAM!) i ukucaj kod.</p>
              <form onSubmit={verifyCode} className="space-y-4">
                <input type="text" inputMode="numeric" autoComplete="one-time-code" required value={code}
                  onChange={e=>setCode(e.target.value.replace(/\s/g,''))} placeholder="123456" maxLength={10}
                  className="w-full px-4 py-3 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-center text-2xl tracking-[0.3em] font-bold"/>

function NotificationBell({ athlete }) {
  const [open, setOpen] = useState(false);
  const [notifs, setNotifs] = useState([]);
  const [unread, setUnread] = useState(0);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    if (!athlete?.id) return;
    load();
    const ch = supa.channel('notif_' + athlete.id)
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'notifications', filter: 'athlete_id=eq.'+athlete.id }, (payload) => {
        const n = payload.new;
        // Postuj atleti notification prefs
        const prefs = athlete?.notification_prefs || {};
        if (prefs[n.type] === false) return; // atleta iskljucio ovaj tip
        setNotifs(prev => [n, ...prev].slice(0, 30));
        setUnread(u => u + 1);
        setToast(n);
        setTimeout(()=>setToast(null), 5000);
        // Browser notification ako je dozvoljeno
        try {
          if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
            new Notification(n.title, { body: n.body || '', icon: '/favicon.ico' });
          }
        } catch(e){}
      })
      .subscribe();
    return () => { try { ch.unsubscribe(); } catch(e){} };
  }, [athlete?.id]);

  async function load() {
    const { data } = await supa.from('notifications').select('*').eq('athlete_id', athlete.id).order('created_at',{ascending:false}).limit(30);
    setNotifs(data||[]);
    setUnread((data||[]).filter(n => !n.read_at).length);
  }

  async function markAllRead() {
    await supa.from('notifications').update({ read_at: new Date().toISOString() }).eq('athlete_id', athlete.id).is('read_at', null);
    setNotifs(prev => prev.map(n => ({ ...n, read_at: n.read_at || new Date().toISOString() })));
    setUnread(0);
  }
  async function markOne(id) {
    await supa.from('notifications').update({ read_at: new Date().toISOString() }).eq('id', id);
    setNotifs(prev => prev.map(n => n.id === id ? { ...n, read_at: new Date().toISOString() } : n));
    setUnread(u => Math.max(0, u-1));
  }
  async function requestPush() {
    try {
      if (typeof Notification === 'undefined') return;
      const p = await Notification.requestPermission();
      if (p === 'granted') alert('✓ Browser notifikacije uključene');
    } catch(e){}
  }

  if (!athlete?.id) return null;

  return (
    <>
      <button onClick={()=>setOpen(o=>!o)} className="relative p-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10">
        <span className="text-lg">🔔</span>
        {unread > 0 && (
          <span className="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-danger text-bg0 text-[10px] font-black flex items-center justify-center">{unread > 99 ? '99+' : unread}</span>
        )}
      </button>

      {open && (
        <div className="fixed sm:absolute inset-0 sm:inset-auto sm:top-14 sm:right-4 sm:w-96 sm:max-h-[70vh] z-50 sm:rounded-2xl bg-bg0/95 sm:bg-bg0/98 backdrop-blur-xl border border-white/10 shadow-2xl overflow-hidden flex flex-col"
             style={{paddingTop: 'env(safe-area-inset-top, 0px)'}}
             onClick={e=>e.stopPropagation()}>
          <div className="flex items-center justify-between p-4 border-b border-white/10">
            <div className="font-display font-black text-base">🔔 Notifikacije</div>
            <div className="flex items-center gap-2">
              {unread > 0 && <button onClick={markAllRead} className="text-[10px] text-brand font-bold">Označi sve pročitano</button>}
              <button onClick={()=>setOpen(false)}
                className="w-11 h-11 flex items-center justify-center rounded-lg bg-white/10 border border-white/15 text-xl font-black active:scale-95">✕</button>
            </div>
          </div>
          <div className="overflow-y-auto flex-1">
            {notifs.length === 0 ? (
              <div className="text-center py-12 text-sm text-white/50">Nema notifikacija. Sve je tiho. 🌙</div>
            ) : (
              <div>
                {notifs.map(n => (
                  <button key={n.id} onClick={()=>{markOne(n.id); if (n.action_url) window.location.hash = n.action_url;}}
                    className={"w-full text-left px-4 py-3 border-b border-white/5 hover:bg-white/5 flex items-start gap-3 " + (!n.read_at ? 'bg-brand/5' : '')}>
                    <div className="text-2xl shrink-0">{n.icon || (n.priority==='celebration'?'🎉':n.priority==='high'?'⚡':'🔔')}</div>
                    <div className="min-w-0 flex-1">
                      <div className="flex items-center gap-2">
                        <div className={"font-bold text-sm truncate " + (!n.read_at ? 'text-white' : 'text-white/70')}>{n.title}</div>
                        {!n.read_at && <div className="w-2 h-2 rounded-full bg-brand shrink-0"></div>}
                      </div>
                      {n.body && <div className="text-[11px] text-white/60 line-clamp-2 mt-0.5">{n.body}</div>}
                      <div className="text-[10px] text-white/40 mt-1">{fromNow(n.created_at)}</div>
                    </div>
                  </button>
                ))}
              </div>
            )}
          </div>
          <div className="p-3 border-t border-white/10 flex gap-2">
            <a href="#/notifikacije" onClick={()=>setOpen(false)} className="flex-1 text-center px-3 py-2 rounded-lg bg-brand/15 text-brand text-xs font-bold">Vidi sve</a>
            {typeof Notification !== 'undefined' && Notification.permission !== 'granted' && (
              <button onClick={requestPush} className="px-3 py-2 rounded-lg bg-white/5 text-xs">🔔 Allow Browser</button>
            )}
          </div>
        </div>
      )}

      {toast && <NotificationToast notif={toast} onClose={()=>setToast(null)}/>}
    </>
  );
}

function NotificationToast({ notif, onClose }) {
  const priorityStyle = {
    celebration: { border:'border-brand3/60', glow:'rgba(255,59,154,0.4)' },
    high:        { border:'border-gold/60',   glow:'rgba(255,194,75,0.4)' },
    normal:      { border:'border-brand/60',  glow:'rgba(0,240,255,0.4)' },
    low:         { border:'border-white/20',  glow:'rgba(255,255,255,0.2)' },
  }[notif.priority || 'normal'];
  return (
    <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[70] max-w-sm w-[calc(100%-2rem)] animate-bounce-in">
      <button onClick={()=>{ if (notif.action_url) window.location.hash = notif.action_url; onClose();}}
        className={"w-full glass-strong rounded-2xl p-4 border-2 text-left shadow-2xl " + priorityStyle.border}
        style={{boxShadow: '0 0 60px ' + priorityStyle.glow}}>
        <div className="flex items-start gap-3">
          <div className="text-3xl">{notif.icon || (notif.priority==='celebration'?'🎉':notif.priority==='high'?'⚡':'🔔')}</div>
          <div className="min-w-0 flex-1">
            <div className="font-display font-black text-sm">{notif.title}</div>
            {notif.body && <div className="text-xs text-white/70 mt-1 line-clamp-2">{notif.body}</div>}
          </div>
          <button onClick={(e)=>{e.stopPropagation(); onClose();}} className="text-white/50 text-lg shrink-0">✕</button>
        </div>
      </button>
    </div>
  );
}

// === MOJE REFERENCE (Rewardful — probni period korisnika preko atletinog linka) ===
function MyReferralsCard({ athleteId }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);
  const [openList, setOpenList] = useState(null); // 'trial' | 'buyers' | null
  const [pushTest, setPushTest] = useState(null); // rezultat test push dugmeta

  useEffect(() => { if (athleteId) load(); }, [athleteId]);

  // REALTIME — realtime subscription za instant update kad se rewardful_leads promeni
  useEffect(() => {
    if (!athleteId) return;
    const ch = supa.channel('rewleads_' + athleteId)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'rewardful_leads', filter: 'athlete_id=eq.' + athleteId }, () => load())
      .subscribe();
    return () => { try { ch.unsubscribe(); } catch(e){} };
  }, [athleteId]);

  // AUTO-POLL svakih 30 sekundi dok je stranica otvorena — self-syncing sa Rewardful-om
  useEffect(() => {
    if (!athleteId) return;
    const interval = setInterval(() => { load(); }, 30_000);
    return () => clearInterval(interval);
  }, [athleteId]);

  async function testPush() {
    setPushTest({ loading: true });
    try {
      const { data: d, error } = await supa.functions.invoke('fetch-my-referrals', {
        body: { athlete_id: athleteId, test_push: true }
      });
      if (error) throw error;
      setPushTest(d);
    } catch(e) {
      setPushTest({ error: e.message || String(e) });
    }
  }

  async function load() {
    setLoading(true); setErr(null);
    try {
      const { data: d, error } = await supa.functions.invoke('fetch-my-referrals', { body: { athlete_id: athleteId } });
      if (error) throw error;
      if (d?.error) throw new Error(d.error);
      setData(d);
    } catch(e) {
      console.error('fetch-my-referrals:', e);
      setErr(e.message || String(e));
    } finally { setLoading(false); }
  }

  if (loading) {
    return (
      <div className="glass rounded-2xl p-5 border border-brand2/20">
        <div className="text-xs text-white/50 text-center py-3">{t('portal_referrals_loading','Učitavam reference...')}</div>
      </div>
    );
  }

  if (err) {
    return (
      <div className="glass rounded-2xl p-5 border border-danger/20">
        <div className="text-xs text-danger">⚠️ {err}</div>
      </div>
    );

  if (!data?.connected) {

      <div className="glass rounded-2xl p-5 border border-gold/30">
        <div className="flex items-start gap-3">
          <div className="text-2xl shrink-0">🔗</div>
          <div>
            <div className="font-display font-bold text-sm">{t('portal_referrals_not_connected_title','Reference nisu povezane')}</div>
            <div className="text-[11px] text-white/60 mt-1">{data?.message || t('portal_referrals_not_connected_body','Registruj se na Rewardful sa istim email-om — automatski se povezuje.')}</div>
          </div>
        </div>
      </div>
    );

  return (
    <div className="glass-strong rounded-2xl p-5 sm:p-6 border border-brand2/30"
      style={{background: 'linear-gradient(135deg, rgba(0,240,255,0.05), rgba(168,85,247,0.05))'}}>

          <div className="font-display font-black text-2xl text-brand2">{data.visitors || 0}</div>

          <div className="text-[10px] uppercase text-gold font-bold">{t('portal_referrals_leads_label','Test')}</div>

          <div className="font-display font-black text-2xl text-lime">{data.conversions_active || 0}</div>

function MyMentor({ athlete }) {
  const [mentor, setMentor] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!athlete?.referred_by) { setLoading(false); return; }
    Promise.all([
      supa.from('athletes').select('id, level, promo_code, name').eq('id', athlete.referred_by).maybeSingle(),
      supa.from('profiles').select('full_name, email, avatar_url').eq('id', athlete.referred_by).maybeSingle()
    ]).then(([a, p]) => {
      if (a.data) {
        setMentor({ ...a.data, profile: p.data });
      }
      setLoading(false);
    });
  }, [athlete?.id, athlete?.referred_by]);

  // Ako nije doveden ni od koga (direktan signup) — ne prikazujemo
  if (loading || !mentor) return null;

  const t = LEVEL_THEME[mentor.level] || LEVEL_THEME.recruit;
  const name = mentor.profile?.full_name || mentor.name || mentor.profile?.email?.split('@')[0] || 'Atleta';

  return (
    <div className="glass rounded-2xl p-4 sm:p-5 border border-brand/20">
      <div className="flex items-center gap-3">
        <div className="w-12 h-12 rounded-full overflow-hidden bg-bg0 border-2 shrink-0" style={{borderColor: t.color + '80'}}>
          {mentor.profile?.avatar_url
            ? <img src={mentor.profile.avatar_url} alt="" className="w-full h-full object-cover"/>
            : <div className="w-full h-full flex items-center justify-center text-xl">👤</div>}
        </div>
        <div className="min-w-0 flex-1">
          <div className="text-[10px] uppercase tracking-[0.2em] text-white/50 font-bold">🤝 Moj mentor</div>
          <div className="font-display font-black text-base truncate">{name}</div>
          <div className="text-[11px] font-bold uppercase tracking-wider" style={{color: t.color}}>
            {t.emoji} {t.name}
          </div>
        </div>
      </div>
    </div>
  );
}

function TeamMemberDetailModal({ member, viewerAthleteId, onClose }) {
  const [stats, setStats] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{ load(); }, []);
  async function load() {
    setLoading(true);
    const [salesRes, reelsRes, earnRes, teamCommRes] = await Promise.all([
      // Njegove prodaje
      supa.from('sales').select('id, amount_cents, product_name, status, created_at')
        .eq('athlete_id', member.id).order('created_at', { ascending: false }).limit(50),
      // Njegovi reels
      supa.from('reels').select('id, status, submitted_at')
        .eq('athlete_id', member.id).order('submitted_at', { ascending: false }).limit(60),
      // Njegovi totali zarade (sve sources)
      supa.from('earnings_ledger').select('amount_cents, status, source').eq('athlete_id', member.id),
      // Koliko sam JA zaradio od njega
      supa.from('earnings_ledger').select('amount_cents, status').eq('athlete_id', viewerAthleteId).eq('source','team')
    ]);

    const sales = salesRes.data || [];
    const reels = reelsRes.data || [];
    const earns = earnRes.data || [];
    const myTeamFromHim = (teamCommRes.data || []);

    // Filter "moja zarada od njega" — jer team table ne razdvaja po seller, koristim sales JOIN
    let myEarningsFromHim = 0;
    if (sales.length) {
      const saleIds = sales.map(s => s.id);
      const { data: myTeamRows } = await supa.from('earnings_ledger')
        .select('amount_cents, status').eq('athlete_id', viewerAthleteId).eq('source','team').in('ref_id', saleIds);
      myEarningsFromHim = (myTeamRows||[]).reduce((s,x)=>s+x.amount_cents, 0);
    }

    setStats({
      sales,
      reels,
      sales_count: sales.length,
      sales_confirmed: sales.filter(s => s.status === 'confirmed').length,
      sales_total: sales.filter(s => s.status === 'confirmed').reduce((s,x)=>s+x.amount_cents, 0),
      reels_count: reels.length,
      reels_approved: reels.filter(r => r.status === 'approved').length,
      his_earnings_lifetime: earns.reduce((s,x)=>s+x.amount_cents, 0),
      his_earnings_available: earns.filter(e => e.status === 'available').reduce((s,x)=>s+x.amount_cents, 0),
      my_earnings_from_him: myEarningsFromHim
    });
    setLoading(false);
  }

  const t = LEVEL_THEME[member.level] || LEVEL_THEME.recruit;

  return (
    <div className="fixed inset-0 z-50 bg-black/85 flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={onClose}>
      <div className="bg-bg1 rounded-t-3xl sm:rounded-3xl max-w-2xl w-full max-h-[92vh] overflow-y-auto shadow-2xl" onClick={e=>e.stopPropagation()}>
        <div className="sticky top-0 bg-bg1 border-b border-white/10 p-4 flex items-center justify-between z-10">
          <div className="flex items-center gap-3 min-w-0">
            <div className="w-10 h-10 rounded-full overflow-hidden bg-bg0 border border-white/10 shrink-0">
              {member.profile?.avatar_url
                ? <img src={member.profile.avatar_url} alt="" className="w-full h-full object-cover"/>
                : <div className="w-full h-full flex items-center justify-center text-base">👤</div>}
            </div>
            <div className="min-w-0">
              <div className="font-display font-black text-base truncate">{member.profile?.full_name || member.profile?.email?.split('@')[0] || member.name || 'Atleta'}</div>
              <div className="text-[10px] font-bold uppercase tracking-wider" style={{color:t.color}}>{t.emoji} {t.name} · u timu od {formatDate(member.joined_at)}</div>
            </div>
          </div>
          <button onClick={onClose} className="w-9 h-9 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-lg shrink-0 ml-2">✕</button>
        </div>

        {loading ? (
          <div className="text-center py-12 text-white/50">Učitavam...</div>
        ) : !stats ? (
          <div className="text-center py-12 text-white/50">Greška u učitavanju.</div>
        ) : (
          <div className="p-4 space-y-4">
            {/* MOJA ZARADA OD NJEGA — najvazniji broj */}
            <div className="glass-strong rounded-2xl p-4 border border-lime/40">
              <div className="text-[10px] uppercase tracking-wider text-lime font-bold mb-1">💰 Tvoja zarada od ovog atlete</div>
              <div className="font-display font-black text-3xl text-lime">{formatEUR(stats.my_earnings_from_him)}</div>
              <div className="text-xs text-white/60 mt-1">Provizija od svake njegove prodaje (% zavisi od tvog nivoa)</div>

            {/* NJEGOVE PRODAJE */}
            <div className="grid grid-cols-2 gap-3">
              <div className="p-3 rounded-xl bg-bg0/60 border border-white/10">

                <div className="font-display font-black text-xl text-brand">{stats.sales_confirmed}</div>

            <div>
              <div className="font-display font-bold text-sm mb-2">🎬 Njegovi reels ({stats.reels_count})</div>

                <div className="text-center py-4 text-xs text-white/50">Još nema reels-ova.</div>

            </div>
          </div>
        )}

  );

function MyTeam({ athlete }) {
  const [members, setMembers] = useState([]);
  const [teamEarned, setTeamEarned] = useState({ total: 0, available: 0 });
  const [loading, setLoading] = useState(true);
  const [copied, setCopied] = useState(false);
  const [selectedMember, setSelectedMember] = useState(null);

  const inviteLink = athlete?.promo_code
    ? `${window.location.origin}/?ref=${athlete.promo_code}`
    : '';

  function copyInvite() {
    if (!inviteLink) return;
    try {
      navigator.clipboard.writeText(inviteLink);
      setCopied(true);
      setTimeout(()=>setCopied(false), 2000);
    } catch(e){}
  }

  useEffect(()=>{ if (athlete?.id) load(); }, [athlete?.id]);
  async function load() {
    setLoading(true);
    const [memResp, earnResp] = await Promise.all([
      // Atlete koje je on doveo
      supa.from('athletes').select('id, level, joined_at, name').eq('referred_by', athlete.id).limit(50),
      // Tim zarada (source='team')
      supa.from('earnings_ledger').select('amount_cents, status').eq('athlete_id', athlete.id).eq('source','team')
    ]);
    const memList = memResp.data || [];
    // Profile join
    if (memList.length) {
      const ids = memList.map(m => m.id);
      const { data: profs } = await supa.from('profiles').select('id, full_name, email, avatar_url').in('id', ids);
      const pMap = Object.fromEntries((profs||[]).map(p => [p.id, p]));
      memList.forEach(m => { m.profile = pMap[m.id] || { full_name: m.name }; });
    }
    setMembers(memList);
    const earn = earnResp.data || [];
    setTeamEarned({
      total: earn.reduce((s,x)=>s+x.amount_cents,0),
      available: earn.filter(x=>x.status==='available').reduce((s,x)=>s+x.amount_cents,0)
    });
    setLoading(false);
  }

  return (
    <div className="glass rounded-2xl p-5 sm:p-6">
      <div className="flex items-start justify-between gap-3 mb-3 flex-wrap">
        <div>

function Dashboard({ athlete, profile }) {
  const [stats, setStats] = useState({ reels_total:0, reels_month:0, reels_pending:0, sales_total:0, sales_month:0, earnings_pending:0, earnings_available:0, earnings_lifetime:0, streak:0, bodovi:0 });
  const [activity, setActivity] = useState([]);
  const [levelCfg, setLevelCfg] = useState(null);
  const [newAchievement, setNewAchievement] = useState(null);
  const [tick, setTick] = useState(0); // za live day counter — re-render svaki minut
  const theme = LEVEL_THEME[athlete?.level || 'recruit'];

  // Live counter — ažurira display svaki minut
  useEffect(() => {
    const t = setInterval(() => setTick(x => x+1), 60_000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if (!athlete) return;
    loadAll();
    const ch = supa.channel('dash_' + athlete.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'reels', filter: 'athlete_id=eq.'+athlete.id }, loadAll)
      .on('postgres_changes', { event:'*', schema:'public', table:'sales', filter: 'athlete_id=eq.'+athlete.id }, loadAll)
      .on('postgres_changes', { event:'*', schema:'public', table:'earnings_ledger', filter: 'athlete_id=eq.'+athlete.id }, loadAll)
      .subscribe();
    return () => { try { ch.unsubscribe(); } catch(e){} };
  }, [athlete?.id]);

  async function loadAll() {
    const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);
    // Direktni queries — bez view-a (siguran nacin)
    const [r1, r2, r3, sa, sm, allEarnings, paidPayouts, lc, reelsDates, xpRows] = await Promise.all([
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','approved'),
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','approved').gte('submitted_at', monthStart.toISOString()),
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','pending'),
      supa.from('sales').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','confirmed'),
      supa.from('sales').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','confirmed').gte('created_at', monthStart.toISOString()),
      // Sve earnings rows (svi statusi)
      supa.from('earnings_ledger').select('amount_cents, status, source').eq('athlete_id', athlete.id),
      // Paid + pending + approved payouts da znamo koliko vec obecano za isplatu
      supa.from('payout_requests').select('amount_cents, status').eq('athlete_id', athlete.id).in('status', ['pending','approved','paid']),
      supa.from('level_configs').select('*').eq('level_key', athlete.level).maybeSingle(),
      supa.from('reels').select('submitted_at').eq('athlete_id', athlete.id).eq('status','approved').order('submitted_at',{ascending:false}).limit(120),
      supa.from('xp_ledger').select('amount').eq('athlete_id', athlete.id)
    ]);

    // Racunamo brojeve direktno (nije zavisno od views/RLS koje cesto puca)
    const earningsArr = (allEarnings.data || []).filter(e => e.status !== 'cancelled');
    const earnLifetime = earningsArr.reduce((s,x)=>s+x.amount_cents,0);
    // Production-grade balance: lifetime earned - lifetime payouts (non-rejected) - never negative
    const allPayouts = paidPayouts.data || [];
    const totalPayoutsCommitted = allPayouts.reduce((s,x)=>s+x.amount_cents,0);
    const realBalance = Math.max(0, earnLifetime - totalPayoutsCommitted);
    // "Na cekanju" = predikcija zarade od reels-ova koje admin jos nije odobrio + payout zahtevi
    const reelsPendingReward = (r3.count||0) * (lc.data?.reel_reward_cents || 25);
    const pendingPayoutsTotal = allPayouts.filter(p => p.status === 'pending' || p.status === 'approved').reduce((s,x)=>s+x.amount_cents,0);
    const totalPending = reelsPendingReward + pendingPayoutsTotal;
    const totalBodovi = (xpRows.data||[]).reduce((s,x)=>s+(x.amount||0),0);

    // === STREAK CALC ===
    const dates = new Set((reelsDates.data||[]).map(r => (r.submitted_at||'').slice(0,10)));
    let streak = 0;
    const today = new Date();
    for (let i=0; i<365; i++) {
      const d = new Date(today); d.setDate(today.getDate() - i);
      const ds = d.toISOString().slice(0,10);
      if (dates.has(ds)) streak++;
      else if (i > 0) break; // dozvoli da danas još nije submit-ovan
      else continue;
    }

    const reelsTotal = r1.count||0;
    const salesTotal = sa.count||0;
    setStats({
      reels_total: reelsTotal,
      reels_month: r2.count||0,
      reels_pending: r3.count||0,
      sales_total: salesTotal,
      sales_month: sm.count||0,
      earnings_pending: totalPending,
      earnings_available: realBalance,
      earnings_lifetime: earnLifetime,
      streak,
      bodovi: totalBodovi
    });
    setLevelCfg(lc.data);

    // recent activity
    const { data: acts } = await supa.from('earnings_ledger').select('*').eq('athlete_id', athlete.id).order('created_at',{ascending:false}).limit(8);
    setActivity(acts||[]);

    // === ACHIEVEMENT ENGINE (uvuci course progress) ===

      supa.from('course_lessons').select('id', { count:'exact', head:true }),

    runAchievementEngine(athlete.id, {
      reels_total: reelsTotal,
      sales_total: salesTotal,
      streak,
      course_lessons_total: lessonsTotal.count || 0,
      course_lessons_completed: lessonsCompleted.count || 0
    }).then(unlocked => {

  // ADMIN — pokazi platform overview umesto "atleta nije pronadjena"
  if (!athlete && profile?.role === 'super_admin') return <AdminOverview profile={profile}/>;
  if (!athlete) return <div className="glass rounded-2xl p-8 text-center text-white/60">Atleta nije pronađena. Kontaktiraj admina.</div>;

  const reqs = levelCfg?.requirements_json || {};
  const monthlyReq = levelCfg?.monthly_threshold_json || {};
  const introActive = athlete.recruit_intro_period_until && new Date(athlete.recruit_intro_period_until) > new Date();

  // === LEVEL PROGRESS — koliko dana u ovom nivou + koliko reels-ova + prodaja ===
  const levelStartedAt = athlete.level_started_at || athlete.joined_at;
  const target = LEVEL_TARGETS[athlete.level] || LEVEL_TARGETS.recruit;
  const daysSinceLevelStart = levelStartedAt

  const daysRemaining = Math.max(0, target.days - daysSinceLevelStart);
  const reelsInPeriod = stats.reels_total;
  const reelsTarget = target.reels;
  const reelsRemaining = Math.max(0, reelsTarget - reelsInPeriod);
  const reelsPct = Math.min(100, Math.round((reelsInPeriod / reelsTarget) * 100));
  const salesInPeriod = stats.sales_total;
  const salesTarget = (levelCfg?.requirements_json?.sales_total) || target.sales;
  const salesRemaining = Math.max(0, salesTarget - salesInPeriod);
  const salesPct = Math.min(100, Math.round((salesInPeriod / salesTarget) * 100));

  const commissionPct = Math.round((levelCfg?.sales_commission_pct || 0.35) * 100);
  const reelReward = ((levelCfg?.reel_reward_cents || 30) / 100).toFixed(2);

  return (

        {/* === LEVEL PROGRESS CARD (Reels, Sales, Days) === */}

          {/* Reels bar */}

                </div>
              </div>
              <div className="text-[11px] font-bold" style={{color: theme.color}}>€{reelReward} po reel-u</div>

            <div className="h-2 rounded-full bg-white/5 overflow-hidden">

            <div className="text-[11px] text-white/50 mt-1.5">
              {reelsRemaining > 0

// === ACHIEVEMENT ENGINE ===
// Helper — insert earnings SAMO ako ne postoji za taj (athlete, source='reel', ref_id=reelId)
// Sprecava duplirano dodavanje ako admin klikne odobri vise puta.
async function insertReelEarningsOnce(athleteId, reelId, reward) {
  try {
    const { data: existing } = await supa.from('earnings_ledger')
      .select('id')
      .eq('athlete_id', athleteId)
      .eq('source', 'reel')
      .eq('ref_id', reelId)
      .limit(1);
    if (existing && existing.length > 0) {
      console.log('[VAMIT] earnings already exist for reel', reelId, '— skip');
      return { skipped: true };
    }
    const { error: eErr } = await supa.from('earnings_ledger').insert({
      athlete_id: athleteId, source: 'reel', amount_cents: reward, status: 'available',
      ref_table: 'reels', ref_id: reelId, description: 'Reel reward',
      available_at: new Date().toISOString()
    });
    if (eErr) { console.error('earnings insert fail:', eErr); return { error: eErr }; }
    // BODOVI +10 samo jedan put (unique po description + ref)
    const { data: existXp } = await supa.from('xp_ledger')
      .select('id').eq('athlete_id', athleteId).eq('source','reel')
      .eq('description', 'Reel #' + reelId + ' +10 BODOVA').limit(1);
    if (!existXp || existXp.length === 0) {
      await supa.from('xp_ledger').insert({
        athlete_id: athleteId, amount: 10, source: 'reel',
        description: 'Reel #' + reelId + ' +10 BODOVA'
      });
    }
    return { inserted: true };
  } catch(e) { console.error('insertReelEarningsOnce err:', e); return { error: e }; }
}

// Helper koji povlaci sve potrebne podatke i pokrece engine — koristi bilo gde
async function triggerEngine(athleteId) {
  if (!athleteId) return [];
  try {
    const [reelsCnt, salesCnt, lessonsTotal, lessonsCompleted, reelsDates] = await Promise.all([
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athleteId).eq('status','approved'),
      supa.from('sales').select('id',{count:'exact', head:true}).eq('athlete_id', athleteId).eq('status','confirmed'),
      supa.from('course_lessons').select('id',{count:'exact', head:true}),
      supa.from('lesson_progress').select('id',{count:'exact', head:true}).eq('athlete_id', athleteId).eq('completed', true),
      supa.from('reels').select('submitted_at').eq('athlete_id', athleteId).eq('status','approved').limit(120)
    ]);
    const dSet = new Set((reelsDates.data||[]).map(r => (r.submitted_at||'').slice(0,10)));
    let streak = 0; const today = new Date();
    for (let i=0; i<365; i++) {
      const d = new Date(today); d.setDate(today.getDate() - i);
      if (dSet.has(d.toISOString().slice(0,10))) streak++; else if (i > 0) break;
    }
    return await runAchievementEngine(athleteId, {
      reels_total: reelsCnt.count || 0,
      sales_total: salesCnt.count || 0,
      streak,
      course_lessons_total: lessonsTotal.count || 0,
      course_lessons_completed: lessonsCompleted.count || 0
    });
  } catch(e) { console.warn('triggerEngine fail:', e); return []; }
}

async function runAchievementEngine(athleteId, snapshot) {
  console.log('[ACH] Engine start', athleteId, snapshot);
  const { data: allAch, error: e1 } = await supa.from('achievements').select('*').eq('active', true);
  const { data: unlocked, error: e2 } = await supa.from('athlete_achievements').select('achievement_id').eq('athlete_id', athleteId);
  if (e1) console.error('[ACH] achievements fetch err:', e1);
  if (e2) console.error('[ACH] unlocked fetch err:', e2);
  console.log('[ACH] Active achievements:', (allAch||[]).length, '| Already unlocked:', (unlocked||[]).length);

  const unlockedSet = new Set((unlocked||[]).map(x => x.achievement_id));
  const newlyUnlocked = [];
  for (const ach of (allAch||[])) {
    if (unlockedSet.has(ach.id)) continue;
    if (!ach.requirement_json) { continue; }
    const matched = matchesRequirement(ach.requirement_json, snapshot);
    if (!matched) continue;

    console.log('[ACH] MATCH!', ach.code, ach.name, ach.requirement_json);

    const { error: insErr } = await supa.from('athlete_achievements').insert({
      athlete_id: athleteId, achievement_id: ach.id, unlocked_at: new Date().toISOString()
    });
    if (insErr) {
      console.error('[ACH] insert FAIL for', ach.code, ':', insErr);
      continue;
    }
    console.log('[ACH] inserted athlete_achievement for', ach.code);
    newlyUnlocked.push(ach);

    if (ach.xp_reward) {
      const { error: xpErr } = await supa.from('xp_ledger').insert({
        athlete_id: athleteId, amount: ach.xp_reward, source: 'achievement',
        description: 'Dostignuće: ' + ach.name
      });
      if (xpErr) console.error('[ACH] xp insert FAIL:', xpErr);
    }
    try {
      await sendTemplated(athleteId, 'achievement', { name: ach.name, xp: ach.xp_reward||0 }, '#/dostignuca');
      console.log('[ACH] notif sent for', ach.code);
    } catch(e) { console.error('[ACH] notif fail:', e); }
  }
  console.log('[ACH] Engine done. Newly unlocked:', newlyUnlocked.length);
  return newlyUnlocked;
}

function matchesRequirement(req, snap) {
  if (!req || typeof req !== 'object') return false;
  try {
    // COUNT: reels / sales sa minimumom
    if (req.kind === 'count') {
      const min = parseInt(req.min, 10);
      if (!min || min <= 0) return false; // bez min ne dozvoljavamo
      if (req.entity === 'reels') return (snap.reels_total||0) >= min;
      if (req.entity === 'sales') return (snap.sales_total||0) >= min;
      return false;
    }
    // STREAK: x dana zaredom
    if (req.kind === 'streak') {
      const min = parseInt(req.min, 10);
      if (!min || min <= 0) return false;
      return (snap.streak||0) >= min;
    }
    // COURSE: kompletiran kurs (sve lekcije) ili x lekcija
    if (req.kind === 'course') {
      const completed = snap.course_lessons_completed||0;
      const total = snap.course_lessons_total||0;
      if (req.entity === 'all_lessons') return total > 0 && completed >= total;
      if (req.entity === 'lessons') {
        const min = parseInt(req.min, 10);
        if (!min || min <= 0) return false;
        return completed >= min;
      }
      return false;
    }
    return false; // unknown kind = NEVER unlock
  } catch(e) { return false; }
}

function getYouTubeId(url) {
  if (!url) return null;
  try {
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtube\.com\/embed\/|youtube\.com\/shorts\/|youtu\.be\/|youtube\.com\/v\/)([a-zA-Z0-9_-]{11})/,
      /^([a-zA-Z0-9_-]{11})$/
    ];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) return m[1];
    }
    return null;
  } catch(e) { return null; }
}
function youtubeEmbedUrl(url) {
  const id = getYouTubeId(url);
  if (!id) return url;
  return 'https://www.youtube.com/embed/' + id + '?rel=0&modestbranding=1';
}
function youtubeThumbnail(url) {
  const id = getYouTubeId(url);
  if (!id) return null;
  return 'https://i.ytimg.com/vi/' + id + '/hqdefault.jpg';
}

function KursPage({ athlete }) {
  const [modules, setModules] = useState([]);
  const [openLesson, setOpenLesson] = useState(null);
  const [expanded, setExpanded] = useState({});
  const [progress, setProgress] = useState({});
  const [loadErr, setLoadErr] = useState(null);

  useEffect(()=> { loadModules(); }, [athlete?.id]);
  async function loadModules() {
    setLoadErr(null);
    try {
      const [modsResp, lessonsResp, progResp] = await Promise.all([
        supa.from('course_modules').select('*').order('order_idx'),
        supa.from('course_lessons').select('*').order('order_idx'),
        athlete?.id ? supa.from('lesson_progress').select('lesson_id, completed_at').eq('athlete_id', athlete.id) : Promise.resolve({data:[]})
      ]);
      if (modsResp.error) throw new Error('course_modules: ' + modsResp.error.message);
      if (lessonsResp.error) throw new Error('course_lessons: ' + lessonsResp.error.message);
      const lessons = (lessonsResp.data||[]).filter(l => l.status !== 'archived');
      const map = (modsResp.data||[]).filter(m => m.status !== 'archived').map(m => ({...m, lessons: lessons.filter(l=>l.module_id===m.id)}));
      setModules(map);
      const progMap = {};
      (progResp.data||[]).forEach(p => { if (p.completed_at) progMap[p.lesson_id] = true; });
      setProgress(progMap);
      if (map.length > 0 && Object.keys(expanded).length === 0) {
        setExpanded({ [map[0].id]: true });
      }
    } catch(e) {
      console.error('KursPage load fail:', e);
      setLoadErr(e.message);
    }
  }

  async function markComplete(lessonId) {
    if (!athlete?.id) return;
    // KRITICNO: postavi completed=true da achievement engine prepoznaje lekciju kao zavrsenu
    await supa.from('lesson_progress').upsert({
      athlete_id: athlete.id, lesson_id: lessonId,
      completed: true, completed_at: new Date().toISOString()
    }, { onConflict: 'athlete_id,lesson_id' });

    // +5 BODOVA za zavrsenu lekciju
    await supa.from('xp_ledger').insert({
      athlete_id: athlete.id, amount: 5, source: 'lesson',
      description: 'Završena lekcija +5 BODOVA'
    });

    setProgress(p => ({ ...p, [lessonId]: true }));

    // Pokreni achievement engine — ako otkljuca dostignuce, prikazi alert + push
    const unlocked = await triggerEngine(athlete.id);
    if (unlocked && unlocked.length) {
      alert(`🏆 Otključao si dostignuće: "${unlocked[0].name}" (+${unlocked[0].xp_reward} BODOVA)`);
    }
  }

  async function markIncomplete(lessonId) {
    if (!athlete?.id) return;
    await supa.from('lesson_progress').delete()
      .eq('athlete_id', athlete.id).eq('lesson_id', lessonId);
    // Skini 5 bodova
    await supa.from('xp_ledger').insert({
      athlete_id: athlete.id, amount: -5, source: 'lesson',
      description: 'Otkazana lekcija -5 BODOVA'
    });
    setProgress(p => { const n = {...p}; delete n[lessonId]; return n; });

  const levelOrder = { recruit:0, pro:1, commando:2, elite:3 };

        <p className="text-sm text-white/60">{modules.length} modula · {totalLessons} lekcija · {doneLessons} završeno ({overallPct}%)</p>

          </div>

// === BODOVI → €5 KONVERZIJA ===
function BodoviConvertCard({ athleteId, onConverted }) {
  const [bodovi, setBodovi] = useState(0);
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null);

  useEffect(() => { if (athleteId) load(); }, [athleteId]);
  async function load() {
    const { data } = await supa.from('xp_ledger').select('amount').eq('athlete_id', athleteId);
    setBodovi((data || []).reduce((s,x)=>s+(x.amount||0), 0));
  }

  const bonusCount = Math.floor(bodovi / 10000);
  const canConvert = bonusCount > 0;
  const nextTier = bodovi % 10000;
  const toGo = 10000 - nextTier;

  async function convert() {
    if (!canConvert || busy) return;
    if (!confirm(`Konvertuj 10.000 BODOVA u €5 bonus?\n\nBonus će biti dodat u "Prodaja paketa" bucket — možeš ga odmah povući.`)) return;
    setBusy(true); setMsg(null);
    try {
      // 1. Skini 10000 bodova
      const { error: xpErr } = await supa.from('xp_ledger').insert({
        athlete_id: athleteId,
        amount: -10000,
        source: 'bonus',
        description: 'Konvercija 10.000 BODOVA → €5 bonus'
      });
      if (xpErr) throw xpErr;

      // 2. Dodaj €5 u sales bucket
      const { error: earnErr } = await supa.from('earnings_ledger').insert({
        athlete_id: athleteId,
        source: 'sale',
        amount_cents: 500,
        status: 'available',
        available_at: new Date().toISOString(),
        description: '🎁 BODOVI bonus (10.000 → €5)'
      });
      if (earnErr) throw earnErr;

      setMsg({ type:'ok', text:'✅ €5 dodato u Prodaja bucket — možeš odmah da zatražiš isplatu!' });
      await load();
      if (onConverted) onConverted();
    } catch(e) {
      setMsg({ type:'err', text:'Greska: ' + (e.message || e) });
    } finally { setBusy(false); }
  }

  return (
    <div className="glass-strong rounded-3xl p-5 sm:p-6 border border-brand3/30"
      style={{background: 'linear-gradient(135deg, rgba(168,85,247,0.05), rgba(0,240,255,0.05))'}}>
      <div className="flex items-start justify-between gap-3 mb-3 flex-wrap">
        <div>
          <div className="text-[10px] uppercase tracking-[0.2em] text-white/60 font-bold mb-1">⚡ BODOVI bonus</div>
          <div className="font-display text-3xl sm:text-4xl font-black text-brand3">{bodovi.toLocaleString('sr-Latn')}</div>
          <div className="text-[10px] text-white/50 mt-1">10.000 BODOVA = €5 bonus u "Prodaja" bucket</div>
        </div>
        {bonusCount > 0 && (
          <div className="px-3 py-2 rounded-lg bg-lime/15 border border-lime/40 text-center">
            <div className="text-[9px] uppercase text-lime/80 font-bold">Dostupno</div>
            <div className="font-display font-black text-lg text-lime">€{(bonusCount * 5).toFixed(2)}</div>
          </div>
        )}
      </div>

      {/* Progress bar do sledećeg €5 */}
      <div className="h-2 rounded-full bg-white/5 overflow-hidden mb-2">
        <div className="h-full rounded-full transition-all" style={{ width: Math.round((nextTier/10000)*100) + '%', background: 'linear-gradient(90deg, #a855f7, #00f0ff)' }}/>
      </div>
      <div className="text-[10px] text-white/50 flex justify-between mb-3">
        <span>{nextTier.toLocaleString('sr-Latn')} / 10.000</span>
        <span>Još <strong className="text-brand3">{toGo.toLocaleString('sr-Latn')}</strong> do sledećeg €5</span>
      </div>

      {canConvert ? (
        <button onClick={convert} disabled={busy}
          className="w-full px-6 py-3 rounded-xl font-extrabold text-bg0 bg-gradient-to-r from-brand3 to-brand disabled:opacity-50 text-sm">
          {busy ? 'Konvertujem...' : `🎁 Iskoristi ${bonusCount}× bonus (€${(bonusCount * 5).toFixed(2)})`}
        </button>
      ) : (
        <div className="p-3 rounded-xl bg-bg0/40 text-xs text-white/50 text-center">
          Treba ti 10.000 BODOVA za prvi €5 bonus. Reel = 10, prodaja = 50, lekcija = 5, dostignuća 20–75000.
        </div>
      )}

      {msg && (
        <div className={"mt-3 text-xs px-3 py-2 rounded-lg " + (msg.type==='ok' ? 'bg-lime/10 border border-lime/30 text-lime' : 'bg-danger/10 border border-danger/30 text-danger')}>{msg.text}</div>
      )}
    </div>
  );
}

function TeamSalesDetailModal({ athleteId, onClose }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{ load(); }, []);
  async function load() {
    setLoading(true);
    const { data: earns } = await supa.from('earnings_ledger')
      .select('id, amount_cents, status, created_at, description, ref_id, payout_request_id')
      .eq('athlete_id', athleteId).eq('source', 'team')
      .order('created_at', { ascending: false }).limit(200);
    const earnArr = earns || [];
    if (earnArr.length === 0) { setItems([]); setLoading(false); return; }

    const saleIds = earnArr.map(e => e.ref_id).filter(Boolean);
    let salesMap = {};
    if (saleIds.length) {
      const { data: sales } = await supa.from('sales')
        .select('id, athlete_id, amount_cents, product_name, created_at')
        .in('id', saleIds);
      salesMap = Object.fromEntries((sales||[]).map(s => [s.id, s]));
    }

    const sellerIds = [...new Set(Object.values(salesMap).map(s => s.athlete_id).filter(Boolean))];
    let sellerMap = {};
    if (sellerIds.length) {
      const [aR, pR] = await Promise.all([
        supa.from('athletes').select('id, level, name, promo_code').in('id', sellerIds),
        supa.from('profiles').select('id, full_name, email, avatar_url').in('id', sellerIds)
      ]);
      const aMap = Object.fromEntries((aR.data||[]).map(a => [a.id, a]));
      const pMap = Object.fromEntries((pR.data||[]).map(p => [p.id, p]));
      sellerIds.forEach(id => { sellerMap[id] = { ...(aMap[id]||{}), ...(pMap[id]||{}) }; });
    }

    const rows = earnArr.map(e => {
      const sale = salesMap[e.ref_id] || {};
      const seller = sale.athlete_id ? (sellerMap[sale.athlete_id] || {}) : {};
      return {
        ...e,
        sale,
        seller,
        seller_name: seller.full_name || seller.name || seller.email?.split('@')[0] || 'Atleta',
        seller_level: seller.level || 'recruit'

    setItems(rows);
    setLoading(false);

    <div className="fixed inset-0 z-50 bg-black/85 flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={onClose}>

        <div className="sticky top-0 bg-bg1 border-b border-white/10 p-4 flex items-center justify-between z-10">
          <div>
            <div className="font-display font-black text-lg">👥 Tim prodaje — detalji</div>
            <div className="text-xs text-white/50">Ko je šta prodao i koliko si ti zaradio</div>
          </div>
          <button onClick={onClose} className="w-9 h-9 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center text-lg">✕</button>
        </div>
        <div className="p-4">
          <div className="grid grid-cols-2 gap-3 mb-4">
            <div className="p-3 rounded-xl bg-bg0/60 border border-white/10">
              <div className="text-[10px] uppercase tracking-wider text-white/50 font-bold">Tim ukupno prodao</div>

function IsplatePage({ athlete, profile, refreshProfile }) {
  const [wallet, setWallet] = useState({ reels_balance: 0, sales_balance: 0, team_balance: 0 });
  const [history, setHistory] = useState([]);
  const [msg, setMsg] = useState(null);
  const [pending, setPending] = useState(null);
  const [reelsAmt, setReelsAmt] = useState('');
  const [salesAmt, setSalesAmt] = useState('');
  const [teamAmt, setTeamAmt] = useState('');
  const [period30, setPeriod30] = useState({ sales: 0, reels: 0 });
  const [showTeamDetails, setShowTeamDetails] = useState(false);

  useEffect(()=>{ if (athlete) load(); }, [athlete?.id]);
  async function load() {
    const monthAgo = new Date(); monthAgo.setDate(monthAgo.getDate() - 30);
    const [allEarns, pr, pp, sc, rc] = await Promise.all([
      supa.from('earnings_ledger').select('amount_cents, status, payout_request_id, source').eq('athlete_id', athlete.id),
      supa.from('payout_requests').select('*').eq('athlete_id', athlete.id).order('requested_at',{ascending:false}).limit(20),
      supa.from('payout_requests').select('*').eq('athlete_id', athlete.id).eq('status','pending').maybeSingle(),
      supa.from('sales').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','confirmed').gte('created_at', monthAgo.toISOString()),
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','approved').gte('submitted_at', monthAgo.toISOString())
    ]);
    const earns = allEarns.data || [];
    const payoutsAll = pr.data || [];
    // BALANCE MATH (production-grade):
    // - earning ledger source: 'reel' | 'sale' | 'team' (singular)
    // - payout_requests payout_source: 'reels' | 'sales' | 'team' (mixed)
    // - Available bucket = sum(earnings ALL statuses except 'cancelled' for this source) - sum(payouts pending+approved+paid for matching bucket)
    // - Math.max(0, ...) — nikad negativan display
    function balanceFor(earnSource, payoutBucket) {
      const earned = earns
        .filter(e => e.source === earnSource && e.status !== 'cancelled')
        .reduce((s,x)=>s+x.amount_cents,0);
      const usedUp = payoutsAll
        .filter(p => p.payout_source === payoutBucket && ['pending','approved','paid'].includes(p.status))
        .reduce((s,x)=>s+x.amount_cents,0);
      return Math.max(0, earned - usedUp);
    }
    setWallet({
      reels_balance: balanceFor('reel', 'reels'),
      sales_balance: balanceFor('sale', 'sales'),
      team_balance:  balanceFor('team', 'team')
    });
    setHistory(pr.data || []);
    setPending(pp.data);
    setPeriod30({ sales: sc.count || 0, reels: rc.count || 0 });
  }

  const lvl = athlete?.level || 'recruit';
  const isRecruit = lvl === 'recruit';
  const minPayoutCents = MIN_PAYOUT_CENTS[lvl] || 1000;
  const unlockReq = REELS_UNLOCK[lvl];
  const reelsUnlocked = !unlockReq || (period30.sales >= unlockReq.sales && period30.reels >= unlockReq.reels);

  async function requestPayout(source) {
    if (!athlete.bank_full_name || !athlete.bank_iban) {
      setMsg({type:'err', text:'Prvo unesi bank info u Profilu.'});
      return;
    }
    if (pending) {
      setMsg({type:'err', text:'Već imaš zahtev koji čeka obradu.'});
      return;
    }
    if (source === 'reels' && !reelsUnlocked) {
      setMsg({type:'err', text:`Reels isplata zaključana. Treba ti: ${unlockReq.sales} prodaja + ${unlockReq.reels} reels-ova u 30 dana. Trenutno: ${period30.sales}/${unlockReq.sales} i ${period30.reels}/${unlockReq.reels}.`});
      return;
    }

    const amtStr = source === 'reels' ? reelsAmt : source === 'team' ? teamAmt : salesAmt;
    const balance = source === 'reels' ? wallet.reels_balance : source === 'team' ? wallet.team_balance : wallet.sales_balance;
    const sourceLabel = source === 'reels' ? 'Reels' : source === 'team' ? 'Tim' : 'Prodaja';
    const reqEur = parseAmount(amtStr);
    const reqCents = (amtStr && !isNaN(reqEur) && reqEur > 0) ? Math.round(reqEur * 100) : balance;

    if (reqCents <= 0) { setMsg({type:'err', text:'Unesi pozitivan iznos.'}); return; }
    if (reqCents > balance) { setMsg({type:'err', text:'Iznos veći od dostupnog u '+sourceLabel+': '+formatEUR(balance)}); return; }
    if (reqCents < minPayoutCents) {
      const minLabel = isRecruit ? 'bilo koji iznos' : '€'+(minPayoutCents/100).toFixed(2);
      setMsg({type:'err', text:'Minimum za isplatu je ' + minLabel + '.'});
      return;
    }
    const { error } = await supa.from('payout_requests').insert({
      athlete_id: athlete.id,
      amount_cents: reqCents,
      payout_source: source,
      bank_info_snapshot: {
        full_name: athlete.bank_full_name, iban: athlete.bank_iban,
        bank: athlete.bank_name, phone: athlete.bank_phone
      }
    });
    if (error) setMsg({type:'err', text: error.message});
    else {
      setMsg({type:'ok', text:'Zahtev za '+formatEUR(reqCents)+' poslat! Admin obrađuje.'});
      if (source==='reels') setReelsAmt(''); else if (source==='team') setTeamAmt(''); else setSalesAmt('');
      load();
    }
  }

  const sColor = { pending:'#ffc24b', approved:'#3b82f6', paid:'#a6ff3b', rejected:'#ff4d5e' };

  return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">{t('portal_isplate_title','💸 Isplate')}</h1>
        <p className="text-sm text-white/60">{t('portal_isplate_intro','Pregled, zahtevi i istorija.')}</p>
      </div>

      {pending && (
        <div className="glass rounded-2xl p-4 border border-gold/30 text-sm text-gold">
          ⏳ Imaš zahtev za isplatu od {formatEUR(pending.amount_cents)} ({pending.payout_source==='reels'?'Reels':pending.payout_source==='team'?'Tim':pending.payout_source==='sales'?'Prodaje':'Mešano'}). Admin obrađuje.
        </div>
      )}

      {/* === REELS BUCKET === */}
      <div className="glass-strong rounded-3xl p-5 sm:p-6 border" style={{borderColor: reelsUnlocked ? 'rgba(166,255,59,0.3)' : 'rgba(255,194,75,0.3)'}}>
        <div className="flex items-start justify-between gap-3 mb-3 flex-wrap">
          <div>
            <div className="text-[10px] uppercase tracking-[0.2em] text-white/60 font-bold mb-1">🎬 Reels zarada</div>
            <div className="font-display text-3xl sm:text-4xl font-black" style={{color: reelsUnlocked ? '#a6ff3b' : '#ffc24b'}}>
              {formatEUR(wallet.reels_balance)}
            </div>
          </div>
          {!reelsUnlocked && (
            <div className="px-3 py-1.5 rounded-lg bg-gold/15 border border-gold/40 text-[10px] font-black text-gold uppercase tracking-wider">🔒 Zaključano</div>
          )}
        </div>

        {reelsUnlocked ? (
          !pending && (
            <div className="space-y-2 mt-3">
              <div className="flex items-center gap-2">
                <input type="text" inputMode="decimal" value={reelsAmt} onChange={e=>setReelsAmt(e.target.value)}
                  placeholder={`Iznos € (max ${(wallet.reels_balance/100).toFixed(2)})`}
                  className="flex-1 px-4 py-3 rounded-xl bg-bg0 border border-white/15 focus:border-brand outline-none text-sm text-center font-bold"/>
                <button type="button" onClick={()=>setReelsAmt((wallet.reels_balance/100).toFixed(2))}
                  className="px-3 py-3 rounded-xl bg-white/5 text-xs text-white/70 whitespace-nowrap">Sve</button>
              </div>
              <button onClick={()=>requestPayout('reels')} disabled={wallet.reels_balance < minPayoutCents}
                className="w-full px-6 py-3 rounded-xl font-extrabold text-bg0 bg-gradient-to-r from-lime to-brand disabled:opacity-50 text-sm">
                {reelsAmt && !isNaN(parseAmount(reelsAmt)) ? `📤 Zatraži €${parseAmount(reelsAmt).toFixed(2)} (Reels)` : '📤 Zatraži ceo Reels iznos'}
              </button>
            </div>
          )
        ) : (
          <div className="mt-3 p-3 rounded-xl bg-gold/5 border border-gold/30 text-xs space-y-1">
            <div className="font-bold text-gold">Otključaj sa:</div>
            <div className="flex items-center justify-between"><span>🎬 Reels u 30 dana</span><span className="font-bold">{period30.reels} / {unlockReq.reels}</span></div>
            <div className="flex items-center justify-between"><span>💎 Prodaje u 30 dana</span><span className="font-bold">{period30.sales} / {unlockReq.sales}</span></div>
            <div className="text-white/50 text-[10px] mt-1">Tvoja zarada od reels-ova čeka. Kad ispuniš uslove, otključavaš automatski.</div>
          </div>
        )}
      </div>

      {/* === SALES BUCKET — uvek dostupan === */}
      <div className="glass-strong rounded-3xl p-5 sm:p-6 border border-brand/30">
        <div className="flex items-start justify-between gap-3 mb-3 flex-wrap">
          <div>
            <div className="text-[10px] uppercase tracking-[0.2em] text-white/60 font-bold mb-1">💎 Prodaja paketa</div>
            <div className="font-display text-3xl sm:text-4xl font-black text-brand">
              {formatEUR(wallet.sales_balance)}

        {!pending && (

function NotificationPreferences({ athlete, refreshProfile }) {
  const [prefs, setPrefs] = useState(athlete?.notification_prefs || {});
  const [browserGranted, setBrowserGranted] = useState(typeof Notification !== 'undefined' && Notification.permission === 'granted');
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);

  useEffect(()=>{ setPrefs(athlete?.notification_prefs || {}); }, [athlete?.id]);

  async function toggle(key) {
    const next = { ...prefs, [key]: !(prefs[key] !== false) };
    setPrefs(next);
    setSaving(true);
    await supa.from('athletes').update({ notification_prefs: next }).eq('id', athlete.id);
    setSaving(false);
    setMsg({type:'ok', text:'✓ Sačuvano'});
    setTimeout(()=>setMsg(null), 1500);
    if (refreshProfile) refreshProfile(athlete.id);
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const raw = atob(base64);
    const arr = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }

  async function requestBrowserPush() {
    console.log('[VAMIT-PUSH] Start subscribe...');
    if (typeof Notification === 'undefined') { alert('Browser ne podržava push notifikacije.'); return; }
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      alert('Push API nije podržan na ovom uređaju.\n\nNa iPhone-u: instaliraj VAMIT-5 sa "Add to Home Screen" pa otvori PWA (iOS 16.4+).');
      return;
    }
    try {
      // 1. Trazi dozvolu
      const result = await Notification.requestPermission();
      console.log('[VAMIT-PUSH] Permission:', result);
      setBrowserGranted(result === 'granted');
      if (result !== 'granted') {
        alert('Dozvolio si NE dozvolu. Da prebroju: Settings → Apps → Browser → Notifications → Allow.');
        return;
      }

      // 2. Cekaj SW
      const reg = await navigator.serviceWorker.ready;
      console.log('[VAMIT-PUSH] SW ready, scope:', reg.scope);

      // 3. Cisti SVE atletino subs iz baze (sprecava duplikate)
      try {
        const { error: delErr } = await supa.from('push_subscriptions').delete().eq('athlete_id', athlete.id);
        if (delErr) console.warn('[VAMIT-PUSH] clear DB warn:', delErr);
        else console.log('[VAMIT-PUSH] Cleared old DB subs');
      } catch(e){ console.warn('clear db subs fail:', e); }

      // 4. Cisti browser sub
      let sub = await reg.pushManager.getSubscription();
      if (sub) {
        console.log('[VAMIT-PUSH] Unsub old browser sub');
        try { await sub.unsubscribe(); } catch(e){ console.warn(e); }
      }

      // 5. Kreiraj sveze subscription
      try {
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
      } catch(subErr) {
        console.error('[VAMIT-PUSH] subscribe FAIL:', subErr);
        alert('❌ pushManager.subscribe pukao:\n' + subErr.message + '\n\nProveri da je VAPID kljuc validan.');
        return;
      }
      console.log('[VAMIT-PUSH] Fresh sub:', sub.endpoint);

      // 6. Sacuvaj UPSERT (siguran nacin — ako endpoint vec postoji, update-uj)
      const subJson = sub.toJSON();
      const { error: saveErr } = await supa.from('push_subscriptions').upsert({
        athlete_id: athlete.id,
        endpoint: sub.endpoint,
        p256dh: subJson.keys?.p256dh || '',
        auth: subJson.keys?.auth || '',
        user_agent: navigator.userAgent,
        last_seen_at: new Date().toISOString()
      }, { onConflict: 'endpoint' });
      if (saveErr) {
        console.error('[VAMIT-PUSH] save sub error:', saveErr);
        alert('❌ Greska pri snimanju subscription-a:\n' + saveErr.message + '\n\nKod: ' + (saveErr.code || 'n/a'));
        return;
      }

      // 7. Verifikuj da je u bazi
      const { data: check } = await supa.from('push_subscriptions').select('id').eq('athlete_id', athlete.id);
      console.log('[VAMIT-PUSH] DB subs after save:', check?.length || 0);

      console.log('[VAMIT-PUSH] Saved sub for athlete:', athlete.id);
      alert('✅ Push notifikacije UKLJUČENE!\n\nKlikni "Test push" da proveris da li stize na telefon.');
    } catch(e) {
      console.error('[VAMIT-PUSH] Subscribe error:', e);
      alert('Greška: ' + e.message + '\n\nPogledaj Console (F12) za detalje.');
    }
  }

  async function sendTestPush() {
    console.log('[VAMIT-PUSH] Send test push...');
    try {
      const { data, error } = await supa.functions.invoke('send-push', {
        body: {
          athlete_id: athlete.id,
          title: '🧪 Test notifikacija',
          body: 'Ako vidiš ovo na telefonu — sve radi. Probaj da zatvoris PWA, pa ponovo testira.',
          icon: '🚀',
          action_url: '#/dashboard',
          priority: 'high'
        }
      });
      console.log('[VAMIT-PUSH] Edge response:', data, error);
      if (error) { alert('Greška iz edge funkcije: ' + error.message); return; }
      const sent = data?.sent || 0;
      const total = data?.total || 0;
      const errArr = data?.errors || [];
      if (sent === 0 && total === 0) {
        alert('⚠️ Nema subscription-a u bazi. Prvo klikni "Uključi" → zatim "Test push".');
      } else if (sent === 0) {
        const errTxt = errArr.length ? '\n\nGreske:\n' + errArr.join('\n\n') : '\n\n(nema detaljnih greska)';
        alert('⚠️ Push nije isporucen.\n\nTotal: ' + total + ', Sent: ' + sent + errTxt);
      } else {
        alert('✅ Poslato! Push treba da iskoči za 5-10 sekundi.\n\nSent: ' + sent + ' / ' + total);
      }
    } catch(e) {
      console.error('[VAMIT-PUSH] Test push error:', e);
      alert('Greška: ' + e.message);
    }
  }

  async function disableBrowserPush() {
    try {
      if ('serviceWorker' in navigator) {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        if (sub) {
          await supa.from('push_subscriptions').delete().eq('endpoint', sub.endpoint);
          await sub.unsubscribe();
        }
      }
    } catch(e){ console.error(e); }
    setBrowserGranted(false);
    alert('Push notifikacije iskljucene.');
  }

  return (
    <div className="glass-strong rounded-2xl p-5 sm:p-6 space-y-4">
      <div>
        <div className="font-display font-bold text-base">🔔 Notifikacije</div>
        <p className="text-xs text-white/60 mt-1">Biraš šta hoćeš da pratiš. Sve menjamo po želji.</p>
      </div>

      {/* Browser push toggle */}
      <div className={"p-3 rounded-xl border " + (browserGranted ? 'bg-lime/5 border-lime/30' : 'bg-gold/5 border-gold/30')}>
        <div className="flex items-center justify-between gap-3">
          <div className="min-w-0">
            <div className="font-bold text-sm flex items-center gap-2">
              {browserGranted ? '✓ Push obaveštenja' : '🔔 Uključi push'}
            </div>
            <div className="text-[11px] text-white/60 mt-0.5">
              {browserGranted ? 'Dobijaš notifikacije i kada portal nije otvoren.' : 'Klikni da dozvoliš obaveštenja na telefonu/računaru.'}
            </div>
          </div>
          {browserGranted ? (
            <button onClick={disableBrowserPush} className="px-3 py-1.5 rounded-lg bg-white/5 text-xs font-bold shrink-0">Isključi</button>
          ) : (
            <button onClick={requestBrowserPush} className="px-4 py-2 rounded-lg bg-brand text-bg0 text-xs font-bold shrink-0">Uključi</button>
          )}
        </div>
        {browserGranted && (
          <button onClick={sendTestPush}

  useEffect(() => {

    window.addEventListener('beforeinstallprompt', handler);

function AvatarUpload({ profile, refreshProfile }) {
  const [uploading, setUploading] = useState(false);
  const [err, setErr] = useState(null);
  const fileRef = useRef(null);

  async function handleFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 5*1024*1024) { setErr('Slika je veća od 5MB'); return; }
    setErr(null);
    setUploading(true);
    try {
      const ext = file.name.split('.').pop().toLowerCase();
      const path = `${profile.id}/avatar.${ext}`;
      // Upload (upsert: true)
      const { error: upErr } = await supa.storage.from('avatars').upload(path, file, { upsert: true, cacheControl: '60' });
      if (upErr) throw upErr;
      // Public URL
      const { data: pub } = supa.storage.from('avatars').getPublicUrl(path);
      const url = pub.publicUrl + '?t=' + Date.now(); // bust cache
      // Update profile
      const { error: profErr } = await supa.from('profiles').update({ avatar_url: url }).eq('id', profile.id);
      if (profErr) throw profErr;
      if (refreshProfile) await refreshProfile(profile.id);
    } catch(e) {
      console.error(e); setErr(e.message || 'Greška pri uploadu');
    } finally {
      setUploading(false);
    }
  }

  return (
    <div className="glass-strong rounded-2xl p-5 sm:p-6 flex items-center gap-4">
      <div className="w-20 h-20 rounded-full overflow-hidden bg-bg1 border-2 border-brand/30 shrink-0">
        {profile?.avatar_url ? (
          <img src={profile.avatar_url} alt="" className="w-full h-full object-cover"/>
        ) : (
          <div className="w-full h-full flex items-center justify-center text-2xl">👤</div>
        )}
      </div>
      <div className="flex-1 min-w-0">
        <div className="font-display font-bold text-base">Profilna slika</div>
        <div className="text-[11px] text-white/60 mb-2">JPG, PNG ili WebP, max 5MB. Druge atlete je vide u rang listi.</div>
        <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp,image/gif" onChange={handleFile} className="hidden"/>
        <button type="button" onClick={()=>fileRef.current?.click()} disabled={uploading}
          className="px-3 py-1.5 rounded-lg bg-brand text-bg0 text-xs font-bold disabled:opacity-50">
          {uploading ? 'Uploadujem...' : profile?.avatar_url ? 'Promeni sliku' : 'Postavi sliku'}
        </button>
        {err && <div className="text-[11px] text-danger mt-1">{err}</div>}
      </div>
    </div>
  );
}

function AdminReelsQueue() {
  const [reels, setReels] = useState([]);
  useEffect(()=>{ load(); }, []);
  async function load() {
    const { data } = await supa.from('reels').select('*').eq('status','pending').order('submitted_at');
    setReels(await enrichWithAthletes(data||[]));
  }
  async function decide(id, status, reason=null) {
    const reel = reels.find(r=>r.id===id);
    await supa.from('reels').update({ status, reviewed_at: new Date().toISOString(), reject_reason: reason }).eq('id', id);
    if (status === 'approved') {
      // Dodaj earnings koristeci athlete-ov nivo — SAMO JEDAN PUT (dedup po ref_id)
      const { data: athleteRow } = await supa.from('athletes').select('level').eq('id', reel.athlete_id).maybeSingle();
      const levelKey = athleteRow?.level || 'recruit';
      const { data: cfg } = await supa.from('level_configs').select('reel_reward_cents').eq('level_key', levelKey).maybeSingle();
      const reward = cfg?.reel_reward_cents || 30;
      await insertReelEarningsOnce(reel.athlete_id, id, reward);
      await sendTemplated(reel.athlete_id, 'reel_approved', { amount: (reward/100).toFixed(2) }, '#/isplate');
      // Pokreni achievement engine — moze otkljucati reels/streak dostignuca
      await triggerEngine(reel.athlete_id);
    } else if (status === 'rejected') {
      await sendTemplated(reel.athlete_id, 'reel_rejected', { reason: reason || 'Tvoj reel ne ispunjava uslove.' }, '#/reels');
    }
    load();
  }

  if (reels.length===0) return <div className="glass rounded-2xl p-8 text-center text-white/60">Nema Reel-ova za review.</div>;
  return (
    <div className="space-y-3">
      {reels.map(r => (
        <div key={r.id} className="glass-strong rounded-2xl p-4">
          <div className="flex items-center justify-between gap-3 mb-3">
            <div className="text-sm">
              <div className="font-bold">{r.profiles?.full_name || r.profiles?.email || 'Atleta'}</div>
              <div className="text-[11px] text-white/40">{fromNow(r.submitted_at)}</div>
            </div>
          </div>
          <a href={r.url} target="_blank" rel="noopener" className="text-xs text-brand hover:underline break-all block mb-3">{r.url}</a>
          {r.caption && <div className="text-xs text-white/60 mb-3">{r.caption}</div>}
          <div className="flex gap-2">
            <button onClick={()=>decide(r.id,'approved')} className="flex-1 py-2 rounded-lg bg-lime/15 border border-lime/40 text-lime font-bold text-sm">✓ Approve</button>
            <button onClick={()=>{const reason=prompt('Razlog odbijanja:'); if(reason) decide(r.id,'rejected',reason);}} className="flex-1 py-2 rounded-lg bg-danger/15 border border-danger/40 text-danger font-bold text-sm">✗ Reject</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function AdminPayoutQueue() {
  const [items, setItems] = useState([]);
