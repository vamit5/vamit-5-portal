<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const supa = (window.SUPABASE_URL && window.SUPABASE_ANON_KEY !== "REPLACE_WITH_ANON_KEY" && window.supabase)
  ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY, { auth: { flowType:'implicit', detectSessionInUrl:true, persistSession:true, autoRefreshToken:true } })
  : null;

const LOGO = "https://res.cloudinary.com/dqqljgtna/image/upload/v1778767942/VAMIT-5-removebg-preview_2_uvii77.png";
const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSdv438-d72F_NZl75CSOmMxyo92ZiKfUlQ8WT0JW4uknerkhg/viewform";
const REWARDFUL_URL = "https://vamit-5-2.getrewardful.com/";

// === ROUTER (hash-based) ===
function useHash() {
  const [hash, setHash] = useState(window.location.hash || '#/');
  useEffect(() => {
    const onChange = () => setHash(window.location.hash || '#/');
    window.addEventListener('hashchange', onChange);
    return () => window.removeEventListener('hashchange', onChange);
  }, []);
  return hash;
}

// === AUTH STATE ===
function useAuth() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!supa) { setLoading(false); return; }
    supa.auth.getSession().then(({ data }) => {
      setUser(data.session?.user || null);
      setLoading(false);
    });
    const { data: sub } = supa.auth.onAuthStateChange((_, session) => {
      setUser(session?.user || null);
    });
    return () => sub.subscription.unsubscribe();
  }, []);
  return { user, loading };
}

// === COMPONENTS ===
function Nav({ user }) {
  return (
    <nav className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between relative z-10">
      <a href="#/" className="flex items-center gap-2">
        <img src={LOGO} alt="VAMIT-5" className="w-10 h-10 object-contain" />
        <div>
          <div className="font-black text-base">VAMIT-5</div>
          <div className="text-[10px] tracking-[0.18em] text-white/50 uppercase font-bold">Athlete Portal</div>
        </div>
      </a>
      {user ? (
        <a href="#/portal" className="px-4 py-2 rounded-xl text-sm font-bold bg-gradient-to-r from-brand to-brand2 text-bg0">
          Moj portal
        </a>
      ) : (
        <a href="#/login" className="px-4 py-2 rounded-xl text-sm font-bold bg-gradient-to-r from-brand to-brand2 text-bg0">
          Prijava
        </a>
      )}
    </nav>
  );
}

function LandingPage() {
  return (
    <div className="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 pt-8 sm:pt-16 pb-20">
      <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full glass border-gold/40 mb-7">
        <span className="h-2 w-2 rounded-full bg-gold" style={{animation:'pulse 1.6s infinite'}}></span>
        <span className="text-xs font-bold text-gold tracking-[0.18em] uppercase">Phase 0 — Foundation</span>
      </div>

      <h1 className="font-display font-black text-4xl sm:text-6xl md:text-7xl tracking-[-0.03em] leading-[1.05] mb-6 max-w-5xl">
        VAMIT-5 Athlete<br />
        <span className="grad-text-gold">Portal</span>
      </h1>

      <p className="text-base sm:text-xl text-white/70 max-w-2xl mb-10 leading-relaxed">
        4 nivoa napredovanja. Instant zarade po Reel-u. Gamifikacija. Kursevi. Tim.
        Sve u jednoj aplikaciji.
      </p>

      <div className="flex flex-col sm:flex-row gap-3 sm:gap-4 mb-12">
        <a href={FORM_URL} target="_blank" rel="noopener"
           className="inline-flex items-center justify-center gap-2 px-6 sm:px-8 py-4 rounded-2xl font-extrabold text-bg0 bg-gradient-to-r from-brand via-brand2 to-brand3 shadow-[0_20px_50px_-12px_rgba(0,240,255,0.6)]">
          POSTANI VAMIT-5 ATHLETE →
        </a>
        <a href="#/login"
           className="inline-flex items-center justify-center gap-2 px-6 sm:px-8 py-4 rounded-2xl font-extrabold glass text-white">
          Već sam atleta — Prijava
        </a>
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-12">
        {[
          {emoji:'🎬', label:'Reels', text:'€0.30 po odobrenom'},
          {emoji:'💎', label:'Prodaja', text:'35-50% provizije'},
          {emoji:'👥', label:'Tim', text:'15% doživotno'},
          {emoji:'🏆', label:'Nivoi', text:'4 koraka do Elite'},
        ].map(c => (
          <div key={c.label} className="glass rounded-2xl p-4 sm:p-5">
            <div className="text-3xl mb-2">{c.emoji}</div>
            <div className="font-black text-sm sm:text-base">{c.label}</div>
            <div className="text-xs text-white/60 mt-1">{c.text}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function LoginPage() {
  const [email, setEmail] = useState("");
  const [sent, setSent] = useState(false);
  const [err, setErr] = useState(null);
  const [loading, setLoading] = useState(false);

  async function handleLogin(e) {
    e.preventDefault();
    if (!supa) { setErr("Supabase nije konfigurisan. Admin treba da postavi SUPABASE_ANON_KEY."); return; }
    setLoading(true); setErr(null);
    const { error } = await supa.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + '/' }
    });
    setLoading(false);
    if (error) setErr(error.message);
    else setSent(true);
  }

  return (
    <div className="relative z-10 min-h-[80vh] flex items-center justify-center px-4">
      <div className="w-full max-w-md">
        <div className="glass-strong rounded-3xl p-8 sm:p-10">
          <h1 className="font-display text-2xl sm:text-3xl font-black mb-2">Prijavi se</h1>
          <p className="text-sm text-white/60 mb-6">Unesi email i šaljemo ti magic link.</p>

          {!sent ? (
            <form onSubmit={handleLogin} className="space-y-4">
              <input type="email" required value={email} onChange={e=>setEmail(e.target.value)}
                placeholder="tvoj@email.com"
                className="w-full px-4 py-3 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm" />
              {err && <div className="text-sm text-danger bg-danger/10 border border-danger/30 rounded-lg px-3 py-2">{err}</div>}
              <button type="submit" disabled={loading || !email}
                className="w-full py-3.5 rounded-xl font-extrabold text-bg0 bg-gradient-to-r from-brand via-brand2 to-brand3 disabled:opacity-50">
                {loading ? "Šaljem..." : "Pošalji magic link"}
              </button>
            </form>
          ) : (
            <div className="text-center py-4">
              <div className="text-5xl mb-3">📧</div>
              <div className="font-bold mb-2">Link je poslat!</div>
              <div className="text-sm text-white/60">
                Proveri inbox za <b className="text-brand">{email}</b> — klikni link u mejlu.
              </div>
            </div>
          )}

          <div className="mt-6 pt-6 border-t border-white/10 text-center text-xs text-white/50">
            Nisi još atleta?{" "}
            <a href={FORM_URL} target="_blank" rel="noopener" className="text-brand font-bold hover:underline">
              Prijavi se →
            </a>
          </div>
        </div>
      </div>
    </div>
  );
}

function PortalPage({ user }) {
  async function logout() {
    if (supa) await supa.auth.signOut();
    window.location.hash = '#/';
  }
  return (
    <div className="relative z-10 max-w-4xl mx-auto px-4 sm:px-6 py-12">
      <div className="flex items-center justify-between mb-8">
        <div>
          <div className="text-xs text-white/50 uppercase tracking-wider">Prijavljen kao</div>
          <div className="font-bold">{user?.email}</div>
        </div>
        <button onClick={logout} className="px-3 py-1.5 rounded-lg text-xs bg-white/5 border border-white/10">Logout</button>
      </div>

      <div className="glass-strong rounded-3xl p-8 sm:p-12 text-center">
        <div className="text-6xl mb-4">🚧</div>
        <h1 className="font-display text-3xl font-black mb-3">Portal u izgradnji</h1>
        <p className="text-white/70 mb-6 leading-relaxed">
          Trenutno gradimo <b className="text-brand">Phase 1</b>: athlete dashboard sa real-time podacima,
          Reels submit, kurs, isplate.
        </p>
        <div className="text-xs text-white/40">Vraćaš se uskoro i vidiš sve.</div>
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-6">
        {['Dashboard','Reels','Kurs','Isplate'].map(t => (
          <div key={t} className="glass rounded-2xl p-4 text-center opacity-50">
            <div className="font-bold text-sm">{t}</div>
            <div className="text-[10px] text-white/40 mt-1">Phase 1</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function NotConfigured() {
  return (
    <div className="min-h-[80vh] flex items-center justify-center px-4 relative z-10">
      <div className="glass-strong rounded-3xl p-8 max-w-lg text-center">
        <div className="text-5xl mb-4">⚙️</div>
        <h2 className="font-display text-2xl font-black mb-3">Konfiguracija nedostaje</h2>
        <p className="text-white/70 text-sm leading-relaxed mb-4">
          Admin treba da postavi <code className="text-brand">SUPABASE_ANON_KEY</code> u <code>index.html</code> fajlu.
        </p>
        <p className="text-xs text-white/50">
          Otvori GitHub repo, edituj <code>index.html</code>, pronađi liniju koja kaže<br/>
          <code className="text-brand">REPLACE_WITH_ANON_KEY</code> i zameni je sa pravim ključem iz Supabase.
        </p>
      </div>
    </div>
  );
}

function App() {
  const hash = useHash();
  const { user, loading } = useAuth();

  useEffect(() => {
    var el = document.getElementById('loading');
    if (el && !loading) el.style.display='none';
  }, [loading]);

  // Posle login-a: ako je user na landing (#/), automatski u portal
  useEffect(() => {
    if (!loading && user) {
      const route = (window.location.hash || '#/').replace('#', '').split('?')[0] || '/';
      if (route === '/' || route === '/login') {
        window.location.hash = '#/portal';
      }
    }
  }, [user, loading]);

  // Konfiguracija nedostaje
  if (!supa) {
    return (
      <div className="min-h-screen">
        <Nav user={null} />
        <NotConfigured />
      </div>
    );
  }

  // Učitavanje
  if (loading) return null;

  // Routing
  let page;
  const route = hash.replace('#', '').split('?')[0] || '/';

  if (route === '/login') {
    if (user) { window.location.hash = '#/portal'; return null; }
    page = <LoginPage />;
  } else if (route === '/portal') {
    if (!user) { window.location.hash = '#/login'; return null; }
    page = <PortalPage user={user} />;
  } else {
    page = <LandingPage />;
  }

  return (
    <div className="min-h-screen">
      <Nav user={user} />
      {page}
      <footer className="max-w-7xl mx-auto px-4 sm:px-6 py-8 text-xs text-white/40 text-center mt-12">
        © {new Date().getFullYear()} VAMIT-5 Athlete Portal · Phase 0
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
