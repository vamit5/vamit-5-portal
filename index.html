// === ROUTING ===
function useHash() {
  const [hash, setHash] = useState(window.location.hash || '#/');
  useEffect(() => {
    const onChange = () => setHash(window.location.hash || '#/');
    window.addEventListener('hashchange', onChange);
    return () => window.removeEventListener('hashchange', onChange);
  }, []);
  return hash;
}

// === AUTH ===
function useAuth() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [athlete, setAthlete] = useState(null);
  const [loading, setLoading] = useState(true);

  async function refreshProfile(uid) {
    if (!uid) { setProfile(null); setAthlete(null); return; }
    try {
      const [{ data: prof }, { data: ath }] = await Promise.all([
        supa.from('profiles').select('*').eq('id', uid).maybeSingle(),
        supa.from('athletes').select('*').eq('id', uid).maybeSingle()
      ]);
      setProfile(prof);
      setAthlete(ath);
    } catch(e) { console.error('profile load', e); }
  }

  useEffect(() => {
    supa.auth.getSession().then(async ({ data }) => {
      const u = data.session?.user || null;
      setUser(u);
      if (u) await refreshProfile(u.id);
      setLoading(false);
    });
    const { data: sub } = supa.auth.onAuthStateChange(async (_, session) => {
      const u = session?.user || null;
      setUser(u);
      if (u) await refreshProfile(u.id);
      else { setProfile(null); setAthlete(null); }
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  return { user, profile, athlete, loading, refreshProfile };
}

const formatEUR = (cents) => '€' + ((cents||0)/100).toFixed(2);
const formatDate = (d) => d ? new Date(d).toLocaleDateString('sr-Latn',{day:'2-digit', month:'short', year:'numeric'}) : '-';
const fromNow = (d) => {
  if(!d) return '';
  const diff = Math.floor((Date.now() - new Date(d).getTime())/1000);
  if (diff<60) return 'pre malo';
  if (diff<3600) return Math.floor(diff/60)+'m';
  if (diff<86400) return Math.floor(diff/3600)+'h';
  return Math.floor(diff/86400)+'d';
};

function LoginPage() {
  const [email, setEmail] = useState("");
  const [code, setCode] = useState("");
  const [step, setStep] = useState("email");
  const [err, setErr] = useState(null);
  const [loading, setLoading] = useState(false);

  async function sendCode(e) {
    e.preventDefault();
    setLoading(true); setErr(null);
    const { error } = await supa.auth.signInWithOtp({ email, options:{ shouldCreateUser:true } });
    setLoading(false);
    if (error) setErr(error.message);
    else setStep("code");
  }
  async function verifyCode(e) {
    e.preventDefault();
    setLoading(true); setErr(null);
    const { error } = await supa.auth.verifyOtp({ email, token: code.trim(), type:'email' });
    setLoading(false);
    if (error) setErr(error.message);
    else { window.location.hash = '#/dashboard'; }
  }

  return (
    <div className="relative z-10 min-h-[80vh] flex items-center justify-center px-4 py-8">
      <div className="w-full max-w-md">
        <div className="glass-strong rounded-3xl p-8 sm:p-10">
          <h1 className="font-display text-2xl sm:text-3xl font-black mb-2">Prijavi se</h1>
          {step==="email" && (
            <>
              <p className="text-sm text-white/60 mb-6">Unesi email — šaljemo ti 6-cifreni kod.</p>
              <form onSubmit={sendCode} className="space-y-4">
                <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="tvoj@email.com"
                  className="w-full px-4 py-3 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm"/>
                {err && <div className="text-sm text-danger bg-danger/10 border border-danger/30 rounded-lg px-3 py-2">{err}</div>}
                <button type="submit" disabled={loading||!email}
                  className="w-full py-3.5 rounded-xl font-extrabold text-bg0 bg-gradient-to-r from-brand via-brand2 to-brand3 disabled:opacity-50">
                  {loading ? "Šaljem..." : "Pošalji kod"}
                </button>
              </form>
            </>
          )}
          {step==="code" && (
            <>
              <p className="text-sm text-white/60 mb-1">Kod je poslat na <b className="text-brand">{email}</b></p>
              <p className="text-xs text-white/50 mb-6">Otvori email i ukucaj kod.</p>
              <form onSubmit={verifyCode} className="space-y-4">
                <input type="text" inputMode="numeric" autoComplete="one-time-code" required value={code}
                  onChange={e=>setCode(e.target.value.replace(/\s/g,''))} placeholder="123456" maxLength={10}
                  className="w-full px-4 py-3 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-center text-2xl tracking-[0.3em] font-bold"/>
                {err && <div className="text-sm text-danger bg-danger/10 border border-danger/30 rounded-lg px-3 py-2">{err}</div>}
                <button type="submit" disabled={loading||code.length<4}

                <button type="button" onClick={()=>{setStep("email");setCode("");setErr(null);}}

function Dashboard({ athlete, profile }) {
  const [stats, setStats] = useState({ reels_total:0, reels_month:0, reels_pending:0, sales_total:0, sales_month:0, earnings_pending:0, earnings_available:0, earnings_lifetime:0, streak:0 });
  const [activity, setActivity] = useState([]);
  const [levelCfg, setLevelCfg] = useState(null);
  const theme = LEVEL_THEME[athlete?.level || 'recruit'];

  useEffect(() => {
    if (!athlete) return;
    loadAll();
    const ch = supa.channel('dash_' + athlete.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'reels', filter: 'athlete_id=eq.'+athlete.id }, loadAll)
      .on('postgres_changes', { event:'*', schema:'public', table:'sales', filter: 'athlete_id=eq.'+athlete.id }, loadAll)
      .on('postgres_changes', { event:'*', schema:'public', table:'earnings_ledger', filter: 'athlete_id=eq.'+athlete.id }, loadAll)
      .subscribe();
    return () => { try { ch.unsubscribe(); } catch(e){} };
  }, [athlete?.id]);

  async function loadAll() {
    const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);
    const [r1, r2, r3, sa, sm, ep, ea, el, lc] = await Promise.all([
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','approved'),
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','approved').gte('submitted_at', monthStart.toISOString()),
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','pending'),
      supa.from('sales').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','confirmed'),
      supa.from('sales').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','confirmed').gte('created_at', monthStart.toISOString()),
      supa.from('earnings_ledger').select('amount_cents').eq('athlete_id', athlete.id).eq('status','pending'),
      supa.from('earnings_ledger').select('amount_cents').eq('athlete_id', athlete.id).eq('status','available').is('payout_request_id', null),
      supa.from('earnings_ledger').select('amount_cents').eq('athlete_id', athlete.id).in('status', ['available','paid','pending']),
      supa.from('level_configs').select('*').eq('level_key', athlete.level).maybeSingle()
    ]);
    setStats({
      reels_total: r1.count||0,
      reels_month: r2.count||0,
      reels_pending: r3.count||0,
      sales_total: sa.count||0,
      sales_month: sm.count||0,
      earnings_pending: (ep.data||[]).reduce((s,x)=>s+x.amount_cents,0),
      earnings_available: (ea.data||[]).reduce((s,x)=>s+x.amount_cents,0),
      earnings_lifetime: (el.data||[]).reduce((s,x)=>s+x.amount_cents,0),
      streak: 0
    });
    setLevelCfg(lc.data);

    // recent activity
    const { data: acts } = await supa.from('earnings_ledger').select('*').eq('athlete_id', athlete.id).order('created_at',{ascending:false}).limit(8);
    setActivity(acts||[]);
  }

  if (!athlete) return <div className="glass rounded-2xl p-8 text-center text-white/60">Atleta nije pronađena. Kontaktiraj admina.</div>;

  const reqs = levelCfg?.requirements_json || {};
  const monthlyReq = levelCfg?.monthly_threshold_json || {};
  const introActive = athlete.recruit_intro_period_until && new Date(athlete.recruit_intro_period_until) > new Date();

  return (
    <div className="space-y-6">
      {/* GREETING */}
      <div>
        <div className="text-xs text-white/50 uppercase tracking-wider mb-1">Dobrodošao</div>
        <h1 className="font-display text-2xl sm:text-3xl font-black">{profile?.full_name || 'Atleta'}</h1>
      </div>

      {/* LEVEL CARD */}
      <div className={"rounded-3xl p-6 sm:p-8 glass-strong border " + theme.glow}
           style={{borderColor: theme.color+'40'}}>
        <div className="flex items-start justify-between mb-5">
          <div>
            <div className="text-xs uppercase tracking-[0.2em] font-bold mb-2" style={{color:theme.color}}>Tvoj nivo</div>
            <div className="font-display text-3xl sm:text-4xl font-black" style={{color:theme.color}}>{theme.emoji} {theme.name} ATHLETE</div>
            <div className="text-sm text-white/60 mt-2">

          </div>

            <div className="text-[10px] uppercase tracking-wider text-white/50">XP</div>
            <div className="font-black text-xl" style={{color:theme.color}}>{athlete.current_xp || 0}</div>

        </div>

        {introActive && (
          <div className="mb-4 p-3 rounded-xl bg-gold/10 border border-gold/30 text-xs sm:text-sm">

            )}

              <ProgressRow label="Reelovi (total)" current={stats.reels_total} target={reqs.reels_total} color={theme.color}/>
            )}
            {reqs.reels_qualifying_month && (
              <ProgressRow label="Reelovi (ovaj mesec)" current={stats.reels_month} target={reqs.reels_qualifying_month} color={theme.color}/>
            )}

        )}
      </div>

      {/* EARNINGS */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4">

        <StatCard label="Lifetime" value={formatEUR(stats.earnings_lifetime)} accent="brand" emoji="💎"/>

      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">

        <QuickAction href="#/kurs" emoji="📚" label="Otvori Kurs" color="#00f0ff"/>
        <QuickAction href="#/isplate" emoji="💸" label="Isplate" color="#ffc24b"/>
        <QuickAction href="#/profil" emoji="👤" label="Profil" color="#a855f7"/>

      {/* OVERVIEW STATS */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <MiniStat label="Reels (total)" value={stats.reels_total} sub={stats.reels_pending + ' pending'} />
        <MiniStat label="Reels (mesec)" value={stats.reels_month} sub={"od "+(monthlyReq.reels_30d||monthlyReq.reels_per_month||30)} />
        <MiniStat label="Prodaje (total)" value={stats.sales_total} sub={stats.sales_month + ' ovaj mesec'} />
        <MiniStat label="Tvoj kod" value={athlete.promo_code} sub="Affiliate"/>
      </div>

      {/* ACTIVITY */}
      <div className="glass rounded-2xl p-5 sm:p-6">
        <div className="font-display font-black text-lg mb-4">Skorije aktivnosti</div>
        {activity.length === 0 ? (
          <div className="text-sm text-white/50 py-6 text-center">
            Nemaš još aktivnosti. Postavi svoj prvi Reel za zaradu! 🎬
          </div>
        ) : (
          <div className="space-y-2">
            {activity.map(a => (
              <div key={a.id} className="flex items-center justify-between px-3 py-2 rounded-lg bg-white/5">
                <div className="flex items-center gap-3">
                  <div className="text-xl">{a.source==='reel'?'🎬':a.source==='sale'?'💎':a.source==='team'?'👥':'⚡'}</div>
                  <div>
                    <div className="text-sm font-bold">{a.description || a.source}</div>
                    <div className="text-xs text-white/50">{fromNow(a.created_at)}</div>
                  </div>
                </div>
                <div className={"font-black text-sm " + (a.status==='pending' ? 'text-gold' : 'text-lime')}>
                  {a.amount_cents > 0 ? '+' : ''}{formatEUR(a.amount_cents)}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function ProgressRow({ label, current, target, color }) {
  const pct = Math.min(100, Math.round((current/target)*100));
  return (
    <div>
      <div className="flex items-center justify-between mb-1.5 text-xs">
        <span className="text-white/70">{label}</span>
        <span className="font-bold">{current} / {target}</span>
      </div>
      <div className="h-2 rounded-full bg-white/5 overflow-hidden">
        <div className="h-full rounded-full transition-all" style={{ width: pct+'%', background: color }}></div>
      </div>
    </div>
  );
}

function StatCard({ label, value, accent, emoji }) {
  const colors = { lime:'#a6ff3b', gold:'#ffc24b', brand:'#00f0ff', brand3:'#ff3b9a' };
  return (
    <div className="glass rounded-2xl p-4">
      <div className="flex items-center gap-2 mb-1.5">
        <span className="text-base">{emoji}</span>
        <span className="text-[10px] uppercase tracking-wider text-white/60 font-bold">{label}</span>
      </div>
      <div className="font-display font-black text-xl sm:text-2xl" style={{color: colors[accent]}}>{value}</div>
    </div>
  );
}

function MiniStat({ label, value, sub }) {
  return (
    <div className="glass rounded-xl px-4 py-3">
      <div className="text-[10px] uppercase tracking-wider text-white/50">{label}</div>
      <div className="font-black text-lg mt-1">{value}</div>
      <div className="text-[10px] text-white/40 mt-0.5">{sub}</div>
    </div>
  );
}

function QuickAction({ href, emoji, label, color }) {
  return (
    <a href={href} className="glass card-hover rounded-2xl p-4 text-center hover:scale-105 transition-all" style={{borderColor: color+'30'}}>
      <div className="text-3xl mb-1.5">{emoji}</div>
      <div className="text-xs font-bold" style={{color: color}}>{label}</div>
    </a>
  );
}

// === REELS ===
function ReelsPage({ athlete }) {
  const [url, setUrl] = useState('');
  const [caption, setCaption] = useState('');
  const [reels, setReels] = useState([]);
  const [submitting, setSubmitting] = useState(false);
  const [msg, setMsg] = useState(null);

  useEffect(()=> { if(athlete) loadReels(); }, [athlete?.id]);

  async function loadReels() {
    const { data } = await supa.from('reels').select('*').eq('athlete_id', athlete.id).order('submitted_at',{ascending:false}).limit(50);
    setReels(data||[]);
  }

  async function submit(e) {
    e.preventDefault();
    setSubmitting(true); setMsg(null);
    const { error } = await supa.from('reels').insert({ athlete_id: athlete.id, url, caption: caption||null });
    setSubmitting(false);
    if (error) setMsg({type:'err', text: error.message});
    else {
      setMsg({type:'ok', text:'Reel poslat! Admin će ga proveriti uskoro.'});
      setUrl(''); setCaption('');
      loadReels();
    }
  }

  const colors = { pending:'#ffc24b', approved:'#a6ff3b', rejected:'#ff4d5e' };
  const labels = { pending:'Pending review', approved:'✓ Odobreno', rejected:'✗ Odbijeno' };

  return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">🎬 Moji Reels</h1>
        <p className="text-sm text-white/60">Postavi Instagram Reel URL — admin proverava i ti zarađuješ.</p>
      </div>

      <div className="glass-strong rounded-2xl p-5 sm:p-6">
        <div className="font-display font-bold text-lg mb-4">Submit novi Reel</div>
        <form onSubmit={submit} className="space-y-3">
          <input type="url" required value={url} onChange={e=>setUrl(e.target.value)}
            placeholder="https://www.instagram.com/reel/..."
            className="w-full px-4 py-3 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm"/>
          <textarea value={caption} onChange={e=>setCaption(e.target.value)} placeholder="Caption (opciono)"
            rows={2} className="w-full px-4 py-3 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm"/>
          {msg && (
            <div className={"text-xs px-3 py-2 rounded-lg " + (msg.type==='ok' ? 'bg-lime/10 border border-lime/30 text-lime' : 'bg-danger/10 border border-danger/30 text-danger')}>
              {msg.text}
            </div>
          )}
          <button type="submit" disabled={submitting||!url}
            className="w-full sm:w-auto px-6 py-3 rounded-xl font-bold text-bg0 bg-gradient-to-r from-brand via-brand2 to-brand3 disabled:opacity-50">
            {submitting ? 'Šaljem...' : 'Submit Reel'}
          </button>
        </form>
        <div className="mt-4 pt-4 border-t border-white/10 text-xs text-white/50 space-y-1">
          <div>📋 Pravila:</div>
          <div>• Minimum 20 sekundi · Pomeni VAMIT-5 · Tagiraj @vamit5_ · CTA na ekranu</div>
        </div>
      </div>

      <div className="glass rounded-2xl p-5 sm:p-6">
        <div className="font-display font-bold text-lg mb-4">Istorija ({reels.length})</div>
        {reels.length === 0 ? (
          <div className="text-sm text-white/50 py-8 text-center">Još uvek nemaš poslatih reelova.</div>
        ) : (
          <div className="space-y-2">
            {reels.map(r => (
              <div key={r.id} className="flex items-center justify-between gap-3 p-3 rounded-lg bg-white/5">
                <div className="min-w-0 flex-1">
                  <a href={r.url} target="_blank" rel="noopener" className="text-sm text-brand hover:underline truncate block">{r.url}</a>
                  <div className="text-[11px] text-white/40">{fromNow(r.submitted_at)}</div>
                  {r.reject_reason && <div className="text-[11px] text-danger mt-1">Razlog: {r.reject_reason}</div>}
                </div>
                <div className="text-[10px] font-black px-2 py-1 rounded uppercase tracking-wider" style={{background: colors[r.status]+'20', color: colors[r.status]}}>

// === KURS ===
function KursPage({ athlete }) {
  const [modules, setModules] = useState([]);
  const [openLesson, setOpenLesson] = useState(null);

  useEffect(()=> { loadModules(); }, []);
  async function loadModules() {
    const { data: mods } = await supa.from('course_modules').select('*').order('order_idx');
    const { data: lessons } = await supa.from('course_lessons').select('*').order('order_idx');
    const map = (mods||[]).map(m => ({...m, lessons: (lessons||[]).filter(l=>l.module_id===m.id)}));
    setModules(map);
  }
  const levelOrder = { recruit:0, pro:1, commando:2, elite:3 };
  const myLevel = levelOrder[athlete?.level || 'recruit'];

  return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">📚 Athlete Kurs</h1>
        <p className="text-sm text-white/60">17 modula. Sve što treba da znaš.</p>
      </div>

      {modules.length === 0 ? (
        <div className="glass rounded-2xl p-8 text-center text-white/60">Kurs još uvek nema sadržaja — admin uskoro dodaje.</div>
      ) : (
        <div className="space-y-3">
          {modules.map(m => {
            const locked = levelOrder[m.level_required] > myLevel;
            return (
              <div key={m.id} className={"glass rounded-2xl p-5 " + (locked ? 'opacity-50' : '')}>
                <div className="flex items-center justify-between gap-3 mb-2">
                  <div className="flex-1 min-w-0">
                    <div className="font-display font-black text-base sm:text-lg">{m.order_idx}. {m.name}</div>
                    <div className="text-xs text-white/60 mt-1">{m.description}</div>
                  </div>
                  {locked && <div className="text-xs px-2 py-1 rounded bg-white/10">🔒 {m.level_required.toUpperCase()}+</div>}
                </div>
                {!locked && m.lessons && m.lessons.length > 0 && (
                  <div className="mt-3 space-y-1">
                    {m.lessons.map(l => (
                      <button key={l.id} onClick={()=>l.youtube_url && setOpenLesson(l)} disabled={!l.youtube_url}
                        className="w-full flex items-center gap-3 p-2 rounded hover:bg-white/5 text-left disabled:opacity-50">
                        <span>{l.youtube_url ? '▶' : '⏳'}</span>
                        <span className="text-sm flex-1">{l.name}</span>
                        {!l.youtube_url && <span className="text-[10px] text-white/40">uskoro</span>}
                      </button>
                    ))}
                  </div>
                )}
                {!locked && (!m.lessons || m.lessons.length === 0) && (
                  <div className="mt-3 text-xs text-white/40 italic">Lekcije se uskoro dodaju.</div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {openLesson && (
        <div className="fixed inset-0 z-50 bg-bg0/95 backdrop-blur-xl p-4 flex flex-col" onClick={()=>setOpenLesson(null)}>
          <div className="flex justify-between items-center mb-4 max-w-4xl mx-auto w-full">
            <div className="font-bold">{openLesson.name}</div>
            <button className="text-2xl" onClick={()=>setOpenLesson(null)}>✕</button>
          </div>
          <div className="flex-1 flex items-center justify-center max-w-4xl mx-auto w-full">
            <div className="w-full aspect-video bg-black rounded-xl overflow-hidden">
              <iframe src={openLesson.youtube_url.replace('watch?v=','embed/').replace('youtu.be/','www.youtube.com/embed/')}
                className="w-full h-full" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// === ISPLATE ===
function IsplatePage({ athlete, profile, refreshProfile }) {
  const [available, setAvailable] = useState(0);
  const [history, setHistory] = useState([]);
  const [msg, setMsg] = useState(null);
  const [pending, setPending] = useState(null);

  useEffect(()=>{ if (athlete) load(); }, [athlete?.id]);
  async function load() {
    const [{ data: ea }, { data: pr }, { data: pp }] = await Promise.all([
      supa.from('earnings_ledger').select('amount_cents').eq('athlete_id', athlete.id).eq('status','available').is('payout_request_id', null),
      supa.from('payout_requests').select('*').eq('athlete_id', athlete.id).order('requested_at',{ascending:false}).limit(20),
      supa.from('payout_requests').select('*').eq('athlete_id', athlete.id).eq('status','pending').maybeSingle()
    ]);
    setAvailable((ea||[]).reduce((s,x)=>s+x.amount_cents,0));
    setHistory(pr||[]);
    setPending(pp);
  }

  async function requestPayout() {
    if (!athlete.bank_full_name || !athlete.bank_iban) {
      setMsg({type:'err', text:'Prvo unesi bank info u Profilu.'});
      return;
    }
    if (available < 1000) {
      setMsg({type:'err', text:'Minimum za isplatu je €10.'});
      return;
    }
    if (pending) {
      setMsg({type:'err', text:'Već imaš pending zahtev.'});
      return;
    }
    const { error } = await supa.from('payout_requests').insert({
      athlete_id: athlete.id, amount_cents: available,
      bank_info_snapshot: {
        full_name: athlete.bank_full_name, iban: athlete.bank_iban,
        bank: athlete.bank_name, phone: athlete.bank_phone
      }
    });
    if (error) setMsg({type:'err', text: error.message});
    else { setMsg({type:'ok', text:'Zahtev poslat! Admin obraduje uskoro.'}); load(); }
  }

  const sColor = { pending:'#ffc24b', approved:'#3b82f6', paid:'#a6ff3b', rejected:'#ff4d5e' };

  return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">💸 Isplate</h1>
        <p className="text-sm text-white/60">Pregled, zahtevi i istorija.</p>
      </div>

      <div className="glass-strong rounded-3xl p-6 sm:p-8 text-center" style={{boxShadow:'0 30px 60px -20px rgba(166,255,59,0.3)'}}>
        <div className="text-xs uppercase tracking-[0.2em] text-white/60 mb-2 font-bold">Dostupno za isplatu</div>
        <div className="font-display text-5xl sm:text-6xl font-black text-lime mb-4">{formatEUR(available)}</div>
        {pending ? (
          <div className="text-sm text-gold">⏳ Već imaš pending zahtev za {formatEUR(pending.amount_cents)}. Admin obrađuje.</div>
        ) : (
          <button onClick={requestPayout} disabled={available<1000}
            className="px-8 py-3.5 rounded-2xl font-extrabold text-bg0 bg-gradient-to-r from-lime to-brand disabled:opacity-50">
            📤 Zatraži isplatu
          </button>
        )}
        {msg && (
          <div className={"mt-4 text-xs " + (msg.type==='ok' ? 'text-lime' : 'text-danger')}>{msg.text}</div>
        )}
        <div className="mt-3 text-xs text-white/50">Minimum: €10 · Stiže za 24-48h posle approve-a</div>
      </div>

      <div className="glass rounded-2xl p-5 sm:p-6">
        <div className="font-display font-bold text-lg mb-4">Istorija zahteva ({history.length})</div>
        {history.length === 0 ? (
          <div className="text-sm text-white/50 py-6 text-center">Još nemaš zahteva.</div>
        ) : (
          <div className="space-y-2">
            {history.map(p => (
              <div key={p.id} className="flex items-center justify-between p-3 rounded-lg bg-white/5">
                <div>
                  <div className="font-bold">{formatEUR(p.amount_cents)}</div>
                  <div className="text-[11px] text-white/40">{formatDate(p.requested_at)}</div>
                </div>
                <div className="text-[10px] font-black px-2 py-1 rounded uppercase" style={{background:sColor[p.status]+'20', color:sColor[p.status]}}>
                  {p.status}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// === PROFIL ===
function ProfilPage({ athlete, profile, refreshProfile }) {
  const [form, setForm] = useState({
    full_name: profile?.full_name || '',
    bank_full_name: athlete?.bank_full_name || '',
    bank_iban: athlete?.bank_iban || '',
    bank_name: athlete?.bank_name || '',
    bank_phone: athlete?.bank_phone || ''
  });
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);

  useEffect(()=> {
    setForm({
      full_name: profile?.full_name || '',
      bank_full_name: athlete?.bank_full_name || '',
      bank_iban: athlete?.bank_iban || '',
      bank_name: athlete?.bank_name || '',
      bank_phone: athlete?.bank_phone || ''
    });
  }, [profile?.id, athlete?.id]);

  async function save(e) {
    e.preventDefault();
    setSaving(true); setMsg(null);
    const [p, a] = await Promise.all([
      supa.from('profiles').update({ full_name: form.full_name }).eq('id', profile.id),
      supa.from('athletes').update({
        bank_full_name: form.bank_full_name,
        bank_iban: form.bank_iban,
        bank_name: form.bank_name,
        bank_phone: form.bank_phone
      }).eq('id', athlete.id)
    ]);
    setSaving(false);
    if (p.error || a.error) setMsg({type:'err', text: (p.error||a.error).message});
    else { setMsg({type:'ok', text:'✓ Sačuvano!'}); await refreshProfile(profile.id); }
  }

  return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">👤 Profil</h1>
        <p className="text-sm text-white/60">Lični i bank podaci.</p>
      </div>

      <form onSubmit={save} className="space-y-5">
        <div className="glass-strong rounded-2xl p-5 sm:p-6 space-y-4">
          <div className="font-display font-bold text-base">Osnovni podaci</div>
          <Field label="Email"><input value={profile?.email||''} disabled className="w-full px-4 py-3 rounded-xl bg-bg1/50 border border-white/5 text-sm opacity-60"/></Field>
          <Field label="Tvoj affiliate kod"><input value={athlete?.promo_code||''} disabled className="w-full px-4 py-3 rounded-xl bg-bg1/50 border border-white/5 text-sm opacity-60 font-mono uppercase"/></Field>
          <Field label="Tvoj nivo"><input value={LEVEL_THEME[athlete?.level||'recruit'].name} disabled className="w-full px-4 py-3 rounded-xl bg-bg1/50 border border-white/5 text-sm opacity-60"/></Field>
          <Field label="Puno ime"><input value={form.full_name} onChange={e=>setForm({...form, full_name:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm"/></Field>
        </div>

        <div className="glass-strong rounded-2xl p-5 sm:p-6 space-y-4">
          <div className="font-display font-bold text-base">🏦 Bank info (za isplate)</div>
          <Field label="Ime na računu"><input value={form.bank_full_name} onChange={e=>setForm({...form, bank_full_name:e.target.value})} className="w-full px-4 py-3 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm"/></Field>
          <Field label="IBAN"><input value={form.bank_iban} onChange={e=>setForm({...form, bank_iban:e.target.value})} placeholder="RS35 ..." className="w-full px-4 py-3 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm font-mono"/></Field>
          <Field label="Banka"><input value={form.bank_name} onChange={e=>setForm({...form, bank_name:e.target.value})} placeholder="Raiffeisen / NLB / ..." className="w-full px-4 py-3 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm"/></Field>
          <Field label="Telefon"><input value={form.bank_phone} onChange={e=>setForm({...form, bank_phone:e.target.value})} placeholder="+381 ..." className="w-full px-4 py-3 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm"/></Field>
        </div>

        {msg && <div className={"text-xs px-3 py-2 rounded-lg " + (msg.type==='ok' ? 'bg-lime/10 border border-lime/30 text-lime' : 'bg-danger/10 border border-danger/30 text-danger')}>{msg.text}</div>}

        <button type="submit" disabled={saving}
          className="w-full sm:w-auto px-8 py-3.5 rounded-xl font-extrabold text-bg0 bg-gradient-to-r from-brand via-brand2 to-brand3 disabled:opacity-50">
          {saving ? 'Snimam...' : '💾 Sačuvaj'}
        </button>
      </form>
    </div>
  );
}

function Field({label, children}) {
  return (
    <div>
      <label className="block text-[10px] uppercase tracking-wider text-white/60 font-bold mb-1.5">{label}</label>
      {children}
    </div>
  );
}

// === ADMIN ===
function AdminPage() {
  const [tab, setTab] = useState('reels');
  return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">⚙️ Super Admin</h1>
        <p className="text-sm text-white/60">Mini admin za odobravanje. Pun admin panel dolazi u Fazi 3.</p>
      </div>

      <div className="flex gap-2 overflow-x-auto pb-1">
        {[
          {k:'reels', label:'🎬 Reels queue'},
          {k:'payouts', label:'💸 Payout queue'},
          {k:'athletes', label:'👥 Atlete'},
        ].map(t => (
          <button key={t.k} onClick={()=>setTab(t.k)}
            className={"px-4 py-2 rounded-xl text-sm font-bold whitespace-nowrap " + (tab===t.k ? 'bg-gold text-bg0' : 'glass text-white/70')}>
            {t.label}
          </button>
        ))}
      </div>

      {tab==='reels' && <AdminReelsQueue/>}
      {tab==='payouts' && <AdminPayoutQueue/>}
      {tab==='athletes' && <AdminAthletes/>}
    </div>
  );
}

function AdminReelsQueue() {
  const [reels, setReels] = useState([]);
  useEffect(()=>{ load(); }, []);
  async function load() {
    const { data } = await supa.from('reels').select('*, profiles!reels_athlete_id_fkey(email, full_name)').eq('status','pending').order('submitted_at');
    setReels(data||[]);
  }
  async function decide(id, status, reason=null) {
    await supa.from('reels').update({ status, reviewed_at: new Date().toISOString(), reject_reason: reason }).eq('id', id);
    if (status === 'approved') {
      // Dodaj earnings
      const reel = reels.find(r=>r.id===id);
      const { data: cfg } = await supa.from('level_configs').select('reel_reward_cents').eq('level_key', 'recruit').maybeSingle();
      const reward = cfg?.reel_reward_cents || 30;
      await supa.from('earnings_ledger').insert({
        athlete_id: reel.athlete_id, source: 'reel', amount_cents: reward, status: 'available',
        ref_table: 'reels', ref_id: id, description: 'Reel reward', available_at: new Date().toISOString()
      });
    }
    load();
  }

  if (reels.length===0) return <div className="glass rounded-2xl p-8 text-center text-white/60">Nema Reel-ova za review.</div>;
  return (
    <div className="space-y-3">
      {reels.map(r => (
        <div key={r.id} className="glass-strong rounded-2xl p-4">
          <div className="flex items-center justify-between gap-3 mb-3">
            <div className="text-sm">
              <div className="font-bold">{r.profiles?.full_name || r.profiles?.email || 'Atleta'}</div>
              <div className="text-[11px] text-white/40">{fromNow(r.submitted_at)}</div>
            </div>
          </div>
          <a href={r.url} target="_blank" rel="noopener" className="text-xs text-brand hover:underline break-all block mb-3">{r.url}</a>
          {r.caption && <div className="text-xs text-white/60 mb-3">{r.caption}</div>}
          <div className="flex gap-2">
            <button onClick={()=>decide(r.id,'approved')} className="flex-1 py-2 rounded-lg bg-lime/15 border border-lime/40 text-lime font-bold text-sm">✓ Approve</button>
            <button onClick={()=>{const reason=prompt('Razlog odbijanja:'); if(reason) decide(r.id,'rejected',reason);}} className="flex-1 py-2 rounded-lg bg-danger/15 border border-danger/40 text-danger font-bold text-sm">✗ Reject</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function AdminPayoutQueue() {
  const [items, setItems] = useState([]);
  useEffect(()=>{ load(); }, []);
  async function load() {
    const { data } = await supa.from('payout_requests').select('*, profiles!payout_requests_athlete_id_fkey(email, full_name)').eq('status','pending').order('requested_at');
    setItems(data||[]);
  }
  async function decide(id, status) {
    const upd = { status, approved_at: new Date().toISOString() };
    if (status==='paid') upd.paid_at = new Date().toISOString();
    await supa.from('payout_requests').update(upd).eq('id', id);
    if (status==='paid') {
      // Mark earnings as paid
      const item = items.find(i=>i.id===id);
      await supa.from('earnings_ledger').update({ status:'paid', payout_request_id: id, paid_at: new Date().toISOString() })
        .eq('athlete_id', item.athlete_id).eq('status','available').is('payout_request_id', null);
    }
    load();
  }

  if (items.length===0) return <div className="glass rounded-2xl p-8 text-center text-white/60">Nema payout zahteva.</div>;
  return (
    <div className="space-y-3">
      {items.map(p => (
        <div key={p.id} className="glass-strong rounded-2xl p-4">
          <div className="flex items-center justify-between gap-3 mb-3">
            <div>
              <div className="font-bold">{p.profiles?.full_name || p.profiles?.email}</div>
              <div className="text-2xl font-display font-black text-lime">{formatEUR(p.amount_cents)}</div>
            </div>
            <div className="text-[11px] text-white/40">{fromNow(p.requested_at)}</div>
          </div>
          <div className="text-xs text-white/70 space-y-1 mb-3 bg-bg0/40 rounded-lg p-3">
            <div><b>Ime:</b> {p.bank_info_snapshot?.full_name}</div>
            <div><b>IBAN:</b> <code className="text-brand">{p.bank_info_snapshot?.iban}</code></div>
            <div><b>Banka:</b> {p.bank_info_snapshot?.bank}</div>
            {p.bank_info_snapshot?.phone && <div><b>Tel:</b> {p.bank_info_snapshot.phone}</div>}
          </div>
          <div className="flex gap-2">
            <button onClick={()=>{ if(confirm('Označiti kao plaćeno? (prvo uradi bank transfer)')) decide(p.id,'paid'); }}
              className="flex-1 py-2 rounded-lg bg-lime/15 border border-lime/40 text-lime font-bold text-sm">✓ Mark paid</button>
            <button onClick={()=>decide(p.id,'rejected')} className="flex-1 py-2 rounded-lg bg-danger/15 border border-danger/40 text-danger font-bold text-sm">✗ Reject</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function AdminAthletes() {
  const [list, setList] = useState([]);
  useEffect(()=>{ load(); }, []);
  async function load() {
    const { data } = await supa.from('athletes').select('*, profiles!athletes_id_fkey(email, full_name)').order('created_at',{ascending:false}).limit(100);
    setList(data||[]);
  }
  return (
    <div className="glass rounded-2xl p-5 overflow-x-auto">
      <table className="w-full text-sm">
        <thead><tr className="text-left text-xs text-white/50 uppercase">
          <th className="py-2">Atleta</th><th>Kod</th><th>Nivo</th><th>XP</th><th>Pridruzio</th>
        </tr></thead>
        <tbody>
        {list.map(a => (
          <tr key={a.id} className="border-t border-white/5">
            <td className="py-3">
              <div className="font-bold">{a.profiles?.full_name || '—'}</div>
              <div className="text-[11px] text-white/40">{a.profiles?.email}</div>
            </td>
            <td><code className="text-brand text-xs">{a.promo_code}</code></td>
            <td><span className="text-xs font-bold" style={{color: LEVEL_THEME[a.level].color}}>{LEVEL_THEME[a.level].name}</span></td>
            <td className="text-xs">{a.current_xp || 0}</td>
            <td className="text-xs text-white/50">{formatDate(a.joined_at)}</td>
          </tr>
        ))}
        </tbody>
      </table>
    </div>
  );
}

// === APP ROOT ===
function App() {
  const hash = useHash();
  const { user, profile, athlete, loading, refreshProfile } = useAuth();
  const route = hash.replace('#','').split('?')[0] || '/';

  useEffect(() => {
    var el = document.getElementById('loading');
    if (el && !loading) el.style.display='none';
  }, [loading]);

  useEffect(() => {
    if (!loading && user && (route === '/' || route === '/login')) {
      window.location.hash = '#/dashboard';
    }
  }, [user, loading, route]);

  async function logout() {
    await supa.auth.signOut();
    window.location.hash = '#/';
  }

  if (loading) return null;

  // Public pages
  if (!user) {
    return (
      <div>
        <PublicNav user={null}/>
        {route === '/login' ? <LoginPage/> : <LandingPage/>}
      </div>
    );
  }

  // Authenticated pages
  const renderPage = () => {
    if (route === '/dashboard' || route === '/') return <Dashboard athlete={athlete} profile={profile}/>;
    if (route === '/reels') return <ReelsPage athlete={athlete}/>;
    if (route === '/kurs') return <KursPage athlete={athlete}/>;
    if (route === '/isplate') return <IsplatePage athlete={athlete} profile={profile} refreshProfile={refreshProfile}/>;
    if (route === '/profil') return <ProfilPage athlete={athlete} profile={profile} refreshProfile={refreshProfile}/>;
    if (route === '/admin' && profile?.role === 'super_admin') return <AdminPage/>;
    return <Dashboard athlete={athlete} profile={profile}/>;
  };

  return (
    <PortalShell profile={profile} athlete={athlete} route={route} onLogout={logout}>
      {renderPage()}
    </PortalShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
