// === ROUTING ===
function useHash() {
  const [hash, setHash] = useState(window.location.hash || '#/');
  useEffect(() => {
    const onChange = () => setHash(window.location.hash || '#/');
    window.addEventListener('hashchange', onChange);
    return () => window.removeEventListener('hashchange', onChange);
  }, []);
  return hash;
}

// === AUTH ===
function useAuth() {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [athlete, setAthlete] = useState(null);
  const [loading, setLoading] = useState(true);

  async function refreshProfile(uid) {
    if (!uid) { setProfile(null); setAthlete(null); return; }
    try {
      const [{ data: prof }, { data: ath }] = await Promise.all([
        supa.from('profiles').select('*').eq('id', uid).maybeSingle(),
        supa.from('athletes').select('*').eq('id', uid).maybeSingle()
      ]);
      setProfile(prof);
      setAthlete(ath);
    } catch(e) { console.error('profile load', e); }
  }

  useEffect(() => {
    supa.auth.getSession().then(async ({ data }) => {
      const u = data.session?.user || null;
      setUser(u);
      if (u) await refreshProfile(u.id);
      setLoading(false);
    });
    const { data: sub } = supa.auth.onAuthStateChange(async (_, session) => {
      const u = session?.user || null;
      setUser(u);
      if (u) await refreshProfile(u.id);
      else { setProfile(null); setAthlete(null); }
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  return { user, profile, athlete, loading, refreshProfile };
}

const formatDate = (d) => d ? new Date(d).toLocaleDateString('sr-Latn',{day:'2-digit', month:'short', year:'numeric'}) : '-';
const fromNow = (d) => {
  if(!d) return '';
  const diff = Math.floor((Date.now() - new Date(d).getTime())/1000);
  if (diff<60) return 'pre malo';
  if (diff<3600) return Math.floor(diff/60)+'m';
  if (diff<86400) return Math.floor(diff/3600)+'h';
  return Math.floor(diff/86400)+'d';
};

function NotificationBell({ athlete }) {
  const [open, setOpen] = useState(false);
  const [notifs, setNotifs] = useState([]);
  const [unread, setUnread] = useState(0);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    if (!athlete?.id) return;
    load();
    const ch = supa.channel('notif_' + athlete.id)
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'notifications', filter: 'athlete_id=eq.'+athlete.id }, (payload) => {
        const n = payload.new;
        // Postuj atleti notification prefs
        const prefs = athlete?.notification_prefs || {};
        if (prefs[n.type] === false) return; // atleta iskljucio ovaj tip
        setNotifs(prev => [n, ...prev].slice(0, 30));
        setUnread(u => u + 1);
        setToast(n);
        setTimeout(()=>setToast(null), 5000);
        // Browser notification ako je dozvoljeno
        try {
          if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
            new Notification(n.title, { body: n.body || '', icon: '/favicon.ico' });
          }
        } catch(e){}
      })
      .subscribe();
    return () => { try { ch.unsubscribe(); } catch(e){} };
  }, [athlete?.id]);

  async function load() {
    const { data } = await supa.from('notifications').select('*').eq('athlete_id', athlete.id).order('created_at',{ascending:false}).limit(30);
    setNotifs(data||[]);
    setUnread((data||[]).filter(n => !n.read_at).length);
  }

  async function markAllRead() {
    await supa.from('notifications').update({ read_at: new Date().toISOString() }).eq('athlete_id', athlete.id).is('read_at', null);
    setNotifs(prev => prev.map(n => ({ ...n, read_at: n.read_at || new Date().toISOString() })));
    setUnread(0);
  }
  async function markOne(id) {
    await supa.from('notifications').update({ read_at: new Date().toISOString() }).eq('id', id);
    setNotifs(prev => prev.map(n => n.id === id ? { ...n, read_at: new Date().toISOString() } : n));
    setUnread(u => Math.max(0, u-1));
  }
  async function requestPush() {
    try {
      if (typeof Notification === 'undefined') return;
      const p = await Notification.requestPermission();
      if (p === 'granted') alert('✓ Browser notifikacije uključene');
    } catch(e){}
  }

  if (!athlete?.id) return null;

  return (
    <>
      <button onClick={()=>setOpen(o=>!o)} className="relative p-2 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10">
        <span className="text-lg">🔔</span>
        {unread > 0 && (
          <span className="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full bg-danger text-bg0 text-[10px] font-black flex items-center justify-center">{unread > 99 ? '99+' : unread}</span>
        )}
      </button>

      {open && (
        <div className="fixed sm:absolute inset-0 sm:inset-auto sm:top-14 sm:right-4 sm:w-96 sm:max-h-[70vh] z-50 sm:rounded-2xl bg-bg0/95 sm:bg-bg0/98 backdrop-blur-xl border border-white/10 shadow-2xl overflow-hidden flex flex-col" onClick={e=>e.stopPropagation()}>
          <div className="flex items-center justify-between p-4 border-b border-white/10">
            <div className="font-display font-black text-base">🔔 Notifikacije</div>
            <div className="flex items-center gap-2">
              {unread > 0 && <button onClick={markAllRead} className="text-[10px] text-brand font-bold">Označi sve kao pročitano</button>}
              <button onClick={()=>setOpen(false)} className="text-2xl text-white/60 sm:text-base">✕</button>
            </div>
          </div>
          <div className="overflow-y-auto flex-1">
            {notifs.length === 0 ? (
              <div className="text-center py-12 text-sm text-white/50">Nema notifikacija. Sve je tiho. 🌙</div>
            ) : (
              <div>
                {notifs.map(n => (
                  <button key={n.id} onClick={()=>{markOne(n.id); if (n.action_url) window.location.hash = n.action_url;}}
                    className={"w-full text-left px-4 py-3 border-b border-white/5 hover:bg-white/5 flex items-start gap-3 " + (!n.read_at ? 'bg-brand/5' : '')}>
                    <div className="text-2xl shrink-0">{n.icon || (n.priority==='celebration'?'🎉':n.priority==='high'?'⚡':'🔔')}</div>
                    <div className="min-w-0 flex-1">
                      <div className="flex items-center gap-2">
                        <div className={"font-bold text-sm truncate " + (!n.read_at ? 'text-white' : 'text-white/70')}>{n.title}</div>
                        {!n.read_at && <div className="w-2 h-2 rounded-full bg-brand shrink-0"></div>}
                      </div>
                      {n.body && <div className="text-[11px] text-white/60 line-clamp-2 mt-0.5">{n.body}</div>}
                      <div className="text-[10px] text-white/40 mt-1">{fromNow(n.created_at)}</div>
                    </div>
                  </button>
                ))}
              </div>
            )}
          </div>
          <div className="p-3 border-t border-white/10 flex gap-2">
            <a href="#/notifikacije" onClick={()=>setOpen(false)} className="flex-1 text-center px-3 py-2 rounded-lg bg-brand/15 text-brand text-xs font-bold">Vidi sve</a>
            {typeof Notification !== 'undefined' && Notification.permission !== 'granted' && (
              <button onClick={requestPush} className="px-3 py-2 rounded-lg bg-white/5 text-xs">🔔 Allow Browser</button>
            )}
          </div>
        </div>
      )}

      {toast && <NotificationToast notif={toast} onClose={()=>setToast(null)}/>}
    </>
  );
}

function NotificationToast({ notif, onClose }) {
  const priorityStyle = {
    celebration: { border:'border-brand3/60', glow:'rgba(255,59,154,0.4)' },
    high:        { border:'border-gold/60',   glow:'rgba(255,194,75,0.4)' },
    normal:      { border:'border-brand/60',  glow:'rgba(0,240,255,0.4)' },

function Dashboard({ athlete, profile }) {
  const [stats, setStats] = useState({ reels_total:0, reels_month:0, reels_pending:0, sales_total:0, sales_month:0, earnings_pending:0, earnings_available:0, earnings_lifetime:0, streak:0 });
  const [activity, setActivity] = useState([]);
  const [levelCfg, setLevelCfg] = useState(null);
  const [newAchievement, setNewAchievement] = useState(null);
  const [tick, setTick] = useState(0); // za live day counter — re-render svaki minut
  const theme = LEVEL_THEME[athlete?.level || 'recruit'];

  // Live counter — ažurira display svaki minut
  useEffect(() => {
    const t = setInterval(() => setTick(x => x+1), 60_000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if (!athlete) return;
    loadAll();
    const ch = supa.channel('dash_' + athlete.id)
      .on('postgres_changes', { event:'*', schema:'public', table:'reels', filter: 'athlete_id=eq.'+athlete.id }, loadAll)
      .on('postgres_changes', { event:'*', schema:'public', table:'sales', filter: 'athlete_id=eq.'+athlete.id }, loadAll)
      .on('postgres_changes', { event:'*', schema:'public', table:'earnings_ledger', filter: 'athlete_id=eq.'+athlete.id }, loadAll)
      .subscribe();
    return () => { try { ch.unsubscribe(); } catch(e){} };
  }, [athlete?.id]);

  async function loadAll() {
    const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);
    const [r1, r2, r3, sa, sm, ep, ea, el, lc, reelsDates] = await Promise.all([
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','approved'),
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','approved').gte('submitted_at', monthStart.toISOString()),
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','pending'),
      supa.from('sales').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','confirmed'),
      supa.from('sales').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','confirmed').gte('created_at', monthStart.toISOString()),
      supa.from('earnings_ledger').select('amount_cents').eq('athlete_id', athlete.id).eq('status','pending'),
      supa.from('earnings_ledger').select('amount_cents').eq('athlete_id', athlete.id).eq('status','available').is('payout_request_id', null),
      supa.from('earnings_ledger').select('amount_cents').eq('athlete_id', athlete.id).in('status', ['available','paid','pending']),
      supa.from('level_configs').select('*').eq('level_key', athlete.level).maybeSingle(),
      supa.from('reels').select('submitted_at').eq('athlete_id', athlete.id).eq('status','approved').order('submitted_at',{ascending:false}).limit(120)
    ]);

    // === STREAK CALC ===
    const dates = new Set((reelsDates.data||[]).map(r => (r.submitted_at||'').slice(0,10)));
    let streak = 0;
    const today = new Date();
    for (let i=0; i<365; i++) {
      const d = new Date(today); d.setDate(today.getDate() - i);
      const ds = d.toISOString().slice(0,10);
      if (dates.has(ds)) streak++;
      else if (i > 0) break; // dozvoli da danas još nije submit-ovan
      else continue;
    }

    const reelsTotal = r1.count||0;
    const salesTotal = sa.count||0;
    setStats({
      reels_total: reelsTotal,
      reels_month: r2.count||0,
      reels_pending: r3.count||0,
      sales_total: salesTotal,
      sales_month: sm.count||0,
      earnings_pending: (ep.data||[]).reduce((s,x)=>s+x.amount_cents,0),
      earnings_available: (ea.data||[]).reduce((s,x)=>s+x.amount_cents,0),
      earnings_lifetime: (el.data||[]).reduce((s,x)=>s+x.amount_cents,0),
      streak
    });
    setLevelCfg(lc.data);

    // recent activity
    const { data: acts } = await supa.from('earnings_ledger').select('*').eq('athlete_id', athlete.id).order('created_at',{ascending:false}).limit(8);
    setActivity(acts||[]);

    // === ACHIEVEMENT ENGINE ===
    runAchievementEngine(athlete.id, { reels_total: reelsTotal, sales_total: salesTotal, streak }).then(unlocked => {
      if (unlocked && unlocked.length) setNewAchievement(unlocked[0]);
    });
  }

  // ADMIN — pokazi platform overview umesto "atleta nije pronadjena"
  if (!athlete && profile?.role === 'super_admin') return <AdminOverview profile={profile}/>;
  if (!athlete) return <div className="glass rounded-2xl p-8 text-center text-white/60">Atleta nije pronađena. Kontaktiraj admina.</div>;

  const reqs = levelCfg?.requirements_json || {};

  // Broj odobrenih reels-ova OD KAD je atleta na trenutnom nivou

  const daysPct = Math.min(100, Math.round((daysSinceLevelStart / target.days) * 100));

  return (
    <div className="space-y-6">

      </div>

      {/* LEVEL CARD */}

           style={{borderColor: theme.color+'40'}}>
        <div className="flex items-start justify-between mb-5">
          <div>
            <div className="text-xs uppercase tracking-[0.2em] font-bold mb-2" style={{color:theme.color}}>Tvoj nivo</div>
            <div className="font-display text-3xl sm:text-4xl font-black" style={{color:theme.color}}>{theme.emoji} {theme.name} ATHLETE</div>
            <div className="text-sm text-white/60 mt-2">
              Provizija: <b style={{color:theme.color}}>{Math.round((levelCfg?.sales_commission_pct||0.35)*100)}%</b>
              {' · '}€<b style={{color:theme.color}}>{((levelCfg?.reel_reward_cents||30)/100).toFixed(2)}</b> po reel-u
            </div>
          </div>
          <div className="text-right">
            <div className="text-[10px] uppercase tracking-wider text-white/50">XP</div>
            <div className="font-black text-xl" style={{color:theme.color}}>{athlete.current_xp || 0}</div>
          </div>
        </div>

        {/* === LEVEL PROGRESS CARD (jasan, glavni) === */}
        <div className="space-y-4 mt-4">
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div className="text-xs uppercase tracking-wider text-white/60 font-bold">
              {target.next ? `Tvoj cilj — napreduj na ${LEVEL_THEME[target.next].name}` : 'Top tier — održavaj ritam'}
            </div>
            <div className="text-[10px] text-white/40">
              Pravilo: <b style={{color:theme.color}}>{target.reels} reels-ova za {target.days} dana</b> ({target.per_day}/dan)
            </div>
          </div>

          <div className="grid sm:grid-cols-2 gap-3">
            {/* Reels progress */}
            <div className="p-4 rounded-2xl bg-bg0/40 border border-white/10">
              <div className="flex items-baseline justify-between mb-2">
                <div className="font-display font-black text-2xl">
                  <span style={{color:theme.color}}>{reelsInPeriod}</span>
                  <span className="text-white/30 text-base"> / {reelsTarget}</span>
                </div>
                <div className="text-[10px] uppercase tracking-wider text-white/50 font-bold">🎬 Reels</div>

// === ACHIEVEMENT ENGINE ===
async function runAchievementEngine(athleteId, snapshot) {
  // snapshot: { reels_total, sales_total, streak }
  const [{ data: allAch }, { data: unlocked }] = await Promise.all([
    supa.from('achievements').select('*').eq('active', true),
    supa.from('athlete_achievements').select('achievement_id').eq('athlete_id', athleteId)
  ]);
  const unlockedSet = new Set((unlocked||[]).map(x => x.achievement_id));
  const newlyUnlocked = [];
  for (const ach of (allAch||[])) {
    if (unlockedSet.has(ach.id)) continue;
    if (matchesRequirement(ach.requirement_json, snapshot)) {
      const { error } = await supa.from('athlete_achievements').insert({ athlete_id: athleteId, achievement_id: ach.id, unlocked_at: new Date().toISOString() });
      if (!error) {
        newlyUnlocked.push(ach);
        // XP nagrada
        if (ach.xp_reward) {
          await supa.from('xp_ledger').insert({ athlete_id: athleteId, amount: ach.xp_reward, source: 'achievement', description: 'Dostignuće: ' + ach.name });
        }
        // Notifikacija atletu
        await sendTemplated(athleteId, 'achievement', { name: ach.name, xp: ach.xp_reward||0 }, '#/dostignuca');
      }
    }
  }
  return newlyUnlocked;
}

function matchesRequirement(req, snap) {
  if (!req) return false;
  try {
    if (req.kind === 'count') {
      if (req.entity === 'reels') return (snap.reels_total||0) >= (req.min||0);
      if (req.entity === 'sales') return (snap.sales_total||0) >= (req.min||0);
    }
    if (req.kind === 'streak') {
      return (snap.streak||0) >= (req.min||0);
    }
  } catch(e) { return false; }
  return false;
}

// === ROBUSTAN YOUTUBE PARSER ===
function getYouTubeId(url) {
  if (!url) return null;
  try {
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtube\.com\/embed\/|youtube\.com\/shorts\/|youtu\.be\/|youtube\.com\/v\/)([a-zA-Z0-9_-]{11})/,
      /^([a-zA-Z0-9_-]{11})$/
    ];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) return m[1];
    }
    return null;
  } catch(e) { return null; }
}
function youtubeEmbedUrl(url) {
  const id = getYouTubeId(url);
  if (!id) return url;
  return 'https://www.youtube.com/embed/' + id + '?rel=0&modestbranding=1';
}
function youtubeThumbnail(url) {
  const id = getYouTubeId(url);
  if (!id) return null;
  return 'https://i.ytimg.com/vi/' + id + '/hqdefault.jpg';
}

function KursPage({ athlete }) {
  const [modules, setModules] = useState([]);
  const [openLesson, setOpenLesson] = useState(null);
  const [expanded, setExpanded] = useState({});
  const [progress, setProgress] = useState({});
  const [loadErr, setLoadErr] = useState(null);

  useEffect(()=> { loadModules(); }, [athlete?.id]);
  async function loadModules() {
    setLoadErr(null);
    try {
      const [modsResp, lessonsResp, progResp] = await Promise.all([
        supa.from('course_modules').select('*').order('order_idx'),
        supa.from('course_lessons').select('*').order('order_idx'),
        athlete?.id ? supa.from('lesson_progress').select('lesson_id, completed_at').eq('athlete_id', athlete.id) : Promise.resolve({data:[]})
      ]);
      if (modsResp.error) throw new Error('course_modules: ' + modsResp.error.message);
      if (lessonsResp.error) throw new Error('course_lessons: ' + lessonsResp.error.message);
      const lessons = (lessonsResp.data||[]).filter(l => l.status !== 'archived');
      const map = (modsResp.data||[]).filter(m => m.status !== 'archived').map(m => ({...m, lessons: lessons.filter(l=>l.module_id===m.id)}));
      setModules(map);
      const progMap = {};
      (progResp.data||[]).forEach(p => { if (p.completed_at) progMap[p.lesson_id] = true; });
      setProgress(progMap);
      if (map.length > 0 && Object.keys(expanded).length === 0) {
        setExpanded({ [map[0].id]: true });
      }
    } catch(e) {
      console.error('KursPage load fail:', e);
      setLoadErr(e.message);
    }
  }

  async function markComplete(lessonId) {
    if (!athlete?.id) return;
    await supa.from('lesson_progress').upsert({
      athlete_id: athlete.id, lesson_id: lessonId, completed_at: new Date().toISOString()
    }, { onConflict: 'athlete_id,lesson_id' });
    setProgress(p => ({ ...p, [lessonId]: true }));
  }

  const levelOrder = { recruit:0, pro:1, commando:2, elite:3 };
  const myLevel = levelOrder[athlete?.level || 'recruit'];

  const totalLessons = modules.reduce((s,m)=>s+m.lessons.length, 0);
  const doneLessons = Object.keys(progress).length;
  const overallPct = totalLessons > 0 ? Math.round((doneLessons/totalLessons)*100) : 0;

  return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">📚 Athlete Kurs</h1>
        <p className="text-sm text-white/60">{modules.length} modula · {totalLessons} lekcija · {doneLessons} završeno ({overallPct}%)</p>
      </div>

      {/* OVERALL PROGRESS */}
      {totalLessons > 0 && (
        <div className="glass-strong rounded-2xl p-4">
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs uppercase tracking-wider text-white/60 font-bold">Tvoj napredak</div>
            <div className="text-sm font-black text-brand">{overallPct}%</div>
          </div>
          <div className="h-3 rounded-full bg-white/5 overflow-hidden">
            <div className="h-full bg-gradient-to-r from-brand via-brand2 to-brand3 transition-all" style={{width: overallPct + '%'}}/>
          </div>
        </div>
      )}

      {modules.length === 0 ? (
        loadErr
          ? <div className="glass rounded-2xl p-6 text-sm bg-danger/10 border border-danger/30 text-danger">❌ Ne mogu da učitam kurs: {loadErr}<br/><span className="text-white/60 text-xs">Najverovatnije nije pokrenut RLS SQL — javi adminu.</span></div>
          : <div className="glass rounded-2xl p-8 text-center text-white/60">Kurs još uvek nema sadržaja — admin uskoro dodaje.</div>
      ) : (
        <div className="space-y-3">
          {modules.map((m, idx) => {
            const locked = levelOrder[m.level_required] > myLevel;
            const isExpanded = !!expanded[m.id];
            const modDone = m.lessons.filter(l => progress[l.id]).length;
            const modTotal = m.lessons.length;
            const modPct = modTotal > 0 ? Math.round((modDone/modTotal)*100) : 0;
            return (
              <div key={m.id} className={"glass-strong rounded-2xl overflow-hidden border " + (locked ? 'opacity-60 border-white/5' : 'border-white/10')}>
                <button
                  onClick={()=>!locked && setExpanded({...expanded, [m.id]: !isExpanded})}
                  disabled={locked}
                  className="w-full p-4 sm:p-5 flex items-center gap-3 text-left hover:bg-white/5 disabled:cursor-not-allowed">
                  <div className="text-2xl shrink-0 font-black text-white/30 font-display w-8 text-center">{m.order_idx ?? idx+1}</div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <div className="font-display font-black text-base sm:text-lg">{m.name}</div>
                      {locked && <div className="text-[9px] px-2 py-0.5 rounded bg-gold/15 text-gold font-bold">🔒 {(m.level_required||'recruit').toUpperCase()}+</div>}
                      {modTotal > 0 && !locked && <div className="text-[10px] text-white/50">{modDone}/{modTotal} lekcija</div>}
                    </div>
                    {m.description && <div className="text-xs text-white/60 mt-1 line-clamp-2">{m.description}</div>}
                    {modTotal > 0 && !locked && (
                      <div className="mt-2 h-1.5 rounded-full bg-white/5 overflow-hidden">
                        <div className="h-full bg-brand transition-all" style={{width: modPct + '%'}}/>
                      </div>
                    )}
                  </div>
                  {!locked && <div className="text-2xl text-white/40 shrink-0">{isExpanded ? '▼' : '▶'}</div>}
                </button>

                {isExpanded && !locked && (
                  <div className="border-t border-white/5 bg-bg0/30 p-3 sm:p-4 space-y-2">
                    {m.lessons.length === 0 ? (

                      m.lessons.filter(l => l.status === 'published' || !l.status).map((l, li) => {

                        return (

                                  <div className="text-2xl">{done ? '✓' : '▶'}</div>
                                </div>

                            </div>
                          </button>
                        );
                      })
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {openLesson && (
        <div className="fixed inset-0 z-50 bg-bg0/98 backdrop-blur-xl flex flex-col" onClick={()=>setOpenLesson(null)}>

function IsplatePage({ athlete, profile, refreshProfile }) {
  const [available, setAvailable] = useState(0);
  const [history, setHistory] = useState([]);
  const [msg, setMsg] = useState(null);
  const [pending, setPending] = useState(null);

  useEffect(()=>{ if (athlete) load(); }, [athlete?.id]);
  async function load() {
    const [{ data: ea }, { data: pr }, { data: pp }] = await Promise.all([
      supa.from('earnings_ledger').select('amount_cents').eq('athlete_id', athlete.id).eq('status','available').is('payout_request_id', null),
      supa.from('payout_requests').select('*').eq('athlete_id', athlete.id).order('requested_at',{ascending:false}).limit(20),
      supa.from('payout_requests').select('*').eq('athlete_id', athlete.id).eq('status','pending').maybeSingle()
    ]);
    setAvailable((ea||[]).reduce((s,x)=>s+x.amount_cents,0));
    setHistory(pr||[]);
    setPending(pp);
  }

  const minPayoutCents = MIN_PAYOUT_CENTS[athlete?.level] || 1000;
  const isRecruit = athlete?.level === 'recruit';

  async function requestPayout() {
    if (!athlete.bank_full_name || !athlete.bank_iban) {
      setMsg({type:'err', text:'Prvo unesi bank info u Profilu.'});
      return;
    }
    if (available < minPayoutCents) {
      const minLabel = isRecruit ? 'bilo koji iznos' : '€'+(minPayoutCents/100).toFixed(2);
      setMsg({type:'err', text:'Minimum za isplatu je ' + minLabel + '.'});
      return;
    }
    if (pending) {
      setMsg({type:'err', text:'Već imaš pending zahtev.'});
      return;
    }
    const { error } = await supa.from('payout_requests').insert({
      athlete_id: athlete.id, amount_cents: available,
      bank_info_snapshot: {
        full_name: athlete.bank_full_name, iban: athlete.bank_iban,
        bank: athlete.bank_name, phone: athlete.bank_phone
      }
    });
    if (error) setMsg({type:'err', text: error.message});
    else { setMsg({type:'ok', text:'Zahtev poslat! Admin obraduje uskoro.'}); load(); }
  }

  const sColor = { pending:'#ffc24b', approved:'#3b82f6', paid:'#a6ff3b', rejected:'#ff4d5e' };

  return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">💸 Isplate</h1>
        <p className="text-sm text-white/60">Pregled, zahtevi i istorija.</p>
      </div>

      <div className="glass-strong rounded-3xl p-6 sm:p-8 text-center" style={{boxShadow:'0 30px 60px -20px rgba(166,255,59,0.3)'}}>
        <div className="text-xs uppercase tracking-[0.2em] text-white/60 mb-2 font-bold">Dostupno za isplatu</div>
        <div className="font-display text-5xl sm:text-6xl font-black text-lime mb-4">{formatEUR(available)}</div>
        {pending ? (
          <div className="text-sm text-gold">⏳ Već imaš pending zahtev za {formatEUR(pending.amount_cents)}. Admin obrađuje.</div>
        ) : (
          <button onClick={requestPayout} disabled={available<minPayoutCents}
            className="px-8 py-3.5 rounded-2xl font-extrabold text-bg0 bg-gradient-to-r from-lime to-brand disabled:opacity-50">
            {isRecruit ? '📤 Zatraži isplatu sada (bilo koji iznos)' : `📤 Zatraži isplatu (min €${(minPayoutCents/100).toFixed(0)})`}
          </button>
        )}
        {msg && (
          <div className={"mt-4 text-xs " + (msg.type==='ok' ? 'text-lime' : 'text-danger')}>{msg.text}</div>
        )}
        <div className="mt-3 text-xs text-white/50">Minimum: €10 · Stiže za 24-48h posle approve-a</div>
      </div>

      <div className="glass rounded-2xl p-5 sm:p-6">
        <div className="font-display font-bold text-lg mb-4">Istorija zahteva ({history.length})</div>
        {history.length === 0 ? (
          <div className="text-sm text-white/50 py-6 text-center">Još nemaš zahteva.</div>
        ) : (
          <div className="space-y-2">
            {history.map(p => (
              <div key={p.id} className="flex items-center justify-between p-3 rounded-lg bg-white/5">
                <div>
                  <div className="font-bold">{formatEUR(p.amount_cents)}</div>
                  <div className="text-[11px] text-white/40">{formatDate(p.requested_at)}</div>
                </div>
                <div className="text-[10px] font-black px-2 py-1 rounded uppercase" style={{background:sColor[p.status]+'20', color:sColor[p.status]}}>
                  {p.status}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

  const [copied, setCopied] = useState(false);

    setForm({
      full_name: profile?.full_name || '',

    });

function NotificationPreferences({ athlete, refreshProfile }) {
  const [prefs, setPrefs] = useState(athlete?.notification_prefs || {});
  const [browserGranted, setBrowserGranted] = useState(typeof Notification !== 'undefined' && Notification.permission === 'granted');
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);

  useEffect(()=>{ setPrefs(athlete?.notification_prefs || {}); }, [athlete?.id]);

  async function toggle(key) {
    const next = { ...prefs, [key]: !(prefs[key] !== false) };
    setPrefs(next);
    setSaving(true);
    await supa.from('athletes').update({ notification_prefs: next }).eq('id', athlete.id);
    setSaving(false);
    setMsg({type:'ok', text:'✓ Sačuvano'});
    setTimeout(()=>setMsg(null), 1500);
    if (refreshProfile) refreshProfile(athlete.id);
  }

  async function requestBrowserPush() {
    if (typeof Notification === 'undefined') { alert('Browser ne podržava push notifikacije.'); return; }
    try {
      const result = await Notification.requestPermission();
      setBrowserGranted(result === 'granted');
      if (result === 'granted') {
        // Try to subscribe to service worker push
        if ('serviceWorker' in navigator) {
          try {
            const reg = await navigator.serviceWorker.ready;
            const sub = await reg.pushManager.getSubscription();
            if (sub) {
              await supa.from('push_subscriptions').upsert({
                athlete_id: athlete.id,
                endpoint: sub.endpoint,
                p256dh: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('p256dh')))),
                auth: btoa(String.fromCharCode(...new Uint8Array(sub.getKey('auth')))),
                user_agent: navigator.userAgent
              }, { onConflict: 'endpoint' });
            }
          } catch(e){ console.log('Push subscribe failed:', e); }
        }
        alert('✓ Notifikacije UKLJUČENE — dobićeš obaveštenja čak i kada nisi u portalu.');
      }
    } catch(e) { console.error(e); }
  }

  async function disableBrowserPush() {
    setBrowserGranted(false);
    alert('Browser obaveštenja ćeš isključiti u podešavanjima samog browsera. Pratimo tvoju odluku.');
  }

  return (
    <div className="glass-strong rounded-2xl p-5 sm:p-6 space-y-4">
      <div>
        <div className="font-display font-bold text-base">🔔 Notifikacije</div>
        <p className="text-xs text-white/60 mt-1">Biraš šta hoćeš da pratiš. Sve menjamo po želji.</p>
      </div>

      {/* Browser push toggle */}
      <div className={"p-3 rounded-xl border " + (browserGranted ? 'bg-lime/5 border-lime/30' : 'bg-gold/5 border-gold/30')}>
        <div className="flex items-center justify-between gap-3">
          <div className="min-w-0">
            <div className="font-bold text-sm flex items-center gap-2">
              {browserGranted ? '✓ Push obaveštenja' : '🔔 Uključi push'}
            </div>
            <div className="text-[11px] text-white/60 mt-0.5">
              {browserGranted ? 'Dobijaš notifikacije i kada portal nije otvoren.' : 'Klikni da dozvoliš obaveštenja na telefonu/računaru.'}
            </div>
          </div>
          {browserGranted ? (
            <button onClick={disableBrowserPush} className="px-3 py-1.5 rounded-lg bg-white/5 text-xs font-bold shrink-0">Isključi</button>
          ) : (
            <button onClick={requestBrowserPush} className="px-4 py-2 rounded-lg bg-brand text-bg0 text-xs font-bold shrink-0">Uključi</button>
          )}
        </div>
      </div>

      {/* Per-type toggles */}
      <div className="space-y-2">
        <div className="text-[10px] uppercase tracking-wider text-white/50 font-bold mb-2">Tipovi obaveštenja</div>
        {NOTIF_TYPES.map(t => {
          const on = prefs[t.key] !== false;
          return (
            <button key={t.key} onClick={()=>toggle(t.key)} disabled={saving}
              className="w-full flex items-center justify-between gap-3 p-3 rounded-xl bg-white/5 hover:bg-white/10 text-left">
              <div className="flex items-center gap-3 min-w-0">
                <div className="text-xl">{t.emoji}</div>
                <div className="font-bold text-sm">{t.label}</div>
              </div>
              <div className={"relative w-11 h-6 rounded-full transition shrink-0 " + (on ? 'bg-brand' : 'bg-white/15')}>
                <div className={"absolute top-0.5 w-5 h-5 rounded-full bg-white transition " + (on ? 'left-[22px]' : 'left-0.5')}/>
              </div>
            </button>
          );
        })}
      </div>

      {msg && <div className="text-[11px] text-lime">{msg.text}</div>}
    </div>
  );
}

function PWAInstallCard() {
  const [installPrompt, setInstallPrompt] = useState(null);
  const [isInstalled, setIsInstalled] = useState(false);

  useEffect(() => {
    function handler(e) { e.preventDefault(); setInstallPrompt(e); }
    window.addEventListener('beforeinstallprompt', handler);
    if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) setIsInstalled(true);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  async function install() {
    if (!installPrompt) return;
    installPrompt.prompt();
    await installPrompt.userChoice;
    setInstallPrompt(null);
  }

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  if (isInstalled) return (
    <div className="glass-strong rounded-2xl p-5 border border-lime/30">
      <div className="font-bold text-sm text-lime">✓ App instaliran</div>
      <div className="text-xs text-white/60 mt-1">Imaš VAMIT-5 ikonicu na telefonu.</div>
    </div>
  );

  return (
    <div className="glass-strong rounded-2xl p-5">
      <div className="font-display font-bold text-base mb-2">📱 Instaliraj App na telefon</div>
      <div className="text-xs text-white/60 mb-3">VAMIT-5 ikonica na home screen. Otvara se kao prava aplikacija.</div>
      {installPrompt ? (
        <button onClick={install} className="w-full py-3 rounded-xl bg-gradient-to-r from-brand via-brand2 to-brand3 text-bg0 font-bold text-sm">
          🚀 Instaliraj sada
        </button>
      ) : isIOS ? (
        <div className="text-xs text-white/70 space-y-1.5 p-3 rounded-lg bg-white/5">
          <div><b>📱 iPhone uputstvo:</b></div>
          <div>1. Klikni <b>Share</b> dugme dole (⬆)</div>
          <div>2. Skroluj i nadji <b>"Add to Home Screen"</b></div>
          <div>3. Klikni <b>Add</b></div>
        </div>
      ) : (
        <div className="text-xs text-white/70 space-y-1.5 p-3 rounded-lg bg-white/5">
          <div><b>📱 Android uputstvo:</b></div>
          <div>1. Klikni <b>⋮</b> u Chrome (gore desno)</div>
          <div>2. Nadji <b>"Install app"</b> ili <b>"Add to Home screen"</b></div>
        </div>
      )}
    </div>
  );
}

      <label className="block text-[10px] uppercase tracking-wider text-white/60 font-bold mb-1.5">{label}</label>

  useEffect(()=>{
    load();
    const ch = supa.channel('admin_overview')
      .on('postgres_changes', { event:'*', schema:'public', table:'reels' }, load)
      .on('postgres_changes', { event:'*', schema:'public', table:'sales' }, load)
      .on('postgres_changes', { event:'*', schema:'public', table:'payout_requests' }, load)

    return () => { try { ch.unsubscribe(); } catch(e){} };

  async function load() {
    const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);

      supa.from('athletes').select('id',{count:'exact', head:true}),

      supa.from('sales').select('id',{count:'exact', head:true}).eq('status','confirmed'),
      supa.from('sales').select('id',{count:'exact', head:true}).eq('status','confirmed').gte('created_at', monthStart.toISOString()),
      supa.from('earnings_ledger').select('amount_cents').eq('status','paid'),

      supa.from('earnings_ledger').select('amount_cents').eq('status','available').is('payout_request_id', null),
      supa.from('payout_requests').select('id',{count:'exact', head:true}).eq('status','pending'),

function AdminReelsQueue() {
  const [reels, setReels] = useState([]);
  useEffect(()=>{ load(); }, []);
  async function load() {
    const { data } = await supa.from('reels').select('*').eq('status','pending').order('submitted_at');
    setReels(await enrichWithAthletes(data||[]));
  }
  async function decide(id, status, reason=null) {
    const reel = reels.find(r=>r.id===id);
    await supa.from('reels').update({ status, reviewed_at: new Date().toISOString(), reject_reason: reason }).eq('id', id);
    if (status === 'approved') {
      // Dodaj earnings koristeci athlete-ov nivo
      const { data: athleteRow } = await supa.from('athletes').select('level').eq('id', reel.athlete_id).maybeSingle();
      const levelKey = athleteRow?.level || 'recruit';
      const { data: cfg } = await supa.from('level_configs').select('reel_reward_cents').eq('level_key', levelKey).maybeSingle();
      const reward = cfg?.reel_reward_cents || 30;
      await supa.from('earnings_ledger').insert({
        athlete_id: reel.athlete_id, source: 'reel', amount_cents: reward, status: 'available',
        ref_table: 'reels', ref_id: id, description: 'Reel reward', available_at: new Date().toISOString()
      });
      // Notify atletu (koristi template iz baze)
      await sendTemplated(reel.athlete_id, 'reel_approved', { amount: (reward/100).toFixed(2) }, '#/isplate');
    } else if (status === 'rejected') {
      await sendTemplated(reel.athlete_id, 'reel_rejected', { reason: reason || 'Tvoj reel ne ispunjava uslove.' }, '#/reels');
    }
    load();
  }

  if (reels.length===0) return <div className="glass rounded-2xl p-8 text-center text-white/60">Nema Reel-ova za review.</div>;
  return (
    <div className="space-y-3">
      {reels.map(r => (
        <div key={r.id} className="glass-strong rounded-2xl p-4">
          <div className="flex items-center justify-between gap-3 mb-3">
            <div className="text-sm">
              <div className="font-bold">{r.profiles?.full_name || r.profiles?.email || 'Atleta'}</div>
              <div className="text-[11px] text-white/40">{fromNow(r.submitted_at)}</div>
            </div>
          </div>
          <a href={r.url} target="_blank" rel="noopener" className="text-xs text-brand hover:underline break-all block mb-3">{r.url}</a>
          {r.caption && <div className="text-xs text-white/60 mb-3">{r.caption}</div>}
          <div className="flex gap-2">
            <button onClick={()=>decide(r.id,'approved')} className="flex-1 py-2 rounded-lg bg-lime/15 border border-lime/40 text-lime font-bold text-sm">✓ Approve</button>
            <button onClick={()=>{const reason=prompt('Razlog odbijanja:'); if(reason) decide(r.id,'rejected',reason);}} className="flex-1 py-2 rounded-lg bg-danger/15 border border-danger/40 text-danger font-bold text-sm">✗ Reject</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function AdminPayoutQueue() {
  const [items, setItems] = useState([]);
  useEffect(()=>{ load(); }, []);
  async function load() {
    const { data } = await supa.from('payout_requests').select('*').eq('status','pending').order('requested_at');
    setItems(await enrichWithAthletes(data||[]));
  }
  async function decide(id, status) {
    const item = items.find(i=>i.id===id);
    const upd = { status, approved_at: new Date().toISOString() };
    if (status==='paid') upd.paid_at = new Date().toISOString();
    await supa.from('payout_requests').update(upd).eq('id', id);
    if (status==='paid' && item) {
      // Mark earnings as paid
      await supa.from('earnings_ledger').update({ status:'paid', payout_request_id: id, paid_at: new Date().toISOString() })
        .eq('athlete_id', item.athlete_id).eq('status','available').is('payout_request_id', null);
      // Notify atletu (template iz baze)
      await sendTemplated(item.athlete_id, 'payout_paid', { amount: ((item.amount_cents||0)/100).toFixed(2) }, '#/isplate');
    } else if (status==='rejected' && item) {
      await sendTemplated(item.athlete_id, 'payout_rejected', {}, '#/isplate');
    }
    load();
  }

  if (items.length===0) return <div className="glass rounded-2xl p-8 text-center text-white/60">Nema payout zahteva.</div>;
  return (
    <div className="space-y-3">
      {items.map(p => (
        <div key={p.id} className="glass-strong rounded-2xl p-4">
          <div className="flex items-center justify-between gap-3 mb-3">
            <div>
              <div className="font-bold">{p.profiles?.full_name || p.profiles?.email}</div>
              <div className="text-2xl font-display font-black text-lime">{formatEUR(p.amount_cents)}</div>
            </div>
            <div className="text-[11px] text-white/40">{fromNow(p.requested_at)}</div>
          </div>
          <div className="text-xs text-white/70 space-y-1 mb-3 bg-bg0/40 rounded-lg p-3">
            <div><b>Ime:</b> {p.bank_info_snapshot?.full_name}</div>
            <div><b>IBAN:</b> <code className="text-brand">{p.bank_info_snapshot?.iban}</code></div>
            <div><b>Banka:</b> {p.bank_info_snapshot?.bank}</div>
            {p.bank_info_snapshot?.phone && <div><b>Tel:</b> {p.bank_info_snapshot.phone}</div>}
          </div>
          <div className="flex gap-2">
            <button onClick={()=>{ if(confirm('Označiti kao plaćeno? (prvo uradi bank transfer)')) decide(p.id,'paid'); }}
              className="flex-1 py-2 rounded-lg bg-lime/15 border border-lime/40 text-lime font-bold text-sm">✓ Mark paid</button>
            <button onClick={()=>decide(p.id,'rejected')} className="flex-1 py-2 rounded-lg bg-danger/15 border border-danger/40 text-danger font-bold text-sm">✗ Reject</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function AthleteDetailsModal({ athlete, onClose, onUpdate }) {
  const [tab, setTab] = useState('overview');
  const [stats, setStats] = useState({ reels:0, reels_pending:0, sales:0, earned_total:0, earned_paid:0, earned_pending:0, earned_available:0 });
  const [reelsList, setReelsList] = useState([]);
  const [salesList, setSalesList] = useState([]);
  const [earnList, setEarnList] = useState([]);
  const [editMode, setEditMode] = useState(false);
  const [form, setForm] = useState({ ...athlete });
  const [saving, setSaving] = useState(false);

  useEffect(()=> { load(); }, [athlete.id]);
  async function load() {
    const [r1, r2, s1, e1, allReels, allSales, allEarn] = await Promise.all([
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','approved'),
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','pending'),
      supa.from('sales').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','confirmed'),
      supa.from('earnings_ledger').select('amount_cents, status, payout_request_id').eq('athlete_id', athlete.id),
      supa.from('reels').select('*').eq('athlete_id', athlete.id).order('submitted_at',{ascending:false}).limit(100),
      supa.from('sales').select('*').eq('athlete_id', athlete.id).order('created_at',{ascending:false}).limit(100),
      supa.from('earnings_ledger').select('*').eq('athlete_id', athlete.id).order('created_at',{ascending:false}).limit(100)
    ]);
    const earn = e1.data || [];
    setStats({
      reels: r1.count||0,
      reels_pending: r2.count||0,
      sales: s1.count||0,
      earned_total: earn.reduce((s,x)=>s+x.amount_cents,0),
      earned_paid: earn.filter(x=>x.status==='paid').reduce((s,x)=>s+x.amount_cents,0),
      earned_pending: earn.filter(x=>x.status==='pending').reduce((s,x)=>s+x.amount_cents,0),
      earned_available: earn.filter(x=>x.status==='available' && !x.payout_request_id).reduce((s,x)=>s+x.amount_cents,0)
    });
    setReelsList(allReels.data||[]);
    setSalesList(allSales.data||[]);
    setEarnList(allEarn.data||[]);
  }

  async function reviewReel(id, status, reason=null) {
    const reel = reelsList.find(r=>r.id===id);
    await supa.from('reels').update({ status, reviewed_at: new Date().toISOString(), reject_reason: reason }).eq('id', id);
    if (status === 'approved' && reel) {
      const { data: cfg } = await supa.from('level_configs').select('reel_reward_cents').eq('level_key', athlete.level).maybeSingle();
      const reward = cfg?.reel_reward_cents || 30;
      await supa.from('earnings_ledger').insert({
        athlete_id: reel.athlete_id, source: 'reel', amount_cents: reward, status: 'available',
        ref_table: 'reels', ref_id: id, description: 'Reel reward', available_at: new Date().toISOString()
      });
      await sendTemplated(reel.athlete_id, 'reel_approved', { amount: (reward/100).toFixed(2) }, '#/isplate');
    } else if (status === 'rejected' && reel) {
      await sendTemplated(reel.athlete_id, 'reel_rejected', { reason: reason || 'Tvoj reel ne ispunjava uslove.' }, '#/reels');
    }
    load();
  }

  async function saveChanges() {
    setSaving(true);
    const updates = {
      level: form.level,
      rewardful_token: form.rewardful_token || null,
      bank_full_name: form.bank_full_name || null,
      bank_iban: form.bank_iban || null,
      bank_name: form.bank_name || null,
      bank_phone: form.bank_phone || null,
      status: form.status
    };
    const { error } = await supa.from('athletes').update(updates).eq('id', athlete.id);
    if (form.full_name !== athlete.profiles?.full_name) {
      await supa.from('profiles').update({ full_name: form.full_name }).eq('id', athlete.id);
    }
    setSaving(false);
    if (error) alert('Greška: ' + error.message);
    else { alert('✓ Sačuvano'); setEditMode(false); onUpdate(); }
  }

  const theme = LEVEL_THEME[athlete.level];

  return (
    <div className="fixed inset-0 z-50 bg-bg0/90 backdrop-blur-xl flex items-start sm:items-center justify-center p-3 sm:p-6 overflow-y-auto" onClick={onClose}>
      <div className="glass-strong rounded-2xl max-w-3xl w-full p-5 sm:p-7 my-auto" onClick={e=>e.stopPropagation()}>
        <div className="flex items-start justify-between mb-4">
          <div>
            <div className="text-xs text-white/50 uppercase tracking-wider">Atleta detalji</div>
            <h2 className="font-display font-black text-xl sm:text-2xl">{athlete.profiles?.full_name || athlete.profiles?.email}</h2>
            <div className="text-xs text-white/60">{athlete.profiles?.email}</div>

// === DOSTIGNUCA (Achievements) ===
function AchievementsPage({ athlete }) {
  const [achievements, setAchievements] = useState([]);
  const [unlocked, setUnlocked] = useState({});
  const [snap, setSnap] = useState({ reels_total:0, sales_total:0, streak:0 });
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all');

  useEffect(() => {
    if (athlete) load();
    else setLoading(false);
  }, [athlete?.id]);

  async function load() {
    setLoading(true);
    const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);
    const [allAch, mine, reels, sales, dates] = await Promise.all([
      supa.from('achievements').select('*').eq('active', true).order('xp_reward',{ascending:true}),
      supa.from('athlete_achievements').select('achievement_id, unlocked_at').eq('athlete_id', athlete.id),
      supa.from('reels').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','approved'),
      supa.from('sales').select('id',{count:'exact', head:true}).eq('athlete_id', athlete.id).eq('status','confirmed'),
      supa.from('reels').select('submitted_at').eq('athlete_id', athlete.id).eq('status','approved').limit(120)
    ]);
    const dSet = new Set((dates.data||[]).map(r => (r.submitted_at||'').slice(0,10)));
    let streak = 0; const today = new Date();
    for (let i=0; i<365; i++) {
      const d = new Date(today); d.setDate(today.getDate() - i);
      const ds = d.toISOString().slice(0,10);
      if (dSet.has(ds)) streak++;
      else if (i > 0) break;
    }
    setAchievements(allAch.data||[]);
    const map = {};
    (mine.data||[]).forEach(x => { map[x.achievement_id] = x.unlocked_at; });
    setUnlocked(map);
    setSnap({ reels_total: reels.count||0, sales_total: sales.count||0, streak });
    setLoading(false);
  }

  const unlockedCount = Object.keys(unlocked).length;
  const totalXP = achievements.filter(a => unlocked[a.id]).reduce((s,a)=>s+(a.xp_reward||0), 0);

  const filtered = achievements.filter(a => {
    if (filter === 'unlocked') return unlocked[a.id];
    if (filter === 'locked') return !unlocked[a.id];
    return true;
  });

  // ADMIN — nema svojih dostignuća, pokazi info
  if (!athlete) return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">🏆 Dostignuća</h1>
        <p className="text-sm text-white/60">Admin — koristi <a href="#/admin" className="text-brand underline">Admin → Dostignuća</a> da editujes badge-ove.</p>
      </div>
      <div className="glass rounded-2xl p-8 text-center text-white/60">Admin nema svoja dostignuća. 👑</div>
    </div>
  );

  return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">🏆 Dostignuća</h1>
        <p className="text-sm text-white/60">Otključavaj badge-ove kroz akciju. Svako dostignuće = XP nagrada.</p>
      </div>

      {/* SUMMARY */}
      <div className="grid grid-cols-3 gap-3">
        <div className="glass-strong rounded-2xl p-4 text-center">
          <div className="text-[10px] uppercase tracking-wider text-white/50">Otključano</div>
          <div className="font-display font-black text-2xl text-gold">{unlockedCount}/{achievements.length}</div>
        </div>
        <div className="glass-strong rounded-2xl p-4 text-center">
          <div className="text-[10px] uppercase tracking-wider text-white/50">XP iz dostignuća</div>
          <div className="font-display font-black text-2xl text-brand">{totalXP}</div>
        </div>
        <div className="glass-strong rounded-2xl p-4 text-center">
          <div className="text-[10px] uppercase tracking-wider text-white/50">Streak</div>
          <div className="font-display font-black text-2xl text-brand3">🔥 {snap.streak}d</div>
        </div>
      </div>

      {/* FILTER */}
      <div className="flex gap-2 overflow-x-auto pb-1">
        {[
          {k:'all', l:'Sva'}, {k:'unlocked', l:'Otključana'}, {k:'locked', l:'Zaključana'}
        ].map(f => (
          <button key={f.k} onClick={()=>setFilter(f.k)}
            className={"px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap " + (filter===f.k ? 'bg-brand text-bg0' : 'bg-white/5 text-white/70 hover:bg-white/10')}>
            {f.l}
          </button>
        ))}
      </div>

      {/* GRID */}
      {loading ? (
        <div className="text-center py-10 text-white/50">Ucitavam...</div>
      ) : filtered.length === 0 ? (
        <div className="glass rounded-2xl p-10 text-center text-white/60">Nema dostignuća u ovoj kategoriji.</div>
      ) : (
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 sm:gap-4">
          {filtered.map(a => {
            const isUnlocked = !!unlocked[a.id];
            const progress = getProgress(a.requirement_json, snap);
            return (
              <div key={a.id} className={"glass rounded-2xl p-4 text-center " + (isUnlocked ? 'border border-gold/40' : 'opacity-60')}>
                <div className={"text-5xl mb-2 " + (isUnlocked ? '' : 'grayscale')}>{a.icon_emoji || a.icon || '🏆'}</div>
                <div className={"font-display font-black text-sm mb-1 " + (isUnlocked ? 'text-gold' : 'text-white/70')}>{a.name}</div>
                <div className="text-[11px] text-white/50 mb-2 line-clamp-2">{a.description}</div>
                {a.xp_reward && <div className="text-xs font-bold text-brand mb-2">+{a.xp_reward} XP</div>}
                {!isUnlocked && progress && (
                  <div className="space-y-1">
                    <div className="h-1.5 rounded-full bg-white/5 overflow-hidden">
                      <div className="h-full bg-brand transition-all" style={{width: progress.pct + '%'}}/>
                    </div>
                    <div className="text-[10px] text-white/50">{progress.current}/{progress.target}</div>
                  </div>
                )}
                {isUnlocked && <div className="text-[10px] text-lime font-bold">✓ {fromNow(unlocked[a.id])}</div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function getProgress(req, snap) {
  if (!req || req.kind !== 'count' && req.kind !== 'streak') return null;
  let current = 0;
  if (req.kind === 'count') {
    if (req.entity === 'reels') current = snap.reels_total||0;
    if (req.entity === 'sales') current = snap.sales_total||0;
  }
  if (req.kind === 'streak') current = snap.streak||0;
  const target = req.min || 1;
  return { current, target, pct: Math.min(100, Math.round((current/target)*100)) };
}

// === RANG LISTA (Leaderboard) ===
function LeaderboardPage({ athlete }) {
  const [period, setPeriod] = useState('month'); // month | all
  const [metric, setMetric] = useState('reels'); // reels | sales | xp
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => { load(); }, [period, metric]);

  async function load() {
    setLoading(true);
    const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);

    // PRVO uzmemo SVE aktivne atlete (sa 0 ili više stats)
    const { data: rawAthletes } = await supa.from('athletes')
      .select('id, level, status, name')
      .eq('status','active').limit(200);
    const ids = (rawAthletes||[]).map(a => a.id);
    const { data: profs } = ids.length
      ? await supa.from('profiles').select('id, full_name, email').in('id', ids)
      : { data: [] };
    const pMap = Object.fromEntries((profs||[]).map(p => [p.id, p]));
    const allAthletes = (rawAthletes||[]).map(a => ({ ...a, profiles: pMap[a.id] || { full_name: a.name, email: '' } }));

    // SAD uzmemo stats za izabranu metriku
    const map = {};
    if (metric === 'reels') {
      let q = supa.from('reels').select('athlete_id').eq('status','approved');
      if (period === 'month') q = q.gte('submitted_at', monthStart.toISOString());
      const { data } = await q;
      (data||[]).forEach(r => { map[r.athlete_id] = (map[r.athlete_id]||0)+1; });
    } else if (metric === 'sales') {
      let q = supa.from('sales').select('athlete_id').eq('status','confirmed');
      if (period === 'month') q = q.gte('created_at', monthStart.toISOString());
      const { data } = await q;
      (data||[]).forEach(r => { map[r.athlete_id] = (map[r.athlete_id]||0)+1; });
    } else {
      let q = supa.from('xp_ledger').select('athlete_id, amount');
      if (period === 'month') q = q.gte('created_at', monthStart.toISOString());
      const { data } = await q;
      (data||[]).forEach(r => { map[r.athlete_id] = (map[r.athlete_id]||0)+(r.amount||0); });
    }

    // Spoji SVE atlete sa stats (i one sa 0)
    let result = (allAthletes||[]).map(a => ({
      id: a.id,
      val: map[a.id] || 0,
      athlete: a
    }));
    result.sort((a,b) => b.val - a.val);
    result = result.slice(0, 50);

    setRows(result);
    setLoading(false);
  }

  const myRank = rows.findIndex(r => r.id === athlete?.id) + 1;
  const metricLabel = { reels:'Reels', sales:'Prodaje', xp:'XP' }[metric];

  return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">📊 Rang Lista</h1>
        <p className="text-sm text-white/60">Top 50 atleta. Bori se za #1.</p>
      </div>

      {/* MY RANK CARD */}
      {athlete && (
        <div className="glass-strong rounded-2xl p-4 sm:p-5 flex items-center justify-between border border-brand/30">
          <div>
            <div className="text-[10px] uppercase tracking-wider text-white/50">Tvoja pozicija</div>
            <div className="font-display font-black text-2xl text-brand">{myRank > 0 ? '#'+myRank : 'Nerangiran'}</div>
          </div>
          <div className="text-right">
            <div className="text-[10px] uppercase tracking-wider text-white/50">{metricLabel}</div>
            <div className="font-display font-black text-xl">{rows.find(r=>r.id===athlete.id)?.val || 0}</div>
          </div>
        </div>
      )}

      {/* FILTERS */}
      <div className="flex gap-2 flex-wrap">
        <div className="flex gap-1 glass rounded-xl p-1">
          {['month','all'].map(p => (
            <button key={p} onClick={()=>setPeriod(p)} className={"px-3 py-1.5 rounded-lg text-xs font-bold " + (period===p ? 'bg-brand text-bg0' : 'text-white/70')}>{p==='month'?'Ovaj mesec':'Sve vreme'}</button>
          ))}
        </div>
        <div className="flex gap-1 glass rounded-xl p-1">
          {[['reels','🎬 Reels'],['sales','💎 Prodaje'],['xp','⚡ XP']].map(([k,l]) => (
            <button key={k} onClick={()=>setMetric(k)} className={"px-3 py-1.5 rounded-lg text-xs font-bold " + (metric===k ? 'bg-brand text-bg0' : 'text-white/70')}>{l}</button>
          ))}
        </div>
      </div>

      {/* LEADERBOARD */}
      {loading ? (
        <div className="text-center py-10 text-white/50">Ucitavam...</div>
      ) : rows.length === 0 ? (
        <div className="glass rounded-2xl p-10 text-center text-white/60">Nema podataka za ovaj period.</div>
      ) : (
        <div className="glass rounded-2xl overflow-hidden">
          {rows.map((r, i) => {
            const isMe = r.id === athlete?.id;
            const lvl = r.athlete?.level || 'recruit';
            const lvlTheme = LEVEL_THEME[lvl];
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : null;
            return (
              <div key={r.id} className={"flex items-center justify-between gap-3 px-4 py-3 border-b border-white/5 " + (isMe ? 'bg-brand/10' : '')}>
                <div className="flex items-center gap-3 min-w-0">
                  <div className={"w-9 text-center font-black " + (i<3 ? 'text-2xl' : 'text-sm text-white/40')}>
                    {medal || '#'+(i+1)}
                  </div>
                  <div className="min-w-0">
                    <div className="font-bold text-sm truncate">{r.athlete?.profiles?.full_name || r.athlete?.profiles?.email?.split('@')[0] || '—'} {isMe && <span className="text-brand">(ti)</span>}</div>
                    <div className="text-[10px] font-bold uppercase tracking-wider" style={{color: lvlTheme.color}}>{lvlTheme.emoji} {lvlTheme.name}</div>
                  </div>
                </div>
                <div className="font-display font-black text-base shrink-0">{r.val}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function AdminLinks() {
  const [settings, setSettings] = useState({});
  const [loading, setLoading] = useState(true);
  const [savedKey, setSavedKey] = useState(null);

  useEffect(()=>{ load(); }, []);

  async function load() {
    setLoading(true);
    const keys = URL_SETTINGS.map(s => s.key);
    const { data } = await supa.from('settings').select('key, value').in('key', keys);
    const map = {};
    (data||[]).forEach(r => { map[r.key] = typeof r.value === 'string' ? r.value : (r.value?.v ?? JSON.stringify(r.value)); });
    setSettings(map);
    setLoading(false);
  }

  async function saveSetting(key, value) {
    const { error } = await supa.from('settings').upsert({ key, value: value, updated_at: new Date().toISOString() }, { onConflict: 'key' });
    if (!error) {
      setSavedKey(key);
      setTimeout(()=>setSavedKey(null), 1500);
    } else {
      alert('Greška: ' + error.message);
    }
  }

  if (loading) return <div className="text-white/50 text-center py-10">Učitavam...</div>;

  return (
    <div className="space-y-4">
      <div className="glass rounded-2xl p-4 text-xs text-white/70 border border-brand/20">

      {URL_SETTINGS.map(s => (
        <SettingRow
          key={s.key}
          setting={s}
          value={settings[s.key]||''}
          saved={savedKey===s.key}
          onChange={v=>setSettings({...settings, [s.key]:v})}
          onSave={()=>saveSetting(s.key, settings[s.key]||'')}
        />
      ))}
    </div>
  );
}

  }

    const { error } = await supa.from('settings').upsert({ key, value, updated_at: new Date().toISOString() }, { onConflict: 'key' });
    if (!error) {
      setSavedKey(key);
      setTimeout(()=>setSavedKey(null), 1500);
    } else alert('Greška: ' + error.message);
  }

  if (loading) return <div className="text-white/50 text-center py-10">Učitavam...</div>;

  return (
    <div className="space-y-4">
      <div className="glass rounded-2xl p-4 text-xs text-white/70 border border-gold/20">
        ⚠️ Globalna podešavanja platforme. Promene su odmah aktivne. Budi pažljiv.
      </div>
      {GENERAL_SETTINGS.map(s => (
        <SettingRow
          key={s.key}
          setting={s}
          value={settings[s.key]||''}
          saved={savedKey===s.key}
          onChange={v=>setSettings({...settings, [s.key]:v})}
          onSave={()=>saveSetting(s.key, settings[s.key]||'')}
        />
      ))}
    </div>
  );
}

  return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'item';
}

function NotificationsPage({ athlete }) {
  const [list, setList] = useState([]);
  const [filter, setFilter] = useState('all');
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    if (athlete?.id) load();
    else setLoading(false); // admin nema athlete row — skidamo loading
  }, [athlete?.id]);

  async function load() {
    setLoading(true);
    const { data } = await supa.from('notifications').select('*').eq('athlete_id', athlete.id).order('created_at',{ascending:false}).limit(200);
    setList(data||[]);
    setLoading(false);
  }

  // Admin nema notifikacije
  if (!athlete?.id) return (
    <div className="space-y-6">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">🔔 Notifikacije</h1>
        <p className="text-sm text-white/60">Admin nalog — koristi <a href="#/admin" className="text-brand underline">Admin panel</a> za slanje broadcast notifikacija i edit template-a.</p>
      </div>
      <div className="glass rounded-2xl p-8 text-center text-white/60">Admin nema lične notifikacije. 👑</div>
    </div>
  );
  async function markAllRead() {
    await supa.from('notifications').update({ read_at: new Date().toISOString() }).eq('athlete_id', athlete.id).is('read_at', null);
    load();
  }
  async function markOne(id) {
    await supa.from('notifications').update({ read_at: new Date().toISOString() }).eq('id', id);
    load();
  }
  async function del(id) {
    if (!confirm('Obrisati ovu notifikaciju?')) return;
    await supa.from('notifications').delete().eq('id', id);
    load();
  }

  const filtered = list.filter(n => {
    if (filter === 'unread') return !n.read_at;
    if (filter === 'urgent') return n.priority === 'celebration' || n.priority === 'high';
    return true;
  });
  const unreadCount = list.filter(n => !n.read_at).length;

  return (
    <div className="space-y-6">
      <div className="flex items-start justify-between gap-3">
        <div>
          <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">🔔 Notifikacije</h1>
          <p className="text-sm text-white/60">{unreadCount} nepročitanih · {list.length} ukupno</p>

      </div>

      <div className="flex gap-2 overflow-x-auto pb-1">
        {[['all','Sve'],['unread','Nepročitane'],['urgent','Hitne']].map(([k,l]) => (
          <button key={k} onClick={()=>setFilter(k)}

            {l}
          </button>
        ))}
      </div>

      {loading ? (
        <div className="text-center py-10 text-white/50">Učitavam...</div>
      ) : filtered.length === 0 ? (
        <div className="glass rounded-2xl p-10 text-center text-white/60">
          {filter==='unread'?'Sve pročitano. 👌':filter==='urgent'?'Nema hitnih.':'Nema notifikacija. 🌙'}
        </div>
      ) : (
        <div className="space-y-2">
          {filtered.map(n => (
            <div key={n.id} className={"glass rounded-2xl p-4 flex items-start gap-3 " + (!n.read_at ? 'border border-brand/30 bg-brand/5' : '')}>
              <div className="text-3xl shrink-0">{n.icon || (n.priority==='celebration'?'🎉':n.priority==='high'?'⚡':'🔔')}</div>
              <div className="min-w-0 flex-1">
                <div className="flex items-center gap-2 flex-wrap">
                  <div className={"font-bold text-sm " + (!n.read_at ? 'text-white' : 'text-white/70')}>{n.title}</div>
                  {n.priority === 'celebration' && <span className="text-[9px] px-1.5 py-0.5 rounded bg-brand3/20 text-brand3 font-black uppercase">Slavlje</span>}
                  {n.priority === 'high' && <span className="text-[9px] px-1.5 py-0.5 rounded bg-gold/20 text-gold font-black uppercase">High</span>}
                </div>

function AdminNotifications() {
  const [audience, setAudience] = useState('all'); // all | level | specific
  const [level, setLevel] = useState('recruit');
  const [athleteIds, setAthleteIds] = useState([]);
  const [athleteSearch, setAthleteSearch] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [title, setTitle] = useState('');
  const [body, setBody] = useState('');
  const [icon, setIcon] = useState('🔔');
  const [priority, setPriority] = useState('normal');
  const [actionUrl, setActionUrl] = useState('');
  const [sending, setSending] = useState(false);
  const [lastResult, setLastResult] = useState(null);
  const [recentCampaigns, setRecentCampaigns] = useState([]);

  useEffect(()=>{ loadCampaigns(); }, []);

  async function loadCampaigns() {
    const { data } = await supa.from('notification_campaigns').select('*').order('created_at',{ascending:false}).limit(10);
    setRecentCampaigns(data||[]);
  }

  async function searchAthletes() {
    if (!athleteSearch || athleteSearch.length < 2) { setSearchResults([]); return; }
    const { data: rawAth } = await supa.from('athletes').select('id, level, name').limit(50);
    const ids = (rawAth||[]).map(a => a.id);
    const { data: profs } = ids.length ? await supa.from('profiles').select('id, full_name, email').in('id', ids) : { data: [] };
    const pMap = Object.fromEntries((profs||[]).map(p => [p.id, p]));
    const data = (rawAth||[]).map(a => ({ ...a, profiles: pMap[a.id] || { full_name: a.name, email: '' } }));
    const q = athleteSearch.toLowerCase();
    setSearchResults((data||[]).filter(a => {
      const name = (a.profiles?.full_name||'').toLowerCase();
      const email = (a.profiles?.email||'').toLowerCase();
      return name.includes(q) || email.includes(q);
    }));
  }
  useEffect(()=>{ const t = setTimeout(searchAthletes, 300); return () => clearTimeout(t); }, [athleteSearch]);

  async function send() {
    if (!title.trim()) { alert('Naslov obavezan'); return; }
    setSending(true);

    // Resolve target athletes
    let targetIds = [];
    if (audience === 'all') {
      const { data } = await supa.from('athletes').select('id').eq('status','active');
      targetIds = (data||[]).map(a => a.id);
    } else if (audience === 'level') {
      const { data } = await supa.from('athletes').select('id').eq('status','active').eq('level', level);
      targetIds = (data||[]).map(a => a.id);
    } else {
      targetIds = athleteIds;
    }

    if (targetIds.length === 0) { setSending(false); alert('Nema ciljanih atleta.'); return; }
    if (!confirm(`Poslati notifikaciju za ${targetIds.length} atleta?`)) { setSending(false); return; }

    // Insert notifications batch
    const rows = targetIds.map(id => ({
      athlete_id: id,
      type: 'admin_broadcast',
      title, body, icon, priority,
      action_url: actionUrl || null,
    }));

    // Batch insert u kockama od 500 (Supabase limit)
    let total = 0;
    for (let i = 0; i < rows.length; i += 500) {
      const chunk = rows.slice(i, i+500);
      const { error } = await supa.from('notifications').insert(chunk);
      if (error) { alert('Greška: ' + error.message); break; }
      total += chunk.length;
    }

    // Sačuvaj kao campaign
    await supa.from('notification_campaigns').insert({
      name: title,
      audience_query: audience === 'all' ? { kind:'all' } : audience === 'level' ? { kind:'level', level } : { kind:'specific', ids: targetIds },
      custom_title: title, custom_body: body,
      sent_at: new Date().toISOString(), sent_count: total,
    });

    setSending(false);
    setLastResult({ count: total });
    setTitle(''); setBody(''); setActionUrl('');
    loadCampaigns();
  }

  return (
    <div className="space-y-5">
      <div className="glass rounded-2xl p-4 text-xs text-white/70 border border-brand/20">
        🔔 Pošalji notifikaciju atletama. Stiže im real-time u portal + browser notification (ako su dozvolili).
      </div>

      {/* COMPOSE */}
      <div className="glass-strong rounded-2xl p-5 space-y-4">
        <div className="font-display font-bold text-base">📝 Nova notifikacija</div>

        <div>
          <label className="block text-[10px] uppercase tracking-wider text-white/60 font-bold mb-2">Kome?</label>
          <div className="flex gap-2 flex-wrap">
            {[['all','Svi atleti'],['level','Po nivou'],['specific','Određene atlete']].map(([k,l]) => (
              <button key={k} onClick={()=>setAudience(k)}
                className={"px-4 py-2 rounded-xl text-xs font-bold " + (audience===k ? 'bg-brand text-bg0' : 'bg-white/5 text-white/70')}>{l}</button>
            ))}
          </div>
          {audience === 'level' && (
            <div className="mt-3">
              <EditField label="Nivo" type="select" options={['recruit','pro','commando','elite']} value={level} onChange={setLevel}/>
            </div>
          )}
          {audience === 'specific' && (
            <div className="mt-3 space-y-2">
              <input value={athleteSearch} onChange={e=>setAthleteSearch(e.target.value)} placeholder="Pretraga (ime/email)..."
                className="w-full px-3 py-2.5 rounded-xl bg-bg1 border border-white/10 focus:border-brand outline-none text-sm"/>
              {searchResults.length > 0 && (
                <div className="space-y-1 max-h-40 overflow-y-auto">
                  {searchResults.map(a => (
                    <button key={a.id} onClick={()=>{ if (!athleteIds.includes(a.id)) setAthleteIds([...athleteIds, a.id]); setAthleteSearch(''); setSearchResults([]); }}
                      className="w-full text-left px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 text-xs">
                      <b>{a.profiles?.full_name || a.profiles?.email}</b> · <span className="text-white/50">{a.level}</span>
                    </button>
                  ))}
                </div>
              )}
              {athleteIds.length > 0 && (
                <div className="text-xs text-white/70">
                  <b>Izabrano:</b> {athleteIds.length} atleta
                  <button onClick={()=>setAthleteIds([])} className="ml-2 text-brand">[očisti]</button>
                </div>
              )}
            </div>
          )}
        </div>

        <EditField label="Naslov *" value={title} onChange={setTitle}/>
        <EditField label="Tekst (opciono)" value={body} onChange={setBody}/>
        <EditField label="Icon (emoji)" value={icon} onChange={setIcon}/>
        <EditField label="Prioritet" type="select" options={['low','normal','high','celebration']} value={priority} onChange={setPriority}/>
        <EditField label="Action URL (opciono, npr. #/kurs)" value={actionUrl} onChange={setActionUrl}/>

        {lastResult && (
          <div className="text-xs px-3 py-2 rounded-lg bg-lime/10 border border-lime/30 text-lime">
            ✓ Poslato {lastResult.count} notifikacija
          </div>
        )}

        <button onClick={send} disabled={sending || !title.trim()}
          className="w-full py-3 rounded-xl font-extrabold text-bg0 bg-gradient-to-r from-brand via-brand2 to-brand3 disabled:opacity-50">
          {sending ? 'Šaljem...' : '🚀 Pošalji notifikaciju'}
        </button>
      </div>

      {/* HISTORY */}
      <div className="glass rounded-2xl p-5">
        <div className="font-display font-bold text-base mb-3">📜 Skorije kampanje</div>
        {recentCampaigns.length === 0 ? (
          <div className="text-center py-6 text-sm text-white/50">Nema poslatih kampanja.</div>
        ) : (
          <div className="space-y-2">
            {recentCampaigns.map(c => (
              <div key={c.id} className="flex items-center justify-between px-3 py-2 rounded-lg bg-white/5">
                <div className="min-w-0">
                  <div className="font-bold text-sm truncate">{c.name}</div>
                  <div className="text-[10px] text-white/40">{fromNow(c.created_at)} · {c.audience_query?.kind || '—'}</div>
                </div>
                <div className="text-xs text-lime font-bold shrink-0">{c.sent_count || 0} 📤</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// === sendTemplated: posalji notifikaciju iz template-a u bazi ===
// =====================================================
// Fallback poruke kad template fali u bazi
const NOTIF_FALLBACK = {
  reel_approved:  { title: '✅ Reel odobren!',       body: 'Tvoj reel je odobren. +€{amount} dodato na zaradu.', icon:'🎬', priority:'high' },
  reel_rejected:  { title: '❌ Reel odbijen',          body: '{reason}',                                       icon:'🎬', priority:'normal' },
  payout_paid:    { title: '💰 Isplata izvršena!',     body: 'Tvoja isplata od €{amount} je poslata.',         icon:'💸', priority:'high' },
  payout_rejected:{ title: '❌ Isplata odbijena',      body: 'Tvoj payout zahtev je odbijen.',                 icon:'⚠️', priority:'high' },
  welcome:        { title: '👋 Dobrodošao u VAMIT-5!', body: 'Tvoj nalog je spreman. Postavi prvi Reel.',      icon:'🚀', priority:'high' },
  level_up:       { title: '🎉 Promovisan si u {level}!', body: 'Tvoj nivo je porastao.',                      icon:'👑', priority:'celebration' },
  achievement:    { title: '🏆 Novo dostignuće!',      body: 'Otključao si "{name}" (+{xp} XP)',               icon:'🏆', priority:'normal' },
  sale:           { title: '💎 Nova prodaja!',         body: '+€{amount} od nove prodaje preko tvog linka.',    icon:'💎', priority:'high' },
};

async function sendTemplated(athleteId, key, vars = {}, actionUrl = null) {
  try {
    const interpolate = (s) => {
      if (!s) return '';
      return s.replace(/\{(\w+)\}/g, (m, k) => (vars[k] !== undefined ? String(vars[k]) : m));
    };

    let tpl = null;
    try {
      const r = await supa.from('notification_templates').select('*').eq('key', key).maybeSingle();
      tpl = r.data;
    } catch(e){}

    // Ako template fali ILI je deaktiviran — koristi fallback (uvek šaljemo notifikaciju)
    if (!tpl || tpl.active === false) {
      const fb = NOTIF_FALLBACK[key] || { title: 'Notifikacija', body: '', icon: '🔔', priority: 'normal' };
      tpl = { title_tpl: fb.title, body_tpl: fb.body, icon: fb.icon, default_priority: fb.priority };
    }

    const { error } = await supa.from('notifications').insert({
      athlete_id: athleteId,
      type: key,
      title: interpolate(tpl.title_tpl),
      body: interpolate(tpl.body_tpl),
      icon: tpl.icon || '🔔',
      priority: tpl.default_priority || 'normal',
      action_url: actionUrl,
    });
    if (error) console.error('Notif insert greška:', error);
  } catch(e) { console.error('sendTemplated err:', e); }
}

// Helper: enrich any list of rows that have athlete_id sa profile + athlete podacima
// Resava bag: profiles!reels_athlete_id_fkey ne radi jer FK ide na athletes, ne profiles
async function enrichWithAthletes(rows) {
  if (!rows || rows.length === 0) return [];
  const ids = Array.from(new Set(rows.map(r => r.athlete_id).filter(Boolean)));
  if (ids.length === 0) return rows;
  const [{ data: athletes }, { data: profiles }] = await Promise.all([
    supa.from('athletes').select('id, level, status, promo_code, name, email, bank_full_name, bank_iban, bank_name, bank_phone, rewardful_token').in('id', ids),
    supa.from('profiles').select('id, full_name, email').in('id', ids)
  ]);
  const aMap = Object.fromEntries((athletes||[]).map(a => [a.id, a]));
  const pMap = Object.fromEntries((profiles||[]).map(p => [p.id, p]));
  return rows.map(r => ({
    ...r,
    athlete: aMap[r.athlete_id] || null,
    profile: pMap[r.athlete_id] || null,
    profiles: pMap[r.athlete_id] || null,    // back-compat
    athletes: aMap[r.athlete_id] || null     // back-compat
  }));
}
