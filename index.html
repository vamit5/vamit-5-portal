function AdminTeams() {
  const [teams, setTeams] = useState([]);
  const [allAthletes, setAllAthletes] = useState([]);
  const [loading, setLoading] = useState(true);
  const [expanded, setExpanded] = useState({});

  useEffect(()=>{ load(); }, []);
  async function load() {
    setLoading(true);
    // Sve atlete sa profile + ko ih je doveo
    const { data: ath } = await supa.from('athletes').select('id, level, status, name, referred_by, promo_code, joined_at').limit(500);
    const ids = (ath||[]).map(a => a.id);
    const { data: profs } = ids.length ? await supa.from('profiles').select('id, full_name, email, avatar_url').in('id', ids) : { data: [] };
    const pMap = Object.fromEntries((profs||[]).map(p => [p.id, p]));

    const enriched = (ath||[]).map(a => ({ ...a, profile: pMap[a.id] }));
    setAllAthletes(enriched);

    // Group by recruiter
    const recruiters = enriched.filter(a => enriched.some(m => m.referred_by === a.id));
    // Earnings per recruiter (source='team')
    const { data: teamEarn } = await supa.from('earnings_ledger').select('athlete_id, amount_cents').eq('source','team');
    const earnMap = {};
    (teamEarn||[]).forEach(e => { earnMap[e.athlete_id] = (earnMap[e.athlete_id]||0) + e.amount_cents; });

    const teamRows = recruiters.map(r => ({
      recruiter: r,
      members: enriched.filter(m => m.referred_by === r.id),
      earned: earnMap[r.id] || 0
    })).sort((a,b) => b.members.length - a.members.length);

    setTeams(teamRows);
    setLoading(false);
  }

  async function assignReferrer(athleteId, referrerId) {
    const refId = referrerId === '__NONE__' ? null : referrerId;
    const { error } = await supa.from('athletes').update({ referred_by: refId }).eq('id', athleteId);
    if (error) alert('Greska: ' + error.message);
    else load();
  }

  if (loading) return <div className="text-center py-10 text-white/50">Učitavam...</div>;

  return (
    <div className="space-y-4">
      <div className="glass rounded-2xl p-4 text-xs text-white/70 border border-brand/20">
        🌐 Svi timovi u sistemu. Tim se gradi kad atleta klikne <code className="text-brand">/?ref=PROMO_KOD</code> link drugog atlete.
        Ti možeš ručno da dodelis atletu nekom timu ispod.
      </div>

      <div className="glass rounded-2xl p-4">
        <div className="font-bold text-sm mb-3">📊 Pregled timova ({teams.length})</div>
        {teams.length === 0 ? (
          <div className="text-center py-6 text-xs text-white/50">Još nema timova. Atlete dele svoj invite link da bi pravili tim.</div>
        ) : (
          <div className="space-y-2">
            {teams.map(t => {
              const theme = LEVEL_THEME[t.recruiter.level] || LEVEL_THEME.recruit;
              const isOpen = !!expanded[t.recruiter.id];
              return (
                <div key={t.recruiter.id} className="glass rounded-xl overflow-hidden border border-white/5">
                  <button onClick={()=>setExpanded({...expanded, [t.recruiter.id]: !isOpen})}
                    className="w-full p-3 flex items-center justify-between text-left hover:bg-white/5">
                    <div className="flex items-center gap-3 min-w-0 flex-1">
                      <div className="text-xl shrink-0">{isOpen?'▼':'▶'}</div>
                      <div className="w-9 h-9 rounded-full overflow-hidden bg-bg0 border border-white/10 shrink-0">
                        {t.recruiter.profile?.avatar_url
                          ? <img src={t.recruiter.profile.avatar_url} className="w-full h-full object-cover" alt=""/>
                          : <div className="w-full h-full flex items-center justify-center">👤</div>}
                      </div>
                      <div className="min-w-0">
                        <div className="font-bold text-sm truncate">{t.recruiter.profile?.full_name || t.recruiter.profile?.email}</div>
                        <div className="text-[10px] font-bold uppercase tracking-wider" style={{color:theme.color}}>{theme.emoji} {theme.name} · kod: {t.recruiter.promo_code}</div>
                      </div>
                    </div>
                    <div className="shrink-0 text-right">
                      <div className="font-display font-black text-lg text-brand">{t.members.length}</div>
                      <div className="text-[9px] uppercase text-white/40">atleta · {formatEUR(t.earned)}</div>
                    </div>
                  </button>

                  {isOpen && (
                    <div className="border-t border-white/5 bg-bg0/40 p-3 space-y-2">
                      {t.members.map(m => {
                        const mt = LEVEL_THEME[m.level] || LEVEL_THEME.recruit;
                        return (
                          <div key={m.id} className="flex items-center gap-3 p-2 rounded-lg bg-white/5">
                            <div className="w-7 h-7 rounded-full overflow-hidden bg-bg0 shrink-0">
                              {m.profile?.avatar_url
                                ? <img src={m.profile.avatar_url} className="w-full h-full object-cover" alt=""/>
                                : <div className="w-full h-full flex items-center justify-center text-xs">👤</div>}
                            </div>
                            <div className="flex-1 min-w-0">
                              <div className="font-bold text-xs truncate">{m.profile?.full_name || m.profile?.email}</div>
                              <div className="text-[9px] font-bold uppercase" style={{color:mt.color}}>{mt.name} · {formatDate(m.joined_at)}</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* RUČNA DODELA */}
      <div className="glass rounded-2xl p-4">
        <div className="font-bold text-sm mb-3">✏️ Ručna dodela (povezi atletu sa onim ko ga je doveo)</div>
        <div className="space-y-2 max-h-96 overflow-y-auto">
          {allAthletes.map(a => {
            const ref = allAthletes.find(x => x.id === a.referred_by);
            return (
              <div key={a.id} className="flex items-center gap-2 p-2 rounded-lg bg-white/5 flex-wrap">
                <div className="flex items-center gap-2 min-w-0 flex-1">
                  <div className="font-bold text-xs truncate">{a.profile?.full_name || a.profile?.email}</div>
                  <span className="text-[10px] text-white/40">({a.level})</span>

                  onChange={e => assignReferrer(a.id, e.target.value)}
                  className="px-2 py-1 rounded bg-bg1 border border-white/10 text-[11px]">
                  <option value="__NONE__">— bez referrera —</option>
                  {allAthletes.filter(x => x.id !== a.id).map(r => (
                    <option key={r.id} value={r.id}>{r.profile?.full_name || r.profile?.email}</option>
                  ))}
                </select>
                {ref && <span className="text-[10px] text-brand">→ {ref.profile?.full_name || ref.profile?.email}</span>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// === APP ROOT ===
function App() {
  const hash = useHash();
  const { user, profile, athlete, loading, refreshProfile } = useAuth();
  const route = hash.replace('#','').split('?')[0] || '/';

  useEffect(() => {
    var el = document.getElementById('loading');
    if (el && !loading) el.style.display='none';
  }, [loading]);

  // === SERVICE WORKER REGISTRATION (force update svaki put) ===
  useEffect(() => {
    if ('serviceWorker' in navigator) {
      // Registruj sa updateViaCache 'none' da uvek povuce nov sw.js
      navigator.serviceWorker.register('/sw.js?v=11', { updateViaCache: 'none' })
        .then(reg => { reg.update(); })
        .catch(err => console.log('SW reg failed:', err));
    }
  }, []);

  // === LOAD PORTAL TEXTS at startup, then re-render when ready ===
  const [, forceUpdate] = useState(0);
  useEffect(() => {
    loadPortalTexts();
    const handler = () => forceUpdate(x => x + 1);
    window.addEventListener('portal-texts-loaded', handler);
    return () => window.removeEventListener('portal-texts-loaded', handler);
  }, []);

  // === TIM INVITE: sacuvaj ref param u localStorage (radi sve dok je u URL-u) ===
  useEffect(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const ref = params.get('ref') || params.get('via');
      if (ref) {
        const upper = ref.toUpperCase().trim();
        localStorage.setItem('vamit_ref', upper);
        console.log('[VAMIT] Ref saved sync:', upper);
      } else {
        console.log('[VAMIT] No ref in URL. Existing localStorage:', localStorage.getItem('vamit_ref'));
      }
    } catch(e){ console.warn('Ref save fail:', e); }
  }, [route]);

  // === Kad atleta prvi put udje, link je sa onim ko je doveo ===
  useEffect(() => {
    async function autoLink() {
      if (!athlete || athlete.referred_by) return;
      let ref = null;
      try { ref = localStorage.getItem('vamit_ref'); } catch(e){}
      if (!ref) return;
      // Nadji referrera po promo_code
      const { data: referrer } = await supa.from('athletes').select('id, promo_code')
        .eq('promo_code', ref)
        .maybeSingle();
      if (referrer && referrer.id && referrer.id !== athlete.id) {
        const { error } = await supa.from('athletes').update({ referred_by: referrer.id }).eq('id', athlete.id);
        if (!error) {
          try { localStorage.removeItem('vamit_ref'); } catch(e){}
          if (refreshProfile) refreshProfile(athlete.id);
          console.log('[VAMIT] Linked to referrer:', referrer.id);
        }
      }
    }
    autoLink();
  }, [athlete?.id, athlete?.referred_by]);

  useEffect(() => {
    if (!loading && user && (route === '/' || route === '/login')) {
      window.location.hash = '#/dashboard';
    }
  }, [user, loading, route]);

  async function logout() {
    await supa.auth.signOut();
    window.location.hash = '#/';
  }

  // Redirect: nelogovan user uvek ide na /login (NEMA landinga u portalu)
  useEffect(() => {
    if (!loading && !user) {
      const r = (route || '').replace(/^\//,'');
      if (r !== 'login') window.location.hash = '#/login';
    }
  }, [user, loading, route]);

  if (loading) return null;

  if (!user) {
    return (
      <div>
        <PublicNav user={null}/>
        <LoginPage/>
      </div>
    );
  }

  // Authenticated pages
  const renderPage = () => {
    const isSuper = profile?.role === 'super_admin';

    if (route === '/dashboard' || route === '/') {
      return isSuper ? <AdminOverview profile={profile}/> : <Dashboard athlete={athlete} profile={profile}/>;
    }
    if (route === '/reels') return isSuper ? <AdminReelsQueueFullPage/> : <ReelsPage athlete={athlete} profile={profile}/>;
    if (route === '/isplate') return isSuper ? <AdminPayoutQueueFullPage/> : <IsplatePage athlete={athlete} profile={profile} refreshProfile={refreshProfile}/>;
    if (route === '/atlete' && isSuper) return <AdminAthletesFullPage/>;
    if (route === '/admin' && isSuper) return <AdminPage/>;

    if (route === '/kurs') return <KursPage athlete={athlete}/>;
    if (route === '/ideje') return <ReelIdeasPage/>;
    if (route === '/dostignuca') return <AchievementsPage athlete={athlete}/>;
    if (route === '/rang') return <LeaderboardPage athlete={athlete}/>;
    if (route === '/notifikacije') return <NotificationsPage athlete={athlete}/>;
    if (route === '/profil') return <ProfilPage athlete={athlete} profile={profile} refreshProfile={refreshProfile}/>;
    return <Dashboard athlete={athlete} profile={profile}/>;
  };

  return (
    <PortalShell profile={profile} athlete={athlete} route={route} onLogout={logout}>
      {renderPage()}
    </PortalShell>
  );
}

function ReelIdeasPage() {
  const [videos, setVideos] = useState([]);
  const [missions, setMissions] = useState([]);
  const [captions, setCaptions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [copiedIdx, setCopiedIdx] = useState(null);

  useEffect(() => { load(); }, []);
  async function load() {
    setLoading(true);
    const { data } = await supa.from('reel_ideas').select('*').eq('active', true).order('sort_order', { ascending: true });
    const list = data || [];
    setVideos(list.filter(x => x.kind === 'video'));
    setMissions(list.filter(x => x.kind === 'mission'));
    setCaptions(list.filter(x => x.kind === 'caption'));
    setLoading(false);
  }

  async function copyToClipboard(text, idx) {
    try {
      await navigator.clipboard.writeText(text);
      setCopiedIdx(idx);
      setTimeout(() => setCopiedIdx(null), 1500);
    } catch(e) { alert('Kopiranje ne radi u ovom pregledaču.'); }
  }

  // Detektuje tip video-a i render-uje odgovarajući plejer koji radi INLINE u portalu
  function renderVideo(url) {
    if (!url) return <div className="w-full h-full flex items-center justify-center text-white/30 text-xs">Nema video-a</div>;
    const lower = url.toLowerCase();

    // 1) DIREKTAN VIDEO FAJL (MP4/WEBM/MOV) — HTML5 video, radi ODMAH bez odlaska
    if (lower.match(/\.(mp4|webm|mov|m4v|ogg|ogv)(\?.*)?$/)) {
      return <video src={url} controls playsInline preload="metadata" className="w-full h-full object-cover bg-black"/>;
    }

    // 2) YOUTUBE — iframe embed (radi inline)
    const ytMatch = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    if (ytMatch) {
      return <iframe src={`https://www.youtube.com/embed/${ytMatch[1]}?rel=0&modestbranding=1`} className="w-full h-full" allow="autoplay; encrypted-media; picture-in-picture" allowFullScreen frameBorder="0"/>;
    }

    // 3) VIMEO — iframe embed (radi inline)
    const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
    if (vimeoMatch) {
      return <iframe src={`https://player.vimeo.com/video/${vimeoMatch[1]}?title=0&byline=0&portrait=0`} className="w-full h-full" allow="autoplay; fullscreen; picture-in-picture" allowFullScreen frameBorder="0"/>;
    }

    // 4) INSTAGRAM — NEMA pouzdanog inline play, samo preview + link. Fallback poruka.
    const igMatch = url.match(/instagram\.com\/(?:reel|p)\/([^\/\?]+)/i);
    if (igMatch) {
      return (
        <div className="w-full h-full bg-black flex flex-col items-center justify-center gap-2 p-3">
          <div className="text-4xl">📱</div>
          <div className="text-[10px] text-white/60 text-center">Instagram embed ne radi inline.</div>
          <a href={url} target="_blank" rel="noopener" className="text-[10px] px-3 py-1.5 rounded-md bg-brand2/20 text-brand2 border border-brand2/40">Otvori u IG ↗</a>
        </div>
      );
    }

    // 5) NEPOZNAT — probaj iframe
    return <iframe src={url} className="w-full h-full bg-black" allow="autoplay" allowFullScreen frameBorder="0"/>;
  }

  if (loading) return <div className="glass rounded-2xl p-8 text-center text-white/60">Učitavam…</div>;

  return (
    <div className="space-y-4">
      <div>
        <h1 className="font-display text-2xl sm:text-3xl font-black mb-1">💡 Ideje za Reelse</h1>
        <p className="text-sm text-white/60">Primeri video-a, hookova i captiona za tvoje reelse.</p>
      </div>

      {/* VIDEO PRIMERI — 2 kolone kompaktno, playable inline */}
      {videos.length > 0 && (
        <div className="space-y-2">
          <h2 className="font-display text-base font-bold text-white/80">🎬 Video primeri</h2>
          <div className="grid grid-cols-2 gap-2 sm:gap-3">
            {videos.map(v => (
              <div key={v.id} className="glass-strong rounded-xl overflow-hidden border border-white/10">
                <div className="aspect-[3/4] bg-black relative">
                  {renderVideo(v.video_url)}
                </div>
                <div className="p-2">
                  <div className="text-[11px] font-bold text-white truncate leading-tight">{v.title || 'Reel primer'}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* MISSION HOOKS — collapsible */}
      {missions.length > 0 && (
        <details className="glass-strong rounded-2xl border border-gold/25 overflow-hidden group">
          <summary className="cursor-pointer p-4 flex items-center justify-between hover:bg-white/5 select-none list-none">
            <div className="flex items-center gap-3">
              <div className="text-2xl">🎣</div>
              <div>
                <div className="font-display text-base font-bold text-white">Ideje za danas</div>
                <div className="text-[11px] text-white/50">{missions.length} hookova + formula · klikni za pregled</div>
              </div>
            </div>
            <div className="text-gold text-lg transition-transform group-open:rotate-180">▾</div>
          </summary>
          <div className="px-4 pb-4 pt-1 space-y-2.5 border-t border-white/5">
            {missions.map((m, i) => (
              <div key={m.id} className="rounded-xl p-3 bg-bg0/40 border border-gold/15 hover:border-gold/30 transition">
                <div className="flex items-start justify-between gap-3 mb-2">
                  <div className="text-[10px] uppercase tracking-[0.2em] text-gold font-bold">{m.title || 'MISSION'}</div>
                  <button onClick={()=>copyToClipboard(`${m.title}\n🎣 Hook\n"${m.hook}"\nFormula: ${m.formula}`, 'm'+i)}
                    className="text-[10px] px-2 py-1 rounded-md bg-white/5 hover:bg-white/10 text-white/60 shrink-0">
                    {copiedIdx === 'm'+i ? '✓ Kopirano' : '📋'}
                  </button>
                </div>
                <div className="mb-1.5">
                  <div className="text-[9px] text-white/40 mb-0.5">🎣 HOOK</div>
                  <div className="text-sm font-bold text-white leading-snug">"{m.hook}"</div>
                </div>
                <div>
                  <div className="text-[9px] text-white/40 mb-0.5">FORMULA</div>
                  <div className="text-xs text-white/75 leading-snug">{m.formula}</div>
                </div>
              </div>
            ))}
          </div>
        </details>
      )}

      {/* CAPTIONS — collapsible */}
      {captions.length > 0 && (
        <details className="glass-strong rounded-2xl border border-brand2/25 overflow-hidden group">
          <summary className="cursor-pointer p-4 flex items-center justify-between hover:bg-white/5 select-none list-none">
            <div className="flex items-center gap-3">
              <div className="text-2xl">✍️</div>
              <div>
                <div className="font-display text-base font-bold text-white">Ideje za caption</div>
                <div className="text-[11px] text-white/50">{captions.length} caption ideja · klikni za pregled</div>
              </div>
            </div>
            <div className="text-brand2 text-lg transition-transform group-open:rotate-180">▾</div>
          </summary>
          <div className="px-4 pb-4 pt-1 space-y-2.5 border-t border-white/5">
            {captions.map((c, i) => (
              <div key={c.id} className="rounded-xl p-3 bg-bg0/40 border border-brand2/15 hover:border-brand2/30 transition">
                <div className="flex items-start justify-between gap-3 mb-1.5">
                  <div className="text-[10px] uppercase tracking-[0.2em] text-brand2 font-bold">{c.title || `Caption #${i+1}`}</div>
                  <button onClick={()=>copyToClipboard(c.content, 'c'+i)}
                    className="text-[10px] px-2 py-1 rounded-md bg-white/5 hover:bg-white/10 text-white/60 shrink-0">
                    {copiedIdx === 'c'+i ? '✓ Kopirano' : '📋'}
                  </button>
                </div>
                <div className="text-xs text-white/85 whitespace-pre-wrap leading-relaxed">{c.content}</div>
              </div>
            ))}
          </div>
        </details>
      )}

      {videos.length === 0 && missions.length === 0 && captions.length === 0 && (
        <div className="glass rounded-2xl p-8 text-center text-white/60">
          Još nema sadržaja. Admin će uskoro dodati ideje.
        </div>
      )}
    </div>
  );
}

// =====================================================
// === ADMIN: IDEJE ZA REELSE — CRUD (za super_admin) ===
// =====================================================
function AdminReelIdeas() {
  const [tab, setTab] = useState('video'); // video | mission | caption
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(null); // null ili obj sa poljima

  useEffect(() => { load(); }, [tab]);
  async function load() {
    setLoading(true);
    const { data } = await supa.from('reel_ideas').select('*').eq('kind', tab).order('sort_order', { ascending: true });
    setItems(data || []);
    setLoading(false);
  }

  function newItem() {
    setEditing({
      kind: tab,
      sort_order: (items[items.length - 1]?.sort_order || 0) + 10,
      title: '',
      video_url: '',
      hook: '',
      formula: '',
      content: '',
      active: true
    });
  }
  function edit(item) {
    setEditing({ ...item });
  }
  async function save() {
    if (!editing) return;
    const payload = {
      kind: editing.kind,
      sort_order: Number(editing.sort_order) || 0,
      title: editing.title || null,
      video_url: editing.video_url || null,
      hook: editing.hook || null,
      formula: editing.formula || null,
      content: editing.content || null,
      active: editing.active !== false,
      updated_at: new Date().toISOString()
    };
    let error;
    if (editing.id) {
      ({ error } = await supa.from('reel_ideas').update(payload).eq('id', editing.id));
    } else {
      ({ error } = await supa.from('reel_ideas').insert(payload));
    }
    if (error) { alert('Greška: ' + error.message); return; }
    setEditing(null);
    load();
  }
  async function del(id) {
    if (!confirm('Obrisati ovaj primer?')) return;
    const { error } = await supa.from('reel_ideas').delete().eq('id', id);
    if (error) { alert('Greška: ' + error.message); return; }
    load();
  }
  async function toggleActive(item) {
    await supa.from('reel_ideas').update({ active: !item.active, updated_at: new Date().toISOString() }).eq('id', item.id);
    load();
  }

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between gap-2 flex-wrap">
        <div>
          <h2 className="font-display text-xl font-bold">💡 Ideje za Reelse</h2>
          <p className="text-xs text-white/60">Dodaj/uredi/obriši sadržaj koji atlete vide.</p>
        </div>
        <button onClick={newItem} className="px-4 py-2 rounded-lg bg-gold text-bg0 font-bold text-sm">+ Dodaj primer</button>
      </div>

      <div className="flex gap-2">
        {[
          {k:'video', label:'🎬 Video'},
          {k:'mission', label:'🎣 Hook + Formula'},
          {k:'caption', label:'✍️ Caption'}
        ].map(t => (
          <button key={t.k} onClick={()=>setTab(t.k)}
            className={"px-3 py-1.5 rounded-lg text-xs font-bold " + (tab===t.k ? 'bg-brand text-bg0' : 'glass text-white/70')}>
            {t.label}
          </button>
        ))}
      </div>

      {loading ? (
        <div className="glass rounded-2xl p-8 text-center text-white/60">Učitavam...</div>
      ) : items.length === 0 ? (
        <div className="glass rounded-2xl p-8 text-center text-white/60">Nema unosa za ovaj tip. Klikni "+ Dodaj primer".</div>
      ) : (
        <div className="space-y-2">
          {items.map(item => (
            <div key={item.id} className={"glass rounded-xl p-3 border " + (item.active ? 'border-white/10' : 'border-danger/30 opacity-60')}>
              <div className="flex items-start justify-between gap-3">
                <div className="min-w-0 flex-1">
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-[10px] text-white/40 font-mono">#{item.sort_order}</span>
                    <span className="text-sm font-bold truncate">{item.title || '(bez naslova)'}</span>
                    {!item.active && <span className="text-[10px] px-1.5 py-0.5 rounded bg-danger/20 text-danger">skriven</span>}
                  </div>
                  {tab === 'video' && item.video_url && <div className="text-[11px] text-brand2 truncate">{item.video_url}</div>}
                  {tab === 'mission' && (
                    <>
                      <div className="text-[11px] text-white/60 truncate">🎣 "{item.hook}"</div>
                      <div className="text-[11px] text-white/50 truncate">→ {item.formula}</div>
                    </>
                  )}
                  {tab === 'caption' && <div className="text-[11px] text-white/60 line-clamp-2 whitespace-pre-wrap">{item.content}</div>}
                </div>
                <div className="flex gap-1 shrink-0">
                  <button onClick={()=>toggleActive(item)} className="text-[10px] px-2 py-1 rounded bg-white/5 hover:bg-white/10">{item.active ? '👁️ Sakrij' : '👁️ Prikaži'}</button>
                  <button onClick={()=>edit(item)} className="text-[10px] px-2 py-1 rounded bg-brand2/20 text-brand2 hover:bg-brand2/30">✏️ Edit</button>
                  <button onClick={()=>del(item.id)} className="text-[10px] px-2 py-1 rounded bg-danger/20 text-danger hover:bg-danger/30">🗑️</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* MODAL — edit/new */}
      {editing && (
        <div className="fixed inset-0 z-50 bg-bg0/80 backdrop-blur-xl flex items-start sm:items-center justify-center p-4 overflow-y-auto"
             onClick={()=>setEditing(null)}>
          <div className="glass-strong rounded-2xl p-5 max-w-lg w-full my-8 space-y-3" onClick={e=>e.stopPropagation()}>
            <div className="text-lg font-bold">{editing.id ? '✏️ Uredi' : '+ Novi'} — {editing.kind === 'video' ? 'Video' : editing.kind === 'mission' ? 'Hook + Formula' : 'Caption'}</div>

            <div>
              <label className="text-[10px] text-white/60 uppercase tracking-wider">Naslov {editing.kind === 'mission' && '(npr. MISSION #001)'}</label>
              <input value={editing.title || ''} onChange={e=>setEditing({...editing, title:e.target.value})}
                className="w-full px-3 py-2 rounded-lg bg-bg0 border border-white/15 text-sm outline-none focus:border-brand2"/>
            </div>

            {editing.kind === 'video' && (
              <div className="space-y-2">
                <label className="text-[10px] text-white/60 uppercase tracking-wider">Video (MP4 upload / YouTube / Vimeo URL)</label>
                <input value={editing.video_url || ''} onChange={e=>setEditing({...editing, video_url:e.target.value})}
                  placeholder="https://... (MP4 direktan, YouTube ili Vimeo se pušta inline)"
                  className="w-full px-3 py-2 rounded-lg bg-bg0 border border-white/15 text-sm outline-none focus:border-brand2"/>
                <div className="flex items-center gap-2">
                  <input type="file" accept="video/mp4,video/webm,video/quicktime" id="video-upload-input"
                    style={{display:'none'}}
                    onChange={async (e) => {
                      const file = e.target.files?.[0];
                      if (!file) return;
                      if (file.size > 50 * 1024 * 1024) { alert('Maksimum 50MB. Kompresuj video ili koristi YouTube link.'); return; }
                      const ext = file.name.split('.').pop() || 'mp4';
                      const path = `reel-ideas/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
                      setEditing(prev => ({...prev, _uploading:true}));
                      const { error: upErr } = await supa.storage.from('public-assets').upload(path, file, { cacheControl:'31536000', upsert:false });
                      if (upErr) { alert('Upload greška: ' + upErr.message); setEditing(prev => ({...prev, _uploading:false})); return; }
                      const { data: urlData } = supa.storage.from('public-assets').getPublicUrl(path);
                      setEditing(prev => ({...prev, video_url: urlData.publicUrl, _uploading:false}));
                    }}/>
                  <button onClick={()=>document.getElementById('video-upload-input').click()}
                    disabled={editing._uploading}
                    className="text-xs px-3 py-1.5 rounded-md bg-brand2/20 text-brand2 border border-brand2/40 hover:bg-brand2/30 disabled:opacity-50">
                    {editing._uploading ? '⏳ Uploadujem...' : '📤 Upload MP4 fajl'}
                  </button>
                  <div className="text-[10px] text-white/40">Max 50MB. Instagram embed ne radi inline.</div>
                </div>
                {editing.video_url && (
                  <div className="mt-2 aspect-[3/4] max-w-[200px] rounded-lg overflow-hidden bg-black border border-white/10">
                    {(() => {
                      const url = editing.video_url;
                      const lower = url.toLowerCase();
                      if (lower.match(/\.(mp4|webm|mov|m4v|ogg|ogv)(\?.*)?$/)) return <video src={url} controls playsInline className="w-full h-full object-cover"/>;
                      const yt = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
                      if (yt) return <iframe src={`https://www.youtube.com/embed/${yt[1]}`} className="w-full h-full" frameBorder="0" allowFullScreen/>;
                      const vm = url.match(/vimeo\.com\/(\d+)/);
                      if (vm) return <iframe src={`https://player.vimeo.com/video/${vm[1]}`} className="w-full h-full" frameBorder="0" allowFullScreen/>;
                      return <div className="w-full h-full flex items-center justify-center text-[10px] text-white/40 p-2 text-center">Preview nedostupan</div>;
                    })()}
                  </div>
                )}
              </div>
            )}

            {editing.kind === 'mission' && (
              <>
                <div>
                  <label className="text-[10px] text-white/60 uppercase tracking-wider">🎣 Hook (rečenica u navodnicima)</label>
                  <input value={editing.hook || ''} onChange={e=>setEditing({...editing, hook:e.target.value})}
                    placeholder='npr. Niko nije znao kroz šta prolazim.'
                    className="w-full px-3 py-2 rounded-lg bg-bg0 border border-white/15 text-sm outline-none focus:border-brand2"/>
                </div>
                <div>
                  <label className="text-[10px] text-white/60 uppercase tracking-wider">Formula (koraci sa strelicama)</label>
                  <input value={editing.formula || ''} onChange={e=>setEditing({...editing, formula:e.target.value})}
                    placeholder="Borba → Kako sam se osećao → Šta mi je pomoglo → CTA"
                    className="w-full px-3 py-2 rounded-lg bg-bg0 border border-white/15 text-sm outline-none focus:border-brand2"/>
                </div>
              </>
            )}

            {editing.kind === 'caption' && (
              <div>
                <label className="text-[10px] text-white/60 uppercase tracking-wider">Sadržaj captiona (podržava više redova)</label>
                <textarea value={editing.content || ''} onChange={e=>setEditing({...editing, content:e.target.value})}
                  rows={8}
                  className="w-full px-3 py-2 rounded-lg bg-bg0 border border-white/15 text-sm outline-none focus:border-brand2 font-mono"/>
              </div>
            )}

            <div className="flex items-center gap-3">
              <div className="flex-1">
                <label className="text-[10px] text-white/60 uppercase tracking-wider">Redosled (manji broj = viši)</label>
                <input type="number" value={editing.sort_order} onChange={e=>setEditing({...editing, sort_order:e.target.value})}
                  className="w-full px-3 py-2 rounded-lg bg-bg0 border border-white/15 text-sm outline-none focus:border-brand2"/>
              </div>
              <label className="flex items-center gap-2 text-xs">
                <input type="checkbox" checked={editing.active !== false} onChange={e=>setEditing({...editing, active:e.target.checked})}/>
                Aktivan (vidljiv atletama)
              </label>
            </div>

            <div className="flex gap-2 pt-2">
              <button onClick={()=>setEditing(null)} className="flex-1 py-2.5 rounded-lg bg-white/5 border border-white/10 text-sm">Otkaži</button>
              <button onClick={save} className="flex-1 py-2.5 rounded-lg bg-gold text-bg0 font-bold text-sm">💾 Sačuvaj</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
