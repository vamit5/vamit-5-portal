<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Suptilan crni gradijent za premium feel -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <!-- Beli gradijent za blag metalni efekat -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d4d4d4"/>
    </linearGradient>
  </defs>

  <!-- Crna pozadina (rounded corner za PWA ikonu) -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Suptilan border ring za premium feel -->
  <rect x="24" y="24" width="464" height="464" rx="78" fill="none"
    stroke="#ffffff" stroke-width="1" opacity="0.06"/>

  <!-- Gornja horizontalna linija (strogost / tech feel) -->
  <line x1="100" y1="178" x2="412" y2="178" stroke="#ffffff" stroke-width="1.5" opacity="0.35"/>

  <!-- Glavni wordmark VAMIT-5 -->
  <text
    x="256" y="256"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Impact, Arial Black, Helvetica Neue, sans-serif"
    font-weight="900"
    font-size="118"
    fill="url(#textGrad)"
    letter-spacing="-2"
  >VAMIT-5</text>

  <!-- Donja horizontalna linija -->
  <line x1="100" y1="328" x2="412" y2="328" stroke="#ffffff" stroke-width="1.5" opacity="0.35"/>

  <!-- ATHLETE PORTAL tagline (mali, suptilan, raštrkan letterspacing) -->
  <text
    x="256" y="376"
    text-anchor="middle"
    font-family="Arial, Helvetica Neue, sans-serif"
    font-weight="500"
    font-size="22"
    fill="#ffffff"
    letter-spacing="13"
    opacity="0.6"
  >ATHLETE PORTAL</text>

  <!-- Vertikalne crte kao geometrijski akcenti (donje uglove) -->
  <line x1="60" y1="430" x2="60" y2="462" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <line x1="452" y1="430" x2="452" y2="462" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
</svg>
